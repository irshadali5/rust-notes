                  deepDive: { explanation: "Unsafe Rust gives you five 'superpowers' that the compiler can't verify: dereferencing raw pointers, calling unsafe functions, accessing or modifying mutable static variables, implementing unsafe traits, and accessing fields of unions. The unsafe keyword doesn't turn off the borrow checker or disable any safety checks — it only allows these five additional operations. You must still use unsafe responsibly, typically by wrapping unsafe code in safe abstractions. Unsafe is necessary for interfacing with C (FFI), operating system calls, and certain performance optimizations.", extendedCode: '<span class="keyword">unsafe</span> {\n    <span class="comment">// 1. Dereference raw pointer</span>\n    <span class="keyword">let</span> raw = &<span class="keyword">mut</span> <span class="string">5</span> <span class="keyword">as</span> *<span class="keyword">mut</span> <span class="type">i32</span>;\n    *raw = <span class="string">10</span>;\n    \n    <span class="comment">// 2. Call unsafe function</span>\n    <span class="function">dangerous</span>();\n    \n    <span class="comment">// 3. Access static mut</span>\n    <span class="keyword">static mut</span> COUNTER: <span class="type">u32</span> = <span class="string">0</span>;\n    COUNTER += <span class="string">1</span>;\n}\n\n<span class="keyword">unsafe fn</span> <span class="function">dangerous</span>() {}\n\n<span class="comment">// 4. Implement unsafe trait</span>\n<span class="keyword">unsafe trait</span> <span class="type">Foo</span> {}\n<span class="keyword">unsafe impl</span> <span class="type">Foo</span> <span class="keyword">for</span> <span class="type">i32</span> {}', keyPoints: ["unsafe allows five specific superpowers, not blanket unsafety", "The borrow checker is still active in unsafe blocks", "Raw pointers can be null, dangling, or aliased — no compiler checks", "Safe abstractions should wrap unsafe code to limit its scope", "Unsafe is required for FFI, OS interfaces, and certain optimizations"], commonMistakes: ["Using unsafe when safe Rust would suffice", "Assuming unsafe disables all checks (borrow checker still works)", "Not documenting safety invariants for unsafe functions"], relatedConcepts: ["Raw Pointer", "FFI", "Static Mut", "Unsafe Trait", "Union"] } },

                { id: 110, chapter: "Ch. 20", section: "Advanced Features", title: "Raw Pointers", concept: "*const & *mut", description: "Raw pointers can be null or dangling, and allow aliasing. They are created with as or from memory addresses.", code: 'let raw = &mut 5 as *mut i32;\nlet const_ptr = &5 as *const i32;\nunsafe { *raw = 10; }', tags: ["raw pointer", "*const", "*mut", "null", "aliasing"],
                  deepDive: { explanation: "Raw pointers (*const T and *mut T) are similar to C pointers. They can be null, dangling, or aliased (multiple pointers to the same data). Unlike references, raw pointers have no lifetime or ownership semantics — the compiler doesn't enforce any guarantees. They are created with as casts or from memory addresses. Dereferencing a raw pointer requires an unsafe block. Raw pointers are used for FFI with C, implementing low-level data structures, and certain performance optimizations. They can be converted to references using as_ref() or as_mut(), but you must ensure validity yourself.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> num = <span class="string">5</span>;\n\n<span class="comment">// Create raw pointers from references</span>\n<span class="keyword">let</span> r1 = &num <span class="keyword">as</span> *<span class="keyword">const</span> <span class="type">i32</span>;\n<span class="keyword">let</span> r2 = &<span class="keyword">mut</span> num <span class="keyword">as</span> *<span class="keyword">mut</span> <span class="type">i32</span>;\n\n<span class="keyword">unsafe</span> {\n    <span class="macro">println!</span>(<span class="string">"r1 is: {}"</span>, *r1);\n    <span class="macro">println!</span>(<span class="string">"r2 is: {}"</span>, *r2);\n}\n\n<span class="comment">// Null raw pointer</span>\n<span class="keyword">let</span> raw: *<span class="keyword">const</span> <span class="type">i32</span> = std::ptr::null();\n\n<span class="comment">// Convert to reference (unsafe)</span>\n<span class="keyword">unsafe</span> {\n    <span class="keyword">if</span> !raw.is_null() {\n        <span class="keyword">let</span> reference = &*raw; <span class="comment">// dereference then borrow</span>\n    }\n}', keyPoints: ["Raw pointers can be null, dangling, or aliased", "No automatic cleanup or borrow checking", "Dereferencing requires unsafe", "Created with as casts or from addresses", "Used for FFI and low-level data structures"], commonMistakes: ["Dereferencing null or dangling raw pointers (undefined behavior)", "Creating invalid references from raw pointers", "Using raw pointers when references would be safer"], relatedConcepts: ["Unsafe", "Pointer", "FFI", "Null", "Dereference"] } },

                { id: 111, chapter: "Ch. 20", section: "Advanced Features", title: "extern Functions", concept: "FFI", description: "extern creates an interface to foreign functions (FFI). \"C\" specifies the ABI. unsafe is required.", code: 'extern "C" {\n    fn abs(input: i32) -> i32;\n}\nunsafe { println!("{}", abs(-3)); }', tags: ["extern", "FFI", "C", "ABI", "foreign"],
                  deepDive: { explanation: "The extern keyword creates Foreign Function Interfaces (FFI) to call functions from other languages (typically C). extern \"C\" specifies the C calling convention/ABI. Declarations inside an extern block tell Rust about functions defined elsewhere. Calling these functions requires unsafe because Rust can't verify their safety. You can also define Rust functions callable from C using extern \"C\" fn. The libc crate provides C type definitions. For complex FFI, consider the bindgen tool which generates Rust bindings from C headers automatically.", extendedCode: '<span class="keyword">extern</span> <span class="string">"C"</span> {\n    <span class="keyword">fn</span> <span class="function">abs</span>(input: <span class="type">i32</span>) -> <span class="type">i32</span>;\n}\n\n<span class="keyword">unsafe</span> {\n    <span class="macro">println!</span>(<span class="string">"Absolute value of -3 according to C: {}"</span>, abs(-<span class="string">3</span>));\n}\n\n<span class="comment">// Rust function callable from C</span>\n<span class="keyword">#[no_mangle]</span>\n<span class="keyword">pub extern</span> <span class="string">"C"</span> <span class="keyword">fn</span> <span class="function">call_from_c</span>() {\n    <span class="macro">println!</span>(<span class="string">"Just called a Rust function from C!"</span>);\n}\n\n<span class="comment">// Using libc crate</span>\n<span class="keyword">use</span> libc::{c_int, size_t};\n<span class="keyword">extern</span> <span class="string">"C"</span> {\n    <span class="keyword">fn</span> <span class="function">malloc</span>(size: size_t) -> *<span class="keyword">mut</span> std::ffi::c_void;\n}', keyPoints: ["extern \"C\" declares foreign functions using the C ABI", "Calling extern functions requires unsafe", "#[no_mangle] prevents name mangling for C compatibility", "The libc crate provides C types and common functions", "bindgen generates Rust bindings from C headers"], commonMistakes: ["Forgetting unsafe when calling extern functions", "Incorrect function signatures (ABI mismatch causes crashes)", "Not handling null pointers returned from C functions"], relatedConcepts: ["FFI", "ABI", "C", "Unsafe", "libc"] } },

                { id: 112, chapter: "Ch. 20", section: "Advanced Features", title: "Macros", concept: "Declarative Macros", description: "macro_rules! creates declarative macros that match patterns and generate code. They operate on syntax tokens.", code: 'macro_rules! vec {\n    ($($x:expr),*) => {\n        {\n            let mut temp_vec = Vec::new();\n            $(temp_vec.push($x);)*\n            temp_vec\n        }\n    };\n}', tags: ["macro", "macro_rules", "declarative", "code generation", "token"],
                  deepDive: { explanation: "Declarative macros (macro_rules!) are a form of metaprogramming that matches patterns against Rust syntax and generates code. They operate on tokens, not AST nodes. The vec! macro is a classic example — vec![1, 2, 3] expands to code that creates a Vec and pushes elements. Macros can have multiple match arms for different patterns. They use special syntax: $name:frag_spec for captures, * for zero or more, + for one or more, and ? for optional. Declarative macros are simpler than procedural macros but less powerful for complex transformations.", extendedCode: '<span class="macro">macro_rules!</span> <span class="function">vec</span> {\n    ($($x:expr),*) => {\n        {\n            <span class="keyword">let</span> <span class="keyword">mut</span> temp_vec = <span class="type">Vec</span>::new();\n            $(\n                temp_vec.push($x);\n            )*\n            temp_vec\n        }\n    };\n}\n\n<span class="comment">// Using the macro</span>\n<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n\n<span class="comment">// Custom macro</span>\n<span class="macro">macro_rules!</span> <span class="function">say_hello</span> {\n    () => {\n        <span class="macro">println!</span>(<span class="string">"Hello!"</span>);\n    };\n    ($name:expr) => {\n        <span class="macro">println!</span>(<span class="string">"Hello, {}!"</span>, $name);\n    };\n}\n\n<span class="function">say_hello!</span>();\n<span class="function">say_hello!</span>(<span class="string">"world"</span>);', keyPoints: ["macro_rules! creates declarative macros", "Operates on tokens, not AST", "Pattern matching with capture specifiers ($name:expr)", "Repetition with *, +, and ?", "Less powerful than procedural macros but simpler"], commonMistakes: ["Confusing macro syntax with regular Rust syntax", "Not understanding token-based matching limitations", "Overusing macros when functions would suffice"], relatedConcepts: ["Procedural Macro", "Metaprogramming", "Token", "Pattern", "Code Generation"] } },

                { id: 113, chapter: "Ch. 20", section: "Advanced Features", title: "Procedural Macros", concept: "Derive Macros", description: "Procedural macros operate on AST tokens. Three kinds: custom derive, attribute-like, and function-like.", code: '#[derive(Debug, Clone)] // custom derive\n#[my_attribute]          // attribute-like\nmy_macro!();             // function-like', tags: ["procedural macro", "derive", "attribute", "AST", "token"],
                  deepDive: { explanation: "Procedural macros are advanced metaprogramming tools that operate on AST tokens. They come in three flavors: custom derive (#[derive(MyTrait)]), attribute-like (#[my_attribute]), and function-like (my_macro!()). Procedural macros are defined in separate crates with the proc-macro crate type. They use the proc_macro, syn, and quote crates to parse and generate Rust code. Custom derive macros automatically implement traits for structs and enums. They're used extensively for serialization (serde), debugging (Debug), cloning (Clone), and many other boilerplate reductions.", extendedCode: '<span class="comment">// proc-macro crate definition</span>\n<span class="keyword">use</span> proc_macro::TokenStream;\n<span class="keyword">use</span> quote::quote;\n<span class="keyword">use</span> syn;\n\n<span class="keyword">#[proc_macro_derive</span>(HelloMacro)<span class="keyword">]</span>\n<span class="keyword">pub fn</span> <span class="function">hello_macro_derive</span>(input: TokenStream) -> TokenStream {\n    <span class="keyword">let</span> ast = syn::parse(input).unwrap();\n    <span class="function">impl_hello_macro</span>(&ast)\n}\n\n<span class="keyword">fn</span> <span class="function">impl_hello_macro</span>(ast: &syn::DeriveInput) -> TokenStream {\n    <span class="keyword">let</span> name = &ast.ident;\n    <span class="keyword">let</span> gen = quote! {\n        <span class="keyword">impl</span> HelloMacro <span class="keyword">for</span> #name {\n            <span class="keyword">fn</span> <span class="function">hello_macro</span>() {\n                <span class="macro">println!</span>(<span class="string">"Hello, Macro! My name is {}!"</span>, stringify!(#name));\n            }\n        }\n    };\n    gen.into()\n}\n\n<span class="comment">// Usage</span>\n<span class="keyword">#[derive</span>(HelloMacro)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Pancakes</span>;\n\n<span class="type">Pancakes</span>::hello_macro();', keyPoints: ["Procedural macros operate on AST tokens", "Three types: custom derive, attribute-like, function-like", "Defined in proc-macro crates", "Use syn to parse and quote to generate code", "Enable powerful boilerplate reduction"], commonMistakes: ["Confusing procedural macros with declarative macros", "Not handling parse errors gracefully in proc macros", "Generating invalid code that produces confusing compiler errors"], relatedConcepts: ["macro_rules", "Derive", "AST", "TokenStream", "syn"] } },

                { id: 114, chapter: "Ch. 20", section: "Advanced Features", title: "Advanced Traits", concept: "Associated Types", description: "Associated types connect a type placeholder with a trait. They differ from generics by not needing annotation at each use.", code: 'pub trait Iterator {\n    type Item;\n    fn next(&mut self) -> Option<Self::Item>;\n}', tags: ["associated type", "Item", "trait", "placeholder", "generic"],
                  deepDive: { explanation: "Associated types are type placeholders declared within a trait definition. They allow a trait to reference a type without making the trait generic over that type. Unlike generic traits where the type parameter must be specified at every use (Trait<Type>), associated types are determined by the implementation and inferred by the compiler. This makes APIs cleaner. For example, Iterator has an associated type Item — you implement Iterator for a type once with a specific Item, and users don't need to specify it. Associated types can have defaults (stabilized in Rust 1.20).", extendedCode: '<span class="keyword">pub trait</span> <span class="type">Iterator</span> {\n    <span class="keyword">type</span> <span class="type">Item</span>;\n    <span class="keyword">fn</span> <span class="function">next</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) -> <span class="type">Option</span>&lt;<span class="keyword">Self</span>::Item&gt;;\n}\n\n<span class="keyword">impl</span> <span class="type">Iterator</span> <span class="keyword">for</span> <span class="type">Counter</span> {\n    <span class="keyword">type</span> <span class="type">Item</span> = <span class="type">u32</span>;\n    \n    <span class="keyword">fn</span> <span class="function">next</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) -> <span class="type">Option</span>&lt;<span class="keyword">Self</span>::Item&gt; {\n        <span class="comment">// ...</span>\n    }\n}\n\n<span class="comment">// Generic trait (must specify type at use site)</span>\n<span class="keyword">trait</span> <span class="type">Graph</span>&lt;N, E&gt; { ... }\n\n<span class="comment">// Associated type (inferred from impl)</span>\n<span class="keyword">trait</span> <span class="type">Graph</span> {\n    <span class="keyword">type</span> <span class="type">Node</span>;\n    <span class="keyword">type</span> <span class="type">Edge</span>;\n}', keyPoints: ["Associated types are placeholders in trait definitions", "Determined by the implementation, not specified at use site", "Make APIs cleaner than generic traits for single-type associations", "Can have defaults (stabilized in Rust 1.20)", "Iterator::Item is the canonical example"], commonMistakes: ["Using generic traits when associated types would be cleaner", "Trying to implement the same trait multiple times with different associated types (not allowed)", "Confusing associated types with generic type parameters"], relatedConcepts: ["Trait", "Generic", "Placeholder", "Implementation", "Type Inference"] } },

                { id: 115, chapter: "Ch. 20", section: "Advanced Features", title: "Fully Qualified Syntax", concept: "Disambiguation", description: "Use <Type as Trait>::method to disambiguate when multiple traits define methods with the same name.", code: '<Dog as Animal>::baby_name()\n// vs\nDog::baby_name()', tags: ["fully qualified", "disambiguate", "trait", "syntax", "as"],
                  deepDive: { explanation: "Fully qualified syntax (<Type as Trait>::method) is used to disambiguate method calls when a type implements multiple traits that define methods with the same name, or when a trait method and inherent method have the same name. Without disambiguation, Rust uses method resolution rules that prefer inherent methods over trait methods. The syntax explicitly states which trait's method to call. This is rare in practice but essential when naming conflicts occur. It can also be used to call trait methods when the trait is not in scope.", extendedCode: '<span class="keyword">trait</span> <span class="type">Pilot</span> {\n    <span class="keyword">fn</span> <span class="function">fly</span>(&<span class="keyword">self</span>);\n}\n\n<span class="keyword">trait</span> <span class="type">Wizard</span> {\n    <span class="keyword">fn</span> <span class="function">fly</span>(&<span class="keyword">self</span>);\n}\n\n<span class="keyword">struct</span> <span class="type">Human</span>;\n\n<span class="keyword">impl</span> <span class="type">Pilot</span> <span class="keyword">for</span> <span class="type">Human</span> {\n    <span class="keyword">fn</span> <span class="function">fly</span>(&<span class="keyword">self</span>) { <span class="macro">println!</span>(<span class="string">"This is your captain speaking."</span>); }\n}\n\n<span class="keyword">impl</span> <span class="type">Wizard</span> <span class="keyword">for</span> <span class="type">Human</span> {\n    <span class="keyword">fn</span> <span class="function">fly</span>(&<span class="keyword">self</span>) { <span class="macro">println!</span>(<span class="string">"Up!"</span>); }\n}\n\n<span class="keyword">impl</span> <span class="type">Human</span> {\n    <span class="keyword">fn</span> <span class="function">fly</span>(&<span class="keyword">self</span>) { <span class="macro">println!</span>(<span class="string">"*waving arms furiously*"</span>); }\n}\n\n<span class="keyword">let</span> person = <span class="type">Human</span>;\nperson.fly();                  <span class="comment">// Human::fly</span>\n<span class="type">Pilot</span>::fly(&person);           <span class="comment">// Pilot::fly</span>\n&lt;<span class="type">Human</span> <span class="keyword">as</span> <span class="type">Wizard</span>&gt;::fly(&person); <span class="comment">// Wizard::fly</span>', keyPoints: ["Fully qualified syntax disambiguates same-named methods", "Format: <Type as Trait>::method(args)", "Inherent methods take precedence over trait methods", "Can call trait methods without importing the trait", "Rarely needed but essential for disambiguation"], commonMistakes: ["Not knowing this syntax exists when facing naming conflicts", "Using it when simple Trait::method(&value) would work", "Confusing the syntax with cast or type annotation"], relatedConcepts: ["Trait", "Method Resolution", "Disambiguation", "Inherent Method", "Scope"] } },

                { id: 116, chapter: "Ch. 20", section: "Advanced Features", title: "Supertraits", concept: "Trait Dependencies", description: "A trait can require another trait (supertrait) to be implemented. Use colon syntax.", code: 'trait OutlinePrint: fmt::Display {\n    fn outline_print(&self) { ... }\n}', tags: ["supertrait", "dependency", "Display", "trait bound", "colon"],
                  deepDive: { explanation: "Supertraits allow a trait to require that implementing types also implement another trait. This is specified with colon syntax: trait MyTrait: Supertrait. For example, if a trait needs to print values, it might require Display as a supertrait. This ensures that methods from the supertrait are available in the subtrait's implementation. Supertraits are different from trait bounds on generic functions — they constrain the trait itself, not a generic parameter. When implementing a trait with supertraits, you must implement all supertraits first.", extendedCode: '<span class="keyword">use</span> std::fmt;\n\n<span class="keyword">trait</span> <span class="type">OutlinePrint</span>: fmt::Display {\n    <span class="keyword">fn</span> <span class="function">outline_print</span>(&<span class="keyword">self</span>) {\n        <span class="keyword">let</span> output = <span class="keyword">self</span>.to_string();\n        <span class="keyword">let</span> len = output.len();\n        <span class="macro">println!</span>(<span class="string">"{}"</span>, <span class="string">"*"</span>.repeat(len + <span class="string">4</span>));\n        <span class="macro">println!</span>(<span class="string">"*{}*"</span>, <span class="string">" "</span>.repeat(len + <span class="string">2</span>));\n        <span class="macro">println!</span>(<span class="string">"* {} *"</span>, output);\n        <span class="macro">println!</span>(<span class="string">"*{}*"</span>, <span class="string">" "</span>.repeat(len + <span class="string">2</span>));\n        <span class="macro">println!</span>(<span class="string">"{}"</span>, <span class="string">"*"</span>.repeat(len + <span class="string">4</span>));\n    }\n}\n\n<span class="comment">// Must implement Display before OutlinePrint</span>\n<span class="keyword">impl</span> fmt::Display <span class="keyword">for</span> <span class="type">Point</span> { ... }\n<span class="keyword">impl</span> <span class="type">OutlinePrint</span> <span class="keyword">for</span> <span class="type">Point</span> { ... }', keyPoints: ["Supertraits require implementing another trait", "Specified with colon syntax: trait Sub: Super", "Methods from supertraits are available in subtrait implementations", "All supertraits must be implemented before the subtrait", "Different from trait bounds on generic parameters"], commonMistakes: ["Implementing the subtrait without implementing supertraits first", "Confusing supertraits with trait bounds on functions", "Overusing supertraits when composition would be simpler"], relatedConcepts: ["Trait", "Dependency", "Display", "Implementation", "Bound"] } },

                { id: 117, chapter: "Ch. 20", section: "Advanced Features", title: "Newtype Pattern", concept: "Type Wrapper", description: "Newtype pattern wraps an existing type in a tuple struct to implement external traits on external types.", code: 'struct Wrapper(Vec<String>);\nimpl Display for Wrapper { ... }', tags: ["newtype", "wrapper", "orphan rule", "tuple struct", "Display"],
                  deepDive: { explanation: "The newtype pattern wraps an existing type in a tuple struct to gain new capabilities while maintaining type safety. It's primarily used to work around the orphan rule (you can't implement an external trait for an external type) and to provide type-safe distinctions between otherwise identical types. For example, Meters(u32) and Kilometers(u32) are distinct types despite both wrapping u32. The newtype can implement any traits and add methods. Access the inner value with .0. The derive_more crate reduces boilerplate for delegating trait implementations.", extendedCode: '<span class="comment">// Orphan rule workaround</span>\n<span class="keyword">struct</span> <span class="type">Wrapper</span>(<span class="type">Vec</span>&lt;<span class="type">String</span>&gt;);\n\n<span class="keyword">impl</span> fmt::Display <span class="keyword">for</span> <span class="type">Wrapper</span> {\n    <span class="keyword">fn</span> <span class="function">fmt</span>(&<span class="keyword">self</span>, f: &<span class="keyword">mut</span> fmt::Formatter) -> fmt::Result {\n        <span class="macro">write!</span>(f, <span class="string">"[{}]"</span>, <span class="keyword">self</span>.<span class="string">0</span>.join(<span class="string">", "</span>))\n    }\n}\n\n<span class="comment">// Type safety</span>\n<span class="keyword">struct</span> <span class="type">Meters</span>(<span class="type">u32</span>);\n<span class="keyword">struct</span> <span class="type">Kilometers</span>(<span class="type">u32</span>);\n\n<span class="keyword">let</span> m = <span class="type">Meters</span>(<span class="string">1000</span>);\n<span class="keyword">let</span> km = <span class="type">Kilometers</span>(<span class="string">1</span>);\n<span class="comment">// Cannot accidentally mix: m + km // ERROR</span>', keyPoints: ["Newtype wraps an existing type in a tuple struct", "Works around the orphan rule for trait implementations", "Provides type safety (Meters vs Kilometers)", "Access inner value with .0", "derive_more crate reduces delegation boilerplate"], commonMistakes: ["Forgetting to delegate common trait implementations (Display, Debug, etc.)", "Overusing newtype when a type alias would suffice", "Not documenting why a newtype exists"], relatedConcepts: ["Orphan Rule", "Tuple Struct", "Type Safety", "Trait", "Wrapper"] } },

                // Chapter 21: Final Project
                { id: 118, chapter: "Ch. 21", section: "Final Project", title: "TCP Listener", concept: "Network I/O", description: "Create a TCP server that binds to an address and accepts incoming connections using std::net::TcpListener.", code: 'let listener = TcpListener::bind("127.0.0.1:7878").unwrap();\nfor stream in listener.incoming() {\n    let stream = stream.unwrap();\n    handle_connection(stream);\n}', tags: ["TcpListener", "bind", "incoming", "network", "server"],
                  deepDive: { explanation: "TcpListener is the standard library's blocking TCP server primitive. bind() creates a listener on the specified address and port. incoming() returns an iterator over incoming connections, blocking until a client connects. Each connection is a TcpStream that implements Read and Write traits. This is a single-threaded, blocking server — it handles one connection at a time. For production servers, use an async runtime like Tokio or a thread pool. The standard library's networking is sufficient for learning and simple tools but lacks features like async I/O and TLS.", extendedCode: '<span class="keyword">use</span> std::net::{TcpListener, TcpStream};\n<span class="keyword">use</span> std::io::{prelude::*, BufReader};\n\n<span class="keyword">let</span> listener = TcpListener::bind(<span class="string">"127.0.0.1:7878"</span>).unwrap();\n\n<span class="keyword">for</span> stream <span class="keyword">in</span> listener.incoming() {\n    <span class="keyword">let</span> stream = stream.unwrap();\n    <span class="function">handle_connection</span>(stream);\n}\n\n<span class="keyword">fn</span> <span class="function">handle_connection</span>(<span class="keyword">mut</span> stream: TcpStream) {\n    <span class="keyword">let</span> buf_reader = BufReader::new(&<span class="keyword">mut</span> stream);\n    <span class="keyword">let</span> http_request: <span class="type">Vec</span>&lt;_&gt; = buf_reader\n        .lines()\n        .map(|result| result.unwrap())\n        .take_while(|line| !line.is_empty())\n        .collect();\n    \n    <span class="macro">println!</span>(<span class="string">"Request: {:?}"</span>, http_request);\n}', keyPoints: ["TcpListener::bind creates a blocking TCP server", "incoming() blocks until a connection arrives", "TcpStream implements Read and Write", "Single-threaded by default; use threads or async for concurrency", "For production, use Tokio or similar async runtime"], commonMistakes: ["Not handling connection errors (unwrap in production is bad)", "Blocking the main thread with long-running connections", "Not using BufReader for efficient line-by-line reading"], relatedConcepts: ["TcpStream", "BufReader", "Network", "Server", "Bind"] } },

                { id: 119, chapter: "Ch. 21", section: "Final Project", title: "Thread Pool", concept: "Worker Pattern", description: "A thread pool limits the number of concurrent threads, reusing them for multiple requests to avoid overhead.", code: 'pub struct ThreadPool {\n    workers: Vec<Worker>,\n    sender: mpsc::Sender<Job>,\n}', tags: ["thread pool", "Worker", "mpsc", "reuse", "limit"],
                  deepDive: { explanation: "A thread pool manages a fixed number of worker threads that process jobs from a shared queue. Instead of spawning a new thread per request (expensive), the pool reuses existing threads. Jobs are sent via a channel (mpsc). Each worker loops, receiving jobs from the channel and executing them. Thread pools limit resource usage and prevent the system from being overwhelmed by too many concurrent threads. The standard library doesn't provide a thread pool, but the rayon and threadpool crates do. Implementing one is a common learning exercise.", extendedCode: '<span class="keyword">pub struct</span> <span class="type">ThreadPool</span> {\n    workers: <span class="type">Vec</span>&lt;Worker&gt;,\n    sender: <span class="keyword">Option</span>&lt;mpsc::Sender&lt;Job&gt;&gt;,\n}\n\n<span class="keyword">type</span> Job = <span class="type">Box</span>&lt;<span class="keyword">dyn</span> <span class="type">FnOnce</span>() + <span class="keyword">Send</span> + <span class="string">\'static</span>&gt;;\n\n<span class="keyword">impl</span> <span class="type">ThreadPool</span> {\n    <span class="keyword">pub fn</span> <span class="function">new</span>(size: <span class="type">usize</span>) -> <span class="type">ThreadPool</span> {\n        <span class="keyword">let</span> (sender, receiver) = mpsc::channel();\n        <span class="keyword">let</span> receiver = Arc::new(Mutex::new(receiver));\n        \n        <span class="keyword">let</span> <span class="keyword">mut</span> workers = <span class="type">Vec</span>::with_capacity(size);\n        <span class="keyword">for</span> id <span class="keyword">in</span> <span class="string">0</span>..size {\n            workers.push(Worker::new(id, Arc::clone(&receiver)));\n        }\n        \n        <span class="type">ThreadPool</span> { workers, sender: <span class="type">Some</span>(sender) }\n    }\n    \n    <span class="keyword">pub fn</span> <span class="function">execute</span>&lt;F&gt;(&<span class="keyword">self</span>, f: F)\n    <span class="keyword">where</span>\n        F: <span class="type">FnOnce</span>() + <span class="keyword">Send</span> + <span class="string">\'static</span>,\n    {\n        <span class="keyword">let</span> job = <span class="type">Box</span>::new(f);\n        <span class="keyword">self</span>.sender.as_ref().unwrap().send(job).unwrap();\n    }\n}', keyPoints: ["Thread pool reuses a fixed number of threads", "Jobs are sent via channels and executed by workers", "Limits resource usage and thread creation overhead", "Common pattern in server applications", "rayon and threadpool crates provide production-ready implementations"], commonMistakes: ["Creating too many threads in the pool (wastes memory)", "Not handling channel send errors when shutting down", "Blocking workers with long-running tasks (starves the pool)"], relatedConcepts: ["Thread", "Channel", "Worker", "mpsc", "Arc"] } },

                { id: 120, chapter: "Ch. 21", section: "Final Project", title: "Graceful Shutdown", concept: "Clean Exit", description: "Implement Drop on the thread pool to join all worker threads, ensuring active requests finish before shutdown.", code: 'impl Drop for ThreadPool {\n    fn drop(&mut self) {\n        for worker in &mut self.workers {\n            if let Some(thread) = worker.thread.take() {\n                thread.join().unwrap();\n            }\n        }\n    }\n}', tags: ["graceful shutdown", "Drop", "join", "clean exit", "thread"],
                  deepDive: { explanation: "Graceful shutdown ensures that all in-progress work is completed before the program exits. For a thread pool, this means signaling workers to stop accepting new jobs, then joining each thread to wait for current work to finish. The Drop trait is used to implement cleanup logic when the ThreadPool goes out of scope. Workers need a way to receive the shutdown signal — typically by sending a special message through the channel or closing the sender. Taking the thread handle with take() moves it out of the Option, allowing join() to be called.", extendedCode: '<span class="keyword">enum</span> <span class="type">Message</span> {\n    <span class="type">NewJob</span>(Job),\n    <span class="type">Terminate</span>,\n}\n\n<span class="keyword">impl</span> Drop <span class="keyword">for</span> <span class="type">ThreadPool</span> {\n    <span class="keyword">fn</span> <span class="function">drop</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) {\n        <span class="macro">println!</span>(<span class="string">"Sending terminate message to all workers."</span>);\n        \n        <span class="keyword">for</span> _ <span class="keyword">in</span> &<span class="keyword">self</span>.workers {\n            <span class="keyword">self</span>.sender.as_ref().unwrap().send(<span class="type">Message</span>::<span class="type">Terminate</span>).unwrap();\n        }\n        \n        <span class="macro">println!</span>(<span class="string">"Shutting down all workers."</span>);\n        \n        <span class="keyword">for</span> worker <span class="keyword">in</span> &<span class="keyword">mut</span> <span class="keyword">self</span>.workers {\n            <span class="macro">println!</span>(<span class="string">"Shutting down worker {}"</span>, worker.id);\n            \n            <span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(thread) = worker.thread.take() {\n                thread.join().unwrap();\n            }\n        }\n    }\n}', keyPoints: ["Graceful shutdown completes in-progress work before exiting", "Signal workers to stop, then join threads", "Drop trait implements automatic cleanup", "Use Option::take() to move thread handles out for joining", "Prevents abrupt termination and data loss"], commonMistakes: ["Not joining threads (program might exit before work completes)", "Deadlocking by holding the lock while joining", "Not signaling workers to stop (they block forever on recv)"], relatedConcepts: ["Drop", "JoinHandle", "Channel", "Shutdown", "Thread"] } },

                // Appendices
                { id: 121, chapter: "App. A", section: "Keywords", title: "Rust Keywords", concept: "Reserved Words", description: "Rust has strict, reserved, and weak keywords. Examples: fn, let, mut, pub, impl, trait, async, await, unsafe, const, static, type, where.", code: 'strict: as, break, const, continue, crate, else, enum, extern, false, fn, for, if, impl, in, let, loop, match, mod, move, mut, pub, ref, return, self, Self, static, struct, super, trait, true, type, unsafe, use, where, while', tags: ["keyword", "reserved", "strict", "syntax", "identifier"],
                  deepDive: { explanation: "Rust keywords are reserved words that have special meaning to the compiler. Strict keywords cannot be used as identifiers (variable names, function names, etc.) in any context. Reserved keywords are reserved for future use and currently produce warnings. Weak keywords have special meaning only in specific contexts. Understanding keywords is essential for reading and writing Rust code. The list evolves with new editions — async and await were added in the 2018 edition, for example.", extendedCode: '<span class="comment">// Strict keywords (cannot use as identifiers)</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;      <span class="comment">// let is a keyword</span>\n<span class="keyword">fn</span> <span class="function">main</span>() {}   <span class="comment">// fn is a keyword</span>\n\n<span class="comment">// Reserved for future use</span>\n<span class="comment">// become, priv, typeof, unsized, yield, async, await, etc.</span>\n\n<span class="comment">// Weak keywords (context-specific)</span>\n<span class="comment">// 'union' is only a keyword when declaring a union</span>\n<span class="comment">// 'macro_rules' is only a keyword for macros</span>\n\n<span class="comment">// Raw identifiers allow using keywords as names</span>\n<span class="keyword">let</span> r#<span class="keyword">fn</span> = <span class="string">"this is a variable named 'fn'"</span>;\n<span class="macro">println!</span>(<span class="string">"{}"</span>, r#<span class="keyword">fn</span>);', keyPoints: ["Strict keywords cannot be used as identifiers", "Reserved keywords are held for future language features", "Weak keywords have special meaning only in specific contexts", "Raw identifiers (r#keyword) allow using keywords as names", "Keywords may be added in new editions"], commonMistakes: ["Using keywords as variable names without raw identifier syntax", "Not keeping up with new keywords added in editions", "Confusing weak keywords with strict keywords"], relatedConcepts: ["Identifier", "Syntax", "Edition", "Raw Identifier", "Reserved"] } },

                { id: 122, chapter: "App. B", section: "Operators", title: "Operators & Symbols", concept: "Syntax Reference", description: "Rust uses many operators: arithmetic (+, -, *, /, %), bitwise (&, |, ^, <<, >>), comparison (==, !=, <, >, <=, >=), logical (!, &&, ||), and dereference (*, &, &mut).", code: 'a + b; *ptr; &val; &mut val; a == b; a != b; a << b; a >> b; a & b; a | b; a ^ b', tags: ["operator", "symbol", "arithmetic", "bitwise", "dereference"],
                  deepDive: { explanation: "Rust has a comprehensive set of operators covering arithmetic, bitwise, comparison, logical, and dereference operations. Most operators are overloadable via traits (e.g., Add for +, Eq for ==). The ? operator is unique to Rust for error propagation. The .. and ..= operators create ranges. => is used in match arms. -> specifies return types. :: is the path separator. Understanding operator precedence is important for writing correct expressions. Rust's operator overloading is explicit — you implement traits, not magic methods.", extendedCode: '<span class="comment">// Arithmetic</span>\n<span class="keyword">let</span> sum = <span class="string">5</span> + <span class="string">10</span>;\n<span class="keyword">let</span> difference = <span class="string">95.5</span> - <span class="string">4.3</span>;\n<span class="keyword">let</span> product = <span class="string">4</span> * <span class="string">30</span>;\n<span class="keyword">let</span> quotient = <span class="string">56.7</span> / <span class="string">32.2</span>;\n<span class="keyword">let</span> remainder = <span class="string">43</span> % <span class="string">5</span>;\n\n<span class="comment">// Bitwise</span>\n<span class="keyword">let</span> and = <span class="string">5</span> & <span class="string">3</span>;   <span class="comment">// 1</span>\n<span class="keyword">let</span> or = <span class="string">5</span> | <span class="string">3</span>;    <span class="comment">// 7</span>\n<span class="keyword">let</span> xor = <span class="string">5</span> ^ <span class="string">3</span>;   <span class="comment">// 6</span>\n<span class="keyword">let</span> left = <span class="string">5</span> &lt;&lt; <span class="string">1</span>; <span class="comment">// 10</span>\n\n<span class="comment">// Comparison</span>\n<span class="keyword">let</span> eq = <span class="string">5</span> == <span class="string">5</span>;\n<span class="keyword">let</span> ne = <span class="string">5</span> != <span class="string">3</span>;\n<span class="keyword">let</span> gt = <span class="string">5</span> > <span class="string">3</span>;\n\n<span class="comment">// Logical</span>\n<span class="keyword">let</span> not = !<span class="keyword">true</span>;\n<span class="keyword">let</span> and = <span class="keyword">true</span> && <span class="keyword">false</span>;\n<span class="keyword">let</span> or = <span class="keyword">true</span> || <span class="keyword">false</span>;\n\n<span class="comment">// Dereference and reference</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">let</span> y = &x;\n<span class="keyword">let</span> z = *y;', keyPoints: ["Operators are overloadable via traits (Add, Sub, Eq, etc.)", "? is the error propagation operator", ".. and ..= create ranges", "Most operators cannot be chained like in Python (a < b < c is invalid)", "Bitwise operators work on integers"], commonMistakes: ["Using = instead of == for comparison", "Integer division truncating (5 / 2 = 2, not 2.5)", "Not understanding operator precedence and over-parenthesizing"], relatedConcepts: ["Trait", "Overloading", "Precedence", "Range", "Reference"] } },

                { id: 123, chapter: "App. C", section: "Derivable Traits", title: "Derivable Traits", concept: "Auto Traits", description: "Common derivable traits: Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash, Default. Add with #[derive(...)].", code: '#[derive(Debug, Clone, Copy, PartialEq, Eq)]\nstruct Point { x: i32, y: i32 }', tags: ["derive", "Debug", "Clone", "Copy", "trait", "macro"],
                  deepDive: { explanation: "The #[derive] attribute automatically generates trait implementations for structs and enums. Common derivable traits include: Debug (formatting with {:?}), Clone (explicit deep copy), Copy (implicit bitwise copy), PartialEq (== and !=), Eq (reflexive equality), PartialOrd (<, >, <=, >=), Ord (total ordering), Hash (for HashMap keys), and Default (default value construction). Deriving saves boilerplate and ensures consistency. Not all traits are derivable — Display, for example, requires manual implementation because there's no universal format. The derive macro generates code at compile time based on the struct/enum definition.", extendedCode: '<span class="keyword">#[derive</span>(Debug, Clone, Copy, PartialEq, Eq, PartialOrd, Ord, Hash, Default)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Point</span> {\n    x: <span class="type">i32</span>,\n    y: <span class="type">i32</span>,\n}\n\n<span class="comment">// Generated implementations:</span>\n<span class="comment">// - Debug: {:?} prints Point { x: 1, y: 2 }</span>\n<span class="comment">// - Clone: point.clone() creates a copy</span>\n<span class="comment">// - Copy: assignment copies, not moves</span>\n<span class="comment">// - PartialEq/Eq: == and != work</span>\n<span class="comment">// - PartialOrd/Ord: <, >, sorting work</span>\n<span class="comment">// - Hash: can be used as HashMap key</span>\n<span class="comment">// - Default: Point::default() gives Point { x: 0, y: 0 }</span>\n\n<span class="comment">// Custom Default</span>\n<span class="keyword">impl</span> Default <span class="keyword">for</span> <span class="type">Point</span> {\n    <span class="keyword">fn</span> <span class="function">default</span>() -> <span class="keyword">Self</span> {\n        <span class="type">Point</span> { x: <span class="string">0</span>, y: <span class="string">0</span> }\n    }\n}', keyPoints: ["#[derive] auto-generates trait implementations", "Common derivable traits: Debug, Clone, Copy, PartialEq, Eq, etc.", "All fields must implement the trait for derive to work", "Some traits like Display cannot be derived", "Custom implementations override derived ones"], commonMistakes: ["Deriving Copy on structs with non-Copy fields", "Deriving PartialEq when Eq is also needed (for HashMap keys)", "Not deriving Debug (makes debugging much harder)"], relatedConcepts: ["Trait", "Macro", "Debug", "Clone", "Default"] } },

                { id: 124, chapter: "App. D", section: "Development Tools", title: "Rustfmt", concept: "Code Formatting", description: "rustfmt automatically formats Rust code according to style guidelines. Run with cargo fmt.", code: '$ cargo fmt', tags: ["rustfmt", "format", "style", "cargo fmt", "tool"],
                  deepDive: { explanation: "rustfmt is Rust's official code formatting tool. It automatically reformats Rust code according to the official style guidelines, ensuring consistency across projects and teams. It's integrated with Cargo via cargo fmt. Configuration can be customized via rustfmt.toml (e.g., max line width, tab style, import formatting). rustfmt is usually run in CI to enforce style. Most editors have integration to format on save. Consistent formatting eliminates style debates and makes code reviews focus on substance rather than style.", extendedCode: '<span class="comment">// Format all files in the project</span>\n$ cargo fmt\n\n<span class="comment">// Check formatting without modifying (useful for CI)</span>\n$ cargo fmt -- --check\n\n<span class="comment">// rustfmt.toml configuration example</span>\nmax_width = <span class="string">100</span>\ntab_spaces = <span class="string">4</span>\nhard_tabs = <span class="keyword">false</span>\nimports_granularity = <span class="string">"Crate"</span>\n\n<span class="comment">// Format specific file</span>\n$ rustfmt src/main.rs', keyPoints: ["cargo fmt formats all Rust files in the project", "Uses official Rust style guidelines by default", "Configurable via rustfmt.toml", "Use --check in CI to enforce formatting", "Editor integration enables format-on-save"], commonMistakes: ["Not running rustfmt before committing", "Inconsistent formatting across team members", "Over-customizing rustfmt.toml (defeats the purpose of standardization)"], relatedConcepts: ["Style", "Formatting", "CI", "Editor", "cargo"] } },

                { id: 125, chapter: "App. D", section: "Development Tools", title: "Clippy", concept: "Linting", description: "Clippy is a collection of lints to catch common mistakes and improve idiomatic Rust code.", code: '$ cargo clippy', tags: ["clippy", "lint", "warning", "idiomatic", "tool"],
                  deepDive: { explanation: "Clippy is Rust's official linter, providing hundreds of lints to catch common mistakes, suggest idiomatic improvements, and enforce best practices. It goes beyond the compiler's warnings to detect issues like unnecessary clones, inefficient loops, suspicious patterns, and style violations. Clippy has different lint levels: allow, warn, deny, and forbid. Individual lints can be configured in clippy.toml or with attributes (#![allow(clippy::lint_name)]). Running clippy regularly improves code quality and helps learn Rust idioms. It's highly recommended for all Rust projects.", extendedCode: '<span class="comment">// Run clippy</span>\n$ cargo clippy\n\n<span class="comment">// Run with all lints enabled (pedantic)</span>\n$ cargo clippy -- -W clippy::pedantic\n\n<span class="comment">// Allow a specific lint in code</span>\n<span class="keyword">#[allow</span>(clippy::needless_return)<span class="keyword">]</span>\n<span class="keyword">fn</span> <span class="function">foo</span>() -> <span class="type">i32</span> {\n    <span class="keyword">return</span> <span class="string">42</span>;\n}\n\n<span class="comment">// Deny a lint (treat as error)</span>\n<span class="keyword">#![deny</span>(clippy::unwrap_used)<span class="keyword">]</span>\n\n<span class="comment">// clippy.toml configuration</span>\ncognitive-complexity-threshold = <span class="string">30</span>', keyPoints: ["Clippy provides hundreds of lints for code quality", "Detects common mistakes and suggests idiomatic alternatives", "Configurable via attributes and clippy.toml", "Different lint groups: correctness, suspicious, style, complexity, perf", "Recommended for all projects, especially in CI"], commonMistakes: ["Ignoring clippy warnings in production code", "Not configuring clippy for CI (warnings get ignored)", "Overriding too many lints instead of fixing underlying issues"], relatedConcepts: ["Lint", "Warning", "Idiomatic", "CI", "cargo"] } },

                { id: 126, chapter: "App. E", section: "Editions", title: "Rust Editions", concept: "Language Versions", description: "Editions allow Rust to evolve without breaking existing code. Current: 2015, 2018, 2021, 2024. Specified in Cargo.toml.", code: '[package]\nedition = "2024"', tags: ["edition", "2015", "2018", "2021", "2024", "version"],
                  deepDive: { explanation: "Rust editions are a mechanism for the language to evolve without breaking backward compatibility. Each edition (2015, 2018, 2021, 2024) can introduce syntax changes, new keywords, and different default behaviors. Code using different editions can interoperate within the same crate graph. The edition is specified in Cargo.toml. New projects should use the latest edition. Edition migrations can be automated with cargo fix. Key changes: 2018 introduced the module system overhaul and async/await keywords; 2021 added disjoint capture in closures and panic macro consistency; 2024 introduced gen blocks, never type, and other features.", extendedCode: '<span class="comment">// Cargo.toml</span>\n[<span class="function">package</span>]\nname = <span class="string">"my-project"</span>\nedition = <span class="string">"2024"</span>\n\n<span class="comment">// Edition-specific features</span>\n<span class="comment">// 2018: async/await keywords, module system changes</span>\n<span class="comment">// 2021: disjoint closure capture, panic consistency</span>\n<span class="comment">// 2024: gen blocks, never type `!`, new formatting</span>\n\n<span class="comment">// Migrate to new edition</span>\n<span class="comment">// $ cargo fix --edition</span>\n\n<span class="comment">// Check edition compatibility</span>\n<span class="comment">// $ cargo check</span>', keyPoints: ["Editions allow language evolution without breaking existing code", "Specified in Cargo.toml with edition = \"YYYY\"", "Different editions can interoperate in the same dependency graph", "cargo fix automates edition migration", "New projects should use the latest stable edition"], commonMistakes: ["Staying on old editions and missing new features", "Not running cargo fix when upgrading editions", "Confusing editions with Rust compiler versions"], relatedConcepts: ["Cargo.toml", "Migration", "Compatibility", "Version", "cargo fix"] } }
            ];

            // State
            let currentChapter = 'All';
            let searchQuery = '';
            let currentDetailId = null;

            // DOM Elements
            const chapterList = document.getElementById('chapterList');
            const notesGrid = document.getElementById('notesGrid');
            const globalSearch = document.getElementById('globalSearch');
            const mainTitle = document.getElementById('mainTitle');
            const resultCount = document.getElementById('resultCount');
            const stats = document.getElementById('stats');
            const backdrop = document.getElementById('backdrop');
            const detailPanel = document.getElementById('detailPanel');
            const detailTitle = document.getElementById('detailTitle');
            const detailConcept = document.getElementById('detailConcept');
            const detailLocation = document.getElementById('detailLocation');
            const detailBody = document.getElementById('detailBody');
            const detailTags = document.getElementById('detailTags');
            const detailId = document.getElementById('detailId');

            // Extract unique chapters
            const chapters = [...new Set(bookData.map(d => d.chapter))];

            // Render chapter list
            function renderChapters() {
                chapterList.innerHTML = '';

                const allItem = document.createElement('div');
                allItem.className = `chapter-item ${currentChapter === 'All' ? 'active' : ''}`;
                allItem.innerHTML = '<span class="ch-num">All</span> All Chapters';
                allItem.onclick = () => { currentChapter = 'All'; renderChapters(); filterNotes(); };
                chapterList.appendChild(allItem);

                chapters.forEach(ch => {
                    const item = document.createElement('div');
                    item.className = `chapter-item ${currentChapter === ch ? 'active' : ''}`;
                    const section = bookData.find(d => d.chapter === ch)?.section || '';
                    item.innerHTML = `<span class="ch-num">${ch}</span> ${section}`;
                    item.onclick = () => { currentChapter = ch; renderChapters(); filterNotes(); };
                    chapterList.appendChild(item);
                });
            }

            // Highlight search terms
            function highlightText(text, query) {
                if (!query) return text;
                const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
                return text.replace(regex, '<mark>$1</mark>');
            }

            function escapeRegex(string) {
                return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            // Render notes
            function renderNotes(notes) {
                if (notes.length === 0) {
                    notesGrid.innerHTML = `
                        <div class="no-results">
                            <h3>No notes found</h3>
                            <p>Try a different keyword or chapter filter.</p>
                        </div>
                    `;
                    resultCount.textContent = '0 results';
                    return;
                }

                notesGrid.innerHTML = notes.map(note => {
                    const title = highlightText(note.title, searchQuery);
                    const concept = highlightText(note.concept, searchQuery);
                    const desc = highlightText(note.description, searchQuery);
                    const code = note.code ? highlightText(note.code, searchQuery) : '';
                    const tags = note.tags.map(t => {
                        const isMatch = searchQuery && t.toLowerCase().includes(searchQuery.toLowerCase());
                        return `<span class="tag ${isMatch ? 'highlight' : ''}">${t}</span>`;
                    }).join('');

                    return `
                        <div class="note-card" onclick="openDetail(${note.id})">
                            <div class="note-header">
                                <div class="note-title">${title}</div>
                                <div class="note-location">${note.chapter} • ${note.section}</div>
                            </div>
                            <div class="note-concept">${concept}</div>
                            <div class="note-description">${desc}</div>
                            ${code ? `<div class="note-code"><pre>${code}</pre></div>` : ''}
                            <div class="note-tags">${tags}</div>
                        </div>
                    `;
                }).join('');

                resultCount.textContent = `${notes.length} result${notes.length !== 1 ? 's' : ''}`;
            }

            // Open detail panel
            function openDetail(id) {
                const note = bookData.find(n => n.id === id);
                if (!note) return;

                currentDetailId = id;

                detailTitle.textContent = note.title;
                detailConcept.textContent = note.concept;
                detailLocation.textContent = `${note.chapter} • ${note.section}`;
                detailId.textContent = `#${note.id}`;

                // Tags
                detailTags.innerHTML = note.tags.map(t => `<span class="tag">${t}</span>`).join('');

                // Build detail body
                let bodyHtml = '';

                if (note.deepDive) {
                    const dd = note.deepDive;

                    // Explanation
                    if (dd.explanation) {
                        bodyHtml += `
                            <div class="detail-section">
                                <h3>Deep Dive</h3>
                                <p>${dd.explanation}</p>
                            </div>
                        `;
                    }

                    // Extended code
                    if (dd.extendedCode) {
                        bodyHtml += `
                            <div class="detail-section">
                                <h3>Extended Example</h3>
                                <div class="detail-code-block">
                                    <button class="copy-code-btn" onclick="copyCode(this)">Copy</button>
                                    <pre>${dd.extendedCode}</pre>
                                </div>
                            </div>
                        `;
                    }

                    // Key points
                    if (dd.keyPoints && dd.keyPoints.length) {
                        bodyHtml += `
                            <div class="detail-section">
                                <h3>Key Points</h3>
                                <ul>
                                    ${dd.keyPoints.map(p => `<li>${p}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }

                    // Common mistakes
                    if (dd.commonMistakes && dd.commonMistakes.length) {
                        bodyHtml += `
                            <div class="detail-section">
                                <h3>Common Mistakes</h3>
                                <ul class="pitfalls">
                                    ${dd.commonMistakes.map(m => `<li>${m}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }

                    // Related concepts
                    if (dd.relatedConcepts && dd.relatedConcepts.length) {
                        bodyHtml += `
                            <div class="detail-section">
                                <h3>Related Concepts</h3>
                                <ul class="related">
                                    ${dd.relatedConcepts.map(r => `<li>${r}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                }

                // Original code
                if (note.code) {
                    bodyHtml += `
                        <div class="detail-section">
                            <h3>Quick Reference</h3>
                            <div class="detail-code-block">
                                <button class="copy-code-btn" onclick="copyCode(this)">Copy</button>
                                <pre>${note.code}</pre>
                            </div>
                        </div>
                    `;
                }

                detailBody.innerHTML = bodyHtml;

                backdrop.classList.add('active');
                detailPanel.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            // Close detail panel
            function closeDetail() {
                backdrop.classList.remove('active');
                detailPanel.classList.remove('active');
                document.body.style.overflow = '';
                currentDetailId = null;
            }

            // Copy code from detail panel
            function copyCode(btn) {
                const code = btn.nextElementSibling.textContent;
                navigator.clipboard.writeText(code).then(() => {
                    const original = btn.textContent;
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = original, 1500);
                });
            }

            // Filter logic
            function filterNotes() {
                const query = searchQuery.toLowerCase().trim();

                let filtered = bookData;

                if (currentChapter !== 'All') {
                    filtered = filtered.filter(n => n.chapter === currentChapter);
                }

                if (query) {
                    filtered = filtered.filter(n => {
                        const searchText = `${n.title} ${n.concept} ${n.description} ${n.code || ''} ${n.tags.join(' ')} ${n.section}`.toLowerCase();
                        return searchText.includes(query);
                    });
                }

                mainTitle.textContent = currentChapter === 'All' ? 'All Notes' : `${currentChapter}: ${bookData.find(d => d.chapter === currentChapter)?.section}`;
                renderNotes(filtered);
            }

            // Event listeners
            globalSearch.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                filterNotes();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && currentDetailId !== null) {
                    closeDetail();
                }
            });

            // Stats
            stats.textContent = `${bookData.length} concepts indexed`;

            // Initialize
            renderChapters();
            filterNotes();
        </script>
    </body>
</html>
