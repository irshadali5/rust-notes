                  deepDive: { explanation: "String concatenation in Rust has specific ownership semantics. The + operator takes ownership of the left operand and appends the right operand (which must be a &str). This is efficient because it can reuse the left String's allocation. However, it means the left String is consumed. For multiple concatenations, format! is preferred because it doesn't take ownership of any operand and is more readable. The add method (which + desugars to) requires &str on the right, so &String is automatically coerced to &str.", extendedCode: '<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"Hello, "</span>);\n<span class="keyword">let</span> s2 = <span class="type">String</span>::from(<span class="string">"world!"</span>);\n\n<span class="comment">// + takes ownership of s1, borrows s2</span>\n<span class="keyword">let</span> s3 = s1 + &s2; <span class="comment">// s1 is moved, s2 is still valid</span>\n<span class="comment">// println!("{}", s1); // ERROR: s1 was moved</span>\n\n<span class="comment">// format! doesn't take ownership</span>\n<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"tic"</span>);\n<span class="keyword">let</span> s2 = <span class="type">String</span>::from(<span class="string">"tac"</span>);\n<span class="keyword">let</span> s3 = <span class="type">String</span>::from(<span class="string">"toe"</span>);\n<span class="keyword">let</span> s = <span class="macro">format!</span>(<span class="string">"{}-{}-{}"</span>, s1, s2, s3);\n<span class="macro">println!</span>(<span class="string">"{} {} {} {}"</span>, s1, s2, s3, s); <span class="comment">// all valid</span>', keyPoints: ["+ takes ownership of the left String and borrows the right &str", "format! is preferred for multiple concatenations (no ownership taken)", "String + &String works due to Deref coercion (&String → &str)", "Repeated + operations are inefficient due to multiple allocations", "For many concatenations, consider using a Vec<&str> and join()"], commonMistakes: ["Using + when you need the left operand afterward (it's moved)", "Trying to add two String values without borrowing the right one", "Using + in a loop (O(n²) due to repeated reallocations)"], relatedConcepts: ["format!", "Deref Coercion", "Ownership", "Join", "Write trait"] } },

                { id: 53, chapter: "Ch. 8", section: "Common Collections", title: "Hash Maps", concept: "HashMap<K, V>", description: "Hash maps store key-value pairs. Keys must implement Eq and Hash traits.", code: 'use std::collections::HashMap;\nlet mut scores = HashMap::new();\nscores.insert(String::from("Blue"), 10);', tags: ["HashMap", "hash", "key-value", "insert", "collection"],
                  deepDive: { explanation: "HashMap<K, V> stores key-value pairs in a hash table, providing O(1) average-case lookup, insertion, and deletion. Keys must implement the Eq and Hash traits (or you can provide a custom hasher). By default, HashMap uses SipHash, which is resistant to HashDoS attacks. HashMap is not ordered — if you need insertion order, use IndexMap from crates.io. Values are owned by the HashMap; inserting a value moves it into the map. The entry API provides efficient insert-if-absent logic.", extendedCode: '<span class="keyword">use</span> std::collections::HashMap;\n\n<span class="keyword">let</span> <span class="keyword">mut</span> scores = <span class="type">HashMap</span>::new();\nscores.insert(<span class="type">String</span>::from(<span class="string">"Blue"</span>), <span class="string">10</span>);\nscores.insert(<span class="type">String</span>::from(<span class="string">"Yellow"</span>), <span class="string">50</span>);\n\n<span class="comment">// Accessing</span>\n<span class="keyword">let</span> blue_score = scores.get(<span class="string">"Blue"</span>); <span class="comment">// Option<&V></span>\n\n<span class="comment">// Iterating</span>\n<span class="keyword">for</span> (key, value) <span class="keyword">in</span> &scores {\n    <span class="macro">println!</span>(<span class="string">"{}: {}"</span>, key, value);\n}\n\n<span class="comment">// Entry API</span>\nscores.entry(<span class="type">String</span>::from(<span class="string">"Yellow"</span>))\n    .or_insert(<span class="string">50</span>);\nscores.entry(<span class="type">String</span>::from(<span class="string">"Red"</span>))\n    .or_insert(<span class="string">0</span>);', keyPoints: ["HashMap provides O(1) average-case lookup", "Keys must implement Eq and Hash traits", "Values are moved into the HashMap on insertion", "The entry API is efficient for insert-or-update operations", "Not ordered; use BTreeMap for sorted keys or IndexMap for insertion order"], commonMistakes: ["Using non-Hash types as keys (e.g., structs without #[derive(Hash)])", "Forgetting that values are moved (use references or Clone if needed)", "Assuming iteration order is deterministic (it changes between runs)"], relatedConcepts: ["Entry API", "Eq", "Hash", "BTreeMap", "Collection"] } },

                { id: 54, chapter: "Ch. 8", section: "Common Collections", title: "Hash Map Access", concept: "get & entry", description: "Use get to retrieve values. Use entry (or_insert) for insert-if-not-exists logic.", code: 'scores.entry(String::from("Yellow"))\n    .or_insert(50); // inserts 50 if key missing', tags: ["entry", "or_insert", "get", "default", "update"],
                  deepDive: { explanation: "The entry API provides a powerful way to handle insert-or-update logic efficiently. The entry method returns an Entry enum representing either an occupied or vacant key. or_insert inserts a value if the key is missing and returns a mutable reference to the value either way. or_insert_with is similar but takes a closure for lazy evaluation. or_default inserts the default value for the type. This API avoids redundant hash lookups that would occur with separate contains_key and insert calls.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> scores = <span class="type">HashMap</span>::new();\n\n<span class="comment">// Insert if absent, return mutable reference</span>\nscores.entry(<span class="string">"Blue"</span>).or_insert(<span class="string">10</span>);\n\n<span class="comment">// Lazy insertion with closure</span>\nscores.entry(<span class="string">"Blue"</span>).or_insert_with(|| {\n    <span class="macro">println!</span>(<span class="string">"Computing default..."</span>);\n    <span class="string">10</span>\n});\n\n<span class="comment">// Update existing value</span>\n<span class="keyword">let</span> count = scores.entry(<span class="string">"Blue"</span>).or_insert(<span class="string">0</span>);\n*count += <span class="string">1</span>; <span class="comment">// dereference to mutate</span>\n\n<span class="comment">// Using and_modify for conditional updates</span>\nscores.entry(<span class="string">"Yellow"</span>)\n    .and_modify(|e| *e += <span class="string">10</span>)\n    .or_insert(<span class="string">50</span>);', keyPoints: ["entry() returns Entry::Occupied or Entry::Vacant", "or_insert() inserts if missing and returns &mut V", "or_insert_with() lazily evaluates the default value", "and_modify() updates only if the key exists", "The entry API is more efficient than contains_key + insert"], commonMistakes: ["Forgetting to dereference the mutable reference returned by or_insert", "Using or_insert when or_insert_with would avoid unnecessary computation", "Not handling the Entry enum directly when complex logic is needed"], relatedConcepts: ["HashMap", "Entry", "or_insert", "Mutable Reference", "Closure"] } },

                // Chapter 9: Error Handling
                { id: 55, chapter: "Ch. 9", section: "Error Handling", title: "panic!", concept: "Unrecoverable Errors", description: "panic! macro stops execution and unwinds the stack (or aborts). Used for unrecoverable errors.", code: 'panic!("crash and burn");', tags: ["panic", "unrecoverable", "abort", "unwind", "crash"],
                  deepDive: { explanation: "panic! is Rust's mechanism for unrecoverable errors. When called, it prints an error message, unwinds the stack (running destructors), and aborts the program. By default, Rust unwinds the stack, but you can configure it to abort immediately (faster, smaller binary, but no cleanup). Panic should be used for bugs and unrecoverable states — never for expected errors like file not found or network failure. In tests, panic is expected and caught by the test harness. The panic! macro supports format strings like println!.", extendedCode: '<span class="comment">// Simple panic</span>\n<span class="macro">panic!</span>(<span class="string">"Something went wrong!"</span>);\n\n<span class="comment">// Panic with formatting</span>\n<span class="macro">panic!</span>(<span class="string">"Expected value to be 5, got {}"</span>, value);\n\n<span class="comment">// In debug, panic provides a backtrace (set RUST_BACKTRACE=1)</span>\n<span class="comment">// $ RUST_BACKTRACE=1 cargo run</span>\n\n<span class="comment">// Unwrap panics on None/Err</span>\n<span class="keyword">let</span> x: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt; = <span class="type">None</span>;\n<span class="comment">// x.unwrap(); // panics with generic message</span>\n\n<span class="comment">// Configuring panic behavior in Cargo.toml</span>\n<span class="comment">// [profile.release]</span>\n<span class="comment">// panic = \'abort\'</span>', keyPoints: ["panic! is for bugs and unrecoverable errors, not expected failures", "By default, panics unwind the stack (running destructors)", "Set RUST_BACKTRACE=1 to see the full call stack", "In release builds, you can configure panic = 'abort' for smaller binaries", "unwrap() and expect() call panic! on None/Err"], commonMistakes: ["Using panic! for expected errors (use Result instead)", "Using unwrap() in production library code", "Not setting RUST_BACKTRACE when debugging a panic"], relatedConcepts: ["Result", "unwrap", "expect", "Backtrace", "Abort"] } },

                { id: 56, chapter: "Ch. 9", section: "Error Handling", title: "Result<T, E>", concept: "Recoverable Errors", description: "Result is an enum: Ok(T) for success, Err(E) for failure. Used for operations that might fail.", code: 'enum Result<T, E> {\n    Ok(T),\n    Err(E),\n}\nlet f = File::open("hello.txt"); // returns Result<File, io::Error>', tags: ["Result", "Ok", "Err", "recoverable", "File"],
                  deepDive: { explanation: "Result<T, E> is Rust's primary type for recoverable errors. It's an enum with two variants: Ok(T) wrapping a success value, and Err(E) wrapping an error value. Functions that might fail return Result, forcing callers to acknowledge and handle the error case. This is the foundation of Rust's error handling strategy. Unlike exceptions in other languages, Result is part of the type system — the compiler ensures you don't ignore errors. The standard library uses Result extensively for I/O, parsing, and other fallible operations.", extendedCode: '<span class="keyword">use</span> std::fs::File;\n<span class="keyword">use</span> std::io::{self, Read};\n\n<span class="keyword">fn</span> <span class="function">read_file</span>(path: &<span class="type">str</span>) -> <span class="type">Result</span>&lt;<span class="type">String</span>, io::Error&gt; {\n    <span class="keyword">let</span> <span class="keyword">mut</span> file = <span class="type">File</span>::open(path)?; <span class="comment">// ? propagates Err</span>\n    <span class="keyword">let</span> <span class="keyword">mut</span> contents = <span class="type">String</span>::new();\n    file.read_to_string(&<span class="keyword">mut</span> contents)?;\n    <span class="type">Ok</span>(contents) <span class="comment">// wrap success in Ok</span>\n}\n\n<span class="comment">// Handling Result</span>\n<span class="keyword">match</span> read_file(<span class="string">"config.txt"</span>) {\n    <span class="type">Ok</span>(data) => <span class="macro">println!</span>(<span class="string">"Read: {}"</span>, data),\n    <span class="type">Err</span>(e) => <span class="macro">eprintln!</span>(<span class="string">"Error: {}"</span>, e),\n}', keyPoints: ["Result<T, E> has Ok(T) for success and Err(E) for failure", "Forces explicit error handling at compile time", "The ? operator propagates errors concisely", "Result is part of the type system, not an exception mechanism", "Many helper methods: map, and_then, unwrap_or, etc."], commonMistakes: ["Ignoring a Result (compiler warning in newer editions)", "Using unwrap() instead of proper error handling in libraries", "Creating custom error types when existing ones would suffice"], relatedConcepts: ["Option", "panic", "? Operator", "Error Trait", "map"] } },

                { id: 57, chapter: "Ch. 9", section: "Error Handling", title: "unwrap & expect", concept: "Convenience Methods", description: "unwrap returns the value inside Ok or panics on Err. expect is like unwrap but with a custom message.", code: 'let f = File::open("hello.txt").unwrap();\nlet f = File::open("hello.txt")\n    .expect("Failed to open hello.txt");', tags: ["unwrap", "expect", "panic", "convenience", "message"],
                  deepDive: { explanation: "unwrap() and expect() are convenience methods on Result and Option that extract the success value or panic if there is none. unwrap() panics with a generic message showing the error. expect() is identical but allows you to provide a custom panic message. These are useful for prototyping, tests, and cases where failure truly is unrecoverable (e.g., a missing critical config file on startup). However, in production library code and most applications, prefer proper error handling with match, if let, or ?. The expect message should explain why the program cannot continue, not just restate the error.", extendedCode: '<span class="keyword">let</span> f = <span class="type">File</span>::open(<span class="string">"hello.txt"</span>).unwrap();\n<span class="comment">// Panics: called `Result::unwrap()` on an `Err` value: ...</span>\n\n<span class="keyword">let</span> f = <span class="type">File</span>::open(<span class="string">"hello.txt"</span>)\n    .expect(<span class="string">"hello.txt should be included in this project"</span>);\n\n<span class="comment">// Good expect messages explain the assumption</span>\n<span class="keyword">let</span> port = env::var(<span class="string">"PORT"</span>)\n    .expect(<span class="string">"PORT must be set for the server to bind"</span>);\n\n<span class="comment">// unwrap on Option</span>\n<span class="keyword">let</span> last = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>].last().copied().unwrap(); <span class="comment">// 3</span>', keyPoints: ["unwrap() extracts Ok/Some or panics with a generic message", "expect() is like unwrap() but with a custom panic message", "Use only when failure is truly unrecoverable or in tests", "Good expect messages explain WHY the program can't continue", "In production code, use ? or match instead"], commonMistakes: ["Using unwrap() everywhere in production code", "Writing vague expect messages like 'failed' instead of explaining assumptions", "Using unwrap() when ? would be cleaner and more composable"], relatedConcepts: ["Result", "Option", "panic", "? Operator", "Error Handling"] } },

                { id: 58, chapter: "Ch. 9", section: "Error Handling", title: "Propagating Errors", concept: "? Operator", description: "The ? operator returns the Err value early from a function, or unwraps the Ok value.", code: 'fn read_username_from_file() -> Result<String, io::Error> {\n    let mut username = String::new();\n    File::open("hello.txt")?.read_to_string(&mut username)?;\n    Ok(username)\n}', tags: ["?", "propagate", "early return", "Result", "chaining"],
                  deepDive: { explanation: "The ? operator is Rust's concise error propagation mechanism. It can only be used in functions that return Result or Option. If the Result is Ok, ? unwraps it and continues. If the Result is Err, ? immediately returns the error from the function. The ? operator also works with Option in functions returning Option. In Rust 1.65+, it can be used in main() if main returns Result. The ? operator calls From::from on the error, allowing automatic error conversion if the target error type implements From for the source error type.", extendedCode: '<span class="keyword">use</span> std::fs::File;\n<span class="keyword">use</span> std::io::{self, Read};\n\n<span class="keyword">fn</span> <span class="function">read_username</span>() -> <span class="type">Result</span>&lt;<span class="type">String</span>, io::Error&gt; {\n    <span class="keyword">let</span> <span class="keyword">mut</span> username = <span class="type">String</span>::new();\n    \n    <span class="type">File</span>::open(<span class="string">"hello.txt"</span>)?.read_to_string(&<span class="keyword">mut</span> username)?;\n    \n    <span class="type">Ok</span>(username)\n}\n\n<span class="comment">// ? on Option</span>\n<span class="keyword">fn</span> <span class="function">last_char</span>(s: &<span class="type">str</span>) -> <span class="type">Option</span>&lt;<span class="type">char</span>&gt; {\n    <span class="keyword">let</span> last = s.chars().last()?; <span class="comment">// returns None if empty</span>\n    <span class="type">Some</span>(last)\n}\n\n<span class="comment">// In main (Rust 1.65+)</span>\n<span class="keyword">fn</span> <span class="function">main</span>() -> <span class="type">Result</span>&lt;(), <span class="type">Box</span>&lt;<span class="keyword">dyn</span> std::error::Error&gt;&gt; {\n    <span class="keyword">let</span> file = <span class="type">File</span>::open(<span class="string">"config.txt"</span>)?;\n    <span class="type">Ok</span>(())\n}', keyPoints: ["? unwraps Ok or returns Err early from the function", "Can only be used in functions returning Result, Option, or FromResidual types", "Automatically converts errors using From trait", "Works on both Result and Option (but not mixed in same function easily)", "Chains nicely: file.read_to_string(&mut s)?;"], commonMistakes: ["Using ? in a function that doesn't return Result/Option", "Forgetting that ? returns immediately on error (subsequent code doesn't run)", "Not implementing From for custom error types when using ? across error types"], relatedConcepts: ["Result", "From Trait", "Error Conversion", "Early Return", "main Result"] } },

                { id: 59, chapter: "Ch. 9", section: "Error Handling", title: "Custom Error Types", concept: "Error Trait", description: "Implement std::error::Error for custom types. Often combined with enums to represent multiple error kinds.", code: '#[derive(Debug)]\nenum MyError {\n    NotFound,\n    InvalidFormat,\n}', tags: ["custom error", "Error trait", "derive", "Debug", "enum"],
                  deepDive: { explanation: "For robust error handling in libraries and applications, you often need custom error types that represent domain-specific failures. The standard approach is to create an enum where each variant represents a different error condition, and implement std::error::Error for it. You should also implement Display for user-friendly error messages. The thiserror crate automates this boilerplate. For applications, the anyhow crate provides ergonomic error handling with automatic backtraces. Custom errors allow callers to match on specific error conditions and handle them appropriately.", extendedCode: '<span class="keyword">use</span> std::fmt;\n\n<span class="keyword">#[derive</span>(Debug)<span class="keyword">]</span>\n<span class="keyword">enum</span> <span class="type">MyError</span> {\n    <span class="type">NotFound</span> { file: <span class="type">String</span> },\n    <span class="type">InvalidFormat</span> { line: <span class="type">usize</span> },\n    <span class="type">Io</span>(std::io::Error),\n}\n\n<span class="keyword">impl</span> fmt::Display <span class="keyword">for</span> <span class="type">MyError</span> {\n    <span class="keyword">fn</span> <span class="function">fmt</span>(&<span class="keyword">self</span>, f: &<span class="keyword">mut</span> fmt::Formatter) -> fmt::Result {\n        <span class="keyword">match</span> <span class="keyword">self</span> {\n            <span class="type">MyError</span>::<span class="type">NotFound</span> { file } => {\n                <span class="macro">write!</span>(f, <span class="string">"File not found: {}"</span>, file)\n            }\n            <span class="type">MyError</span>::<span class="type">InvalidFormat</span> { line } => {\n                <span class="macro">write!</span>(f, <span class="string">"Invalid format at line {}"</span>, line)\n            }\n            <span class="type">MyError</span>::<span class="type">Io</span>(e) => <span class="macro">write!</span>(f, <span class="string">"IO error: {}"</span>, e),\n        }\n    }\n}\n\n<span class="keyword">impl</span> std::error::Error <span class="keyword">for</span> <span class="type">MyError</span> {}', keyPoints: ["Custom error enums represent domain-specific failures", "Implement Display for user-friendly messages and Debug for debugging", "Implement std::error::Error for compatibility with the ecosystem", "Use thiserror crate to derive Error and Display automatically", "Use anyhow crate for application error handling with less boilerplate"], commonMistakes: ["Using String as an error type (loses the ability to match on error kinds)", "Not implementing Error trait (incompatible with many ecosystem crates)", "Creating overly complex error hierarchies when a simple enum suffices"], relatedConcepts: ["Error Trait", "Display", "thiserror", "anyhow", "From"] } },

                // Chapter 10: Generics, Traits, Lifetimes
                { id: 60, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Generic Functions", concept: "Type Parameters", description: "Generics abstract over types to avoid code duplication while maintaining type safety at compile time.", code: 'fn largest<T: std::cmp::PartialOrd>(list: &[T]) -> &T {\n    let mut largest = &list[0];\n    for item in list {\n        if item > largest { largest = item; }\n    }\n    largest\n}', tags: ["generic", "T", "type parameter", "PartialOrd", "abstraction"],
                  deepDive: { explanation: "Generics allow you to write flexible, reusable code that works with multiple types while maintaining compile-time type safety. The compiler uses monomorphization — generating specific code for each concrete type used — so there's no runtime overhead compared to hand-written duplicated code. Type parameters (like <T>) are declared in angle brackets after the function name. You can constrain generics with trait bounds (e.g., T: PartialOrd) to ensure the type supports required operations. Multiple type parameters can be used (e.g., <K, V> for keys and values).", extendedCode: '<span class="comment">// Generic function with trait bound</span>\n<span class="keyword">fn</span> <span class="function">largest</span>&lt;T: std::cmp::PartialOrd&gt;(list: &[T]) -> &T {\n    <span class="keyword">let</span> <span class="keyword">mut</span> largest = &list[<span class="string">0</span>];\n    <span class="keyword">for</span> item <span class="keyword">in</span> list {\n        <span class="keyword">if</span> item > largest { largest = item; }\n    }\n    largest\n}\n\n<span class="comment">// Multiple type parameters</span>\n<span class="keyword">fn</span> <span class="function">pair</span>&lt;T, U&gt;(a: T, b: U) -> (T, U) {\n    (a, b)\n}\n\n<span class="comment">// Where clause for complex bounds</span>\n<span class="keyword">fn</span> <span class="function">compare</span>&lt;T, U&gt;(a: T, b: U) -> <span class="type">bool</span>\n<span class="keyword">where</span>\n    T: PartialOrd + Clone,\n    U: Into&lt;T&gt;,\n{\n    <span class="keyword">let</span> b_converted: T = b.into();\n    a == b_converted\n}', keyPoints: ["Generics enable code reuse without sacrificing type safety", "Monomorphization generates specific code at compile time — zero runtime cost", "Trait bounds restrict types to those with required capabilities", "Where clauses are clearer for complex bounds than inline syntax", "Type inference often means you don't need to specify T explicitly"], commonMistakes: ["Forgetting trait bounds (e.g., trying to compare T without T: PartialOrd)", "Over-constraining generics (requiring more traits than necessary)", "Using generics when trait objects (dyn Trait) would be more appropriate"], relatedConcepts: ["Trait Bounds", "Monomorphization", "Where Clause", "Type Parameters", "PartialOrd"] } },

                { id: 61, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Struct Generics", concept: "Generic Data Structures", description: "Structs and enums can hold generic data types. Multiple type parameters are allowed.", code: 'struct Point<T, U> {\n    x: T,\n    y: U,\n}\nlet p = Point { x: 5, y: 4.0 };', tags: ["generic struct", "Point", "multiple types", "T", "U"],
                  deepDive: { explanation: "Structs and enums can be generic over types, allowing them to hold any type specified at instantiation. This is how Vec<T>, HashMap<K, V>, and Option<T> are implemented. Generic structs can have multiple type parameters, and each field can use any of them. You can also implement methods on generic structs, either for all type parameters or with specific constraints. The PhantomData type is used when a struct needs to appear to use a generic parameter but doesn't actually store it (important for lifetimes and type safety).", extendedCode: '<span class="keyword">struct</span> <span class="type">Point</span>&lt;T, U&gt; {\n    x: T,\n    y: U,\n}\n\n<span class="keyword">let</span> p1 = <span class="type">Point</span> { x: <span class="string">5</span>, y: <span class="string">10</span> };       <span class="comment">// Point<i32, i32></span>\n<span class="keyword">let</span> p2 = <span class="type">Point</span> { x: <span class="string">5</span>, y: <span class="string">4.0</span> };      <span class="comment">// Point<i32, f64></span>\n<span class="keyword">let</span> p3 = <span class="type">Point</span> { x: <span class="string">"hi"</span>, y: <span class="string">\'c\'</span> };   <span class="comment">// Point<&str, char></span>\n\n<span class="comment">// Generic struct with methods</span>\n<span class="keyword">impl</span>&lt;T, U&gt; <span class="type">Point</span>&lt;T, U&gt; {\n    <span class="keyword">fn</span> <span class="function">x</span>(&<span class="keyword">self</span>) -> &T {\n        &<span class="keyword">self</span>.x\n    }\n}\n\n<span class="comment">// Method only for Point<f64, f64></span>\n<span class="keyword">impl</span> <span class="type">Point</span>&lt;<span class="type">f64</span>, <span class="type">f64</span>&gt; {\n    <span class="keyword">fn</span> <span class="function">distance_from_origin</span>(&<span class="keyword">self</span>) -> <span class="type">f64</span> {\n        (<span class="keyword">self</span>.x.powi(<span class="string">2</span>) + <span class="keyword">self</span>.y.powi(<span class="string">2</span>)).sqrt()\n    }\n}', keyPoints: ["Generic structs work with any type, specified at instantiation", "Multiple type parameters enable flexible data structures", "Methods can be implemented for all variants or specific type combinations", "PhantomData marks logical use of a type parameter not stored in a field", "Generic structs are monomorphized at compile time"], commonMistakes: ["Forgetting to declare all type parameters in the impl block", "Using the same type parameter name in conflicting scopes", "Not constraining type parameters when methods require specific traits"], relatedConcepts: ["PhantomData", "Monomorphization", "Impl Blocks", "Type Parameters", "Trait Bounds"] } },

                { id: 62, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Traits", concept: "Shared Behavior", description: "Traits define shared behavior (interfaces). Types implement traits to promise certain functionality.", code: 'pub trait Summary {\n    fn summarize(&self) -> String;\n}\nimpl Summary for NewsArticle { ... }', tags: ["trait", "interface", "Summary", "impl", "behavior"],
                  deepDive: { explanation: "Traits are Rust's mechanism for defining shared behavior, similar to interfaces in other languages. A trait defines a set of methods that types can implement. Traits enable polymorphism — writing code that works with any type implementing a specific trait. Traits can have default method implementations, allowing types to inherit behavior without reimplementing it. Traits can also require other traits (supertraits) and can be generic. The standard library uses traits extensively: Display for formatting, Clone for copying, PartialEq for comparison, and Iterator for iteration.", extendedCode: '<span class="keyword">pub trait</span> <span class="type">Summary</span> {\n    <span class="comment">// Required method</span>\n    <span class="keyword">fn</span> <span class="function">summarize</span>(&<span class="keyword">self</span>) -> <span class="type">String</span>;\n    \n    <span class="comment">// Default implementation</span>\n    <span class="keyword">fn</span> <span class="function">summarize_author</span>(&<span class="keyword">self</span>) -> <span class="type">String</span> {\n        <span class="type">String</span>::from(<span class="string">"(read more...)"</span>)\n    }\n}\n\n<span class="keyword">pub struct</span> <span class="type">NewsArticle</span> {\n    <span class="keyword">pub</span> headline: <span class="type">String</span>,\n    <span class="keyword">pub</span> location: <span class="type">String</span>,\n}\n\n<span class="keyword">impl</span> <span class="type">Summary</span> <span class="keyword">for</span> <span class="type">NewsArticle</span> {\n    <span class="keyword">fn</span> <span class="function">summarize</span>(&<span class="keyword">self</span>) -> <span class="type">String</span> {\n        <span class="macro">format!</span>(<span class="string">"{} by {}"</span>, <span class="keyword">self</span>.headline, <span class="keyword">self</span>.location)\n    }\n}', keyPoints: ["Traits define shared behavior (methods) that types can implement", "Traits can have default method implementations", "A type can implement multiple traits", "Traits can require other traits (supertraits) using colon syntax", "Orphan rule: you can implement a trait for a type if either is local to your crate"], commonMistakes: ["Violating the orphan rule (implementing external trait for external type)", "Forgetting to import traits to use their methods (trait must be in scope)", "Confusing traits with inheritance — traits are about behavior, not hierarchy"], relatedConcepts: ["Impl", "Trait Bounds", "Polymorphism", "Supertraits", "Orphan Rule"] } },

                { id: 63, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Trait Bounds", concept: "Constraining Generics", description: "Trait bounds restrict generic types to those that implement specific traits.", code: 'pub fn notify<T: Summary>(item: &T) {}\n// or with where clause:\npub fn notify<T>(item: &T) where T: Summary {}', tags: ["trait bound", "where", "constraint", "generic", "Summary"],
                  deepDive: { explanation: "Trait bounds constrain generic type parameters to types that implement specific traits. This ensures that generic code can call trait methods on the type. Trait bounds can be specified inline (<T: Trait>) or in a where clause (where T: Trait). Where clauses are preferred for complex bounds or multiple constraints. You can specify multiple bounds with + (e.g., T: Display + Clone). Trait bounds are checked at compile time, and monomorphization generates specific code for each type used. The compiler uses trait bounds to determine which methods are available on a generic type.", extendedCode: '<span class="comment">// Inline trait bound</span>\n<span class="keyword">pub fn</span> <span class="function">notify</span>&lt;T: Summary&gt;(item: &T) {\n    <span class="macro">println!</span>(<span class="string">"Breaking! {}"</span>, item.summarize());\n}\n\n<span class="comment">// Where clause (preferred for complex bounds)</span>\n<span class="keyword">pub fn</span> <span class="function">notify</span>&lt;T&gt;(item: &T)\n<span class="keyword">where</span>\n    T: Summary + Clone + Debug,\n{\n    <span class="macro">println!</span>(<span class="string">"Breaking! {}"</span>, item.summarize());\n}\n\n<span class="comment">// Multiple type parameters with bounds</span>\n<span class="keyword">pub fn</span> <span class="function">mix</span>&lt;T, U&gt;(t: T, u: U) -> <span class="type">String</span>\n<span class="keyword">where</span>\n    T: Display + Clone,\n    U: Clone + Debug,\n{\n    <span class="macro">format!</span>(<span class="string">"t: {}, u: {:?}"</span>, t, u)\n}', keyPoints: ["Trait bounds ensure generic types support required operations", "Where clauses are clearer for multiple or complex bounds", "Multiple bounds use + syntax: T: Display + Clone", "The compiler uses bounds to resolve method calls on generic types", "Bounds can be conditional (impl<T: Display> Trait for Type<T>)"], commonMistakes: ["Forgetting trait bounds and getting 'method not found' errors on generic types", "Over-constraining bounds (requiring Clone when only Display is needed)", "Using inline bounds when where clauses would be more readable"], relatedConcepts: ["Generics", "Traits", "Where Clause", "Monomorphization", "Multiple Bounds"] } },

                { id: 64, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Trait Objects", concept: "Dynamic Dispatch", description: "Trait objects (dyn Trait) allow polymorphism. They use dynamic dispatch and must be used behind a pointer.", code: 'pub fn notify(item: &dyn Summary) {\n    println!("Breaking! {}", item.summarize());\n}', tags: ["dyn", "trait object", "dynamic dispatch", "polymorphism", "pointer"],
                  deepDive: { explanation: "Trait objects (dyn Trait) provide dynamic polymorphism in Rust. Unlike generics which use static dispatch (monomorphization), trait objects use dynamic dispatch via a vtable. The dyn keyword makes the dynamic nature explicit. Trait objects must be used behind a pointer (&dyn Trait, Box<dyn Trait>, or Rc<dyn Trait>) because their size is unknown at compile time. Trait objects are useful when you need a collection of heterogeneous types or when you want to reduce code bloat from monomorphization. However, they have a small runtime cost and only support object-safe traits.", extendedCode: '<span class="comment">// Trait object with reference</span>\n<span class="keyword">pub fn</span> <span class="function">notify</span>(item: &<span class="keyword">dyn</span> <span class="type">Summary</span>) {\n    <span class="macro">println!</span>(<span class="string">"Breaking! {}"</span>, item.summarize());\n}\n\n<span class="comment">// Trait object with Box (owned)</span>\n<span class="keyword">let</span> article = <span class="type">NewsArticle</span> { ... };\n<span class="keyword">let</span> item: <span class="type">Box</span>&lt;<span class="keyword">dyn</span> <span class="type">Summary</span>&gt; = <span class="type">Box</span>::new(article);\n\n<span class="comment">// Vector of trait objects (heterogeneous collection)</span>\n<span class="keyword">let</span> items: <span class="type">Vec</span>&lt;<span class="type">Box</span>&lt;<span class="keyword">dyn</span> <span class="type">Summary</span>&gt;&gt; = <span class="macro">vec!</span>[\n    <span class="type">Box</span>::new(<span class="type">NewsArticle</span> { ... }),\n    <span class="type">Box</span>::new(<span class="type">Tweet</span> { ... }),\n];\n\n<span class="comment">// Object-safe traits cannot have Self: Sized methods</span>', keyPoints: ["dyn Trait is a trait object using dynamic dispatch", "Must be behind a pointer: &dyn, Box<dyn>, Rc<dyn>, etc.", "Useful for heterogeneous collections and reducing code size", "Has small runtime overhead (vtable lookup) compared to static dispatch", "Only object-safe traits can be made into trait objects"], commonMistakes: ["Using dyn Trait without a pointer (compiler error: unsized)", "Using trait objects when generics would be simpler and faster", "Trying to use non-object-safe traits as trait objects"], relatedConcepts: ["Dynamic Dispatch", "Vtable", "Box", "Object Safety", "Polymorphism"] } },

                { id: 65, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Lifetimes", concept: "Reference Validity", description: "Lifetimes ensure references are valid as long as needed. They are compile-time checks, not runtime.", code: 'fn longest<\'a>(x: &\'a str, y: &\'a str) -> &\'a str {\n    if x.len() > y.len() { x } else { y }\n}', tags: ["lifetime", "\'a", "reference", "validity", "annotation"],
                  deepDive: { explanation: "Lifetimes are Rust's way of ensuring references are always valid. They track how long references live relative to each other and the data they point to. Lifetime annotations (like 'a) describe relationships between lifetimes but don't change how long anything actually lives. The borrow checker uses these annotations to verify that references never outlive their data. Most of the time, the compiler infers lifetimes (lifetime elision), but explicit annotations are needed when the compiler can't determine the relationship, especially for function returns that borrow from parameters.", extendedCode: '<span class="comment">// Explicit lifetime annotation</span>\n<span class="keyword">fn</span> <span class="function">longest</span>&lt;<span class="keyword">\'a</span>&gt;(x: &<span class="keyword">\'a</span> <span class="type">str</span>, y: &<span class="keyword">\'a</span> <span class="type">str</span>) -> &<span class="keyword">\'a</span> <span class="type">str</span> {\n    <span class="keyword">if</span> x.len() > y.len() { x } <span class="keyword">else</span> { y }\n}\n\n<span class="comment">// The returned reference lives as long as the shorter input</span>\n<span class="keyword">let</span> string1 = <span class="type">String</span>::from(<span class="string">"long string is long"</span>);\n<span class="keyword">let</span> result;\n{\n    <span class="keyword">let</span> string2 = <span class="type">String</span>::from(<span class="string">"xyz"</span>);\n    result = longest(string1.as_str(), string2.as_str());\n    <span class="macro">println!</span>(<span class="string">"The longest string is {}"</span>, result); <span class="comment">// OK</span>\n}\n<span class="comment">// println!("{}", result); // ERROR: string2 dropped</span>\n\n<span class="comment">// Lifetime in struct</span>\n<span class="keyword">struct</span> <span class="type">Excerpt</span>&lt;<span class="keyword">\'a</span>&gt; {\n    part: &<span class="keyword">\'a</span> <span class="type">str</span>,\n}', keyPoints: ["Lifetimes ensure references are always valid", "They are compile-time checks with zero runtime cost", "Lifetime annotations describe relationships, not durations", "The compiler infers most lifetimes (elision rules)", "Structs holding references must have lifetime parameters"], commonMistakes: ["Thinking lifetimes change how long values live (they don't)", "Over-annotating lifetimes when the compiler can infer them", "Returning references to local variables (lifetime mismatch)"], relatedConcepts: ["Borrow Checker", "Reference", "Scope", "Lifetime Elision", "Struct Lifetimes"] } },

                { id: 66, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Lifetime Elision", concept: "Automatic Inference", description: "The compiler can infer lifetimes in common patterns (elision rules), reducing annotation boilerplate.", code: 'fn first_word(s: &str) -> &str { ... }\n// Same as: fn first_word<\'a>(s: &\'a str) -> &\'a str', tags: ["elision", "lifetime inference", "compiler", "shorthand", "rules"],
                  deepDive: { explanation: "Lifetime elision is a set of rules the compiler uses to automatically infer lifetime annotations in common patterns, reducing boilerplate. There are three elision rules: (1) each parameter that is a reference gets its own lifetime parameter, (2) if there's exactly one input lifetime parameter, it's assigned to all output lifetime parameters, and (3) if there are multiple input lifetime parameters but one is &self or &mut self, the self lifetime is assigned to all output lifetime parameters. If the compiler can't resolve lifetimes after applying these rules, explicit annotations are required. This is why fn first_word(s: &str) -> &str works without explicit 'a annotations.", extendedCode: '<span class="comment">// Elision: compiler infers lifetimes</span>\n<span class="keyword">fn</span> <span class="function">first_word</span>(s: &<span class="type">str</span>) -> &<span class="type">str</span> { ... }\n<span class="comment">// Expanded: fn first_word&lt;\'a&gt;(s: &\'a str) -> &\'a str</span>\n\n<span class="comment">// Elision with multiple parameters (Rule 3 for methods)</span>\n<span class="keyword">impl</span>&lt;<span class="keyword">\'a</span>&gt; <span class="type">Excerpt</span>&lt;<span class="keyword">\'a</span>&gt; {\n    <span class="keyword">fn</span> <span class="function">content</span>(&<span class="keyword">self</span>) -> &<span class="type">str</span> { ... }\n    <span class="comment">// Expanded: fn content(&\'a self) -> &\'a str</span>\n}\n\n<span class="comment">// When elision fails, explicit annotations needed</span>\n<span class="keyword">fn</span> <span class="function">longest</span>&lt;<span class="keyword">\'a</span>, <span class="keyword">\'b</span>&gt;(x: &<span class="keyword">\'a</span> <span class="type">str</span>, y: &<span class="keyword">\'b</span> <span class="type">str</span>) -> &<span class="keyword">\'a</span> <span class="type">str</span> { ... }\n<span class="comment">// Multiple input lifetimes, ambiguous output — must annotate</span>', keyPoints: ["Elision rules reduce lifetime annotation boilerplate", "Rule 1: Each ref parameter gets its own lifetime", "Rule 2: Single input lifetime → all output lifetimes", "Rule 3: &self lifetime → all output lifetimes (for methods)", "Explicit annotations needed when rules don't resolve all lifetimes"], commonMistakes: ["Assuming elision works for all cases (fails with multiple unrelated input references)", "Confusing elision with 'no lifetimes needed' — lifetimes are always present", "Explicitly annotating when elision would handle it (unnecessary verbosity)"], relatedConcepts: ["Lifetime", "Borrow Checker", "Reference", "Inference", "Rules"] } },

                // Chapter 11: Tests
                { id: 67, chapter: "Ch. 11", section: "Writing Tests", title: "Test Functions", concept: "Unit Testing", description: "Tests are functions annotated with #[test]. Run with cargo test. They panic on failure.", code: '#[test]\nfn it_works() {\n    let result = 2 + 2;\n    assert_eq!(result, 4);\n}', tags: ["test", "#[test]", "cargo test", "unit", "assert"],
                  deepDive: { explanation: "Tests in Rust are regular functions annotated with #[test]. They are compiled as part of a test binary and run by the test harness. A test passes if it completes without panicking; it fails if it panics. The standard library provides assertion macros: assert!, assert_eq!, assert_ne!. Tests can be in the same file as the code (unit tests, inside #[cfg(test)] mod tests) or in separate files in the tests/ directory (integration tests). cargo test compiles and runs all tests, printing results and capturing stdout by default.", extendedCode: '<span class="comment">// Unit test in the same file</span>\n<span class="keyword">#[cfg</span>(test)<span class="keyword">]</span>\n<span class="keyword">mod</span> tests {\n    <span class="keyword">use super</span>::*;\n    \n    <span class="keyword">#[test]</span>\n    <span class="keyword">fn</span> <span class="function">it_works</span>() {\n        <span class="macro">assert_eq!</span>(<span class="string">2</span> + <span class="string">2</span>, <span class="string">4</span>);\n    }\n    \n    <span class="keyword">#[test]</span>\n    <span class="keyword">fn</span> <span class="function">exploration</span>() {\n        <span class="macro">assert!</span>(<span class="string">2</span> + <span class="string">2</span> == <span class="string">4</span>);\n    }\n}\n\n<span class="comment">// Run tests: cargo test</span>\n<span class="comment">// Run specific test: cargo test it_works</span>\n<span class="comment">// Show output: cargo test -- --nocapture</span>', keyPoints: ["#[test] marks a function as a test", "Tests pass if they don't panic; fail if they panic", "Unit tests go in #[cfg(test)] mod tests within source files", "Integration tests go in the tests/ directory", "cargo test runs all tests and reports results"], commonMistakes: ["Forgetting #[cfg(test)] around unit test modules (unnecessary binary bloat)", "Writing tests that don't actually assert anything", "Not using assert_eq! when checking equality (better error messages)"], relatedConcepts: ["assert", "assert_eq", "Integration Test", "cfg(test)", "Test Harness"] } },

                { id: 68, chapter: "Ch. 11", section: "Writing Tests", title: "Assertions", concept: "assert!, assert_eq!, assert_ne!", description: "assert! checks for true. assert_eq! checks equality. assert_ne! checks inequality. All take optional message.", code: 'assert!(true);\nassert_eq!(left, right);\nassert_ne!(left, right, "custom message");', tags: ["assert", "assert_eq", "assert_ne", "equality", "check"],
                  deepDive: { explanation: "Rust provides several assertion macros for testing. assert! checks that a boolean expression is true. assert_eq! checks that two expressions are equal using PartialEq, and assert_ne! checks that they are not equal. These macros take optional format string arguments for custom error messages. On failure, they panic with a descriptive message showing the file, line, and values involved. assert_eq! and assert_ne! use == and != operators respectively, so the types must implement PartialEq. There are also debug-only versions: debug_assert!, debug_assert_eq!, and debug_assert_ne! which are stripped in release builds.", extendedCode: '<span class="macro">assert!</span>(<span class="string">2</span> + <span class="string">2</span> == <span class="string">4</span>);\n\n<span class="macro">assert_eq!</span>(<span class="string">2</span> + <span class="string">2</span>, <span class="string">4</span>);\n<span class="macro">assert_ne!</span>(<span class="string">2</span> + <span class="string">2</span>, <span class="string">5</span>);\n\n<span class="comment">// With custom message</span>\n<span class="macro">assert!</span>(\n    result.is_ok(),\n    <span class="string">"Expected Ok, got Err: {:?}"</span>,\n    result\n);\n\n<span class="comment">// Debug assertions (removed in release builds)</span>\n<span class="macro">debug_assert!</span>(<span class="string">2</span> + <span class="string">2</span> == <span class="string">4</span>);\n\n<span class="comment">// assert_eq! shows left and right values on failure</span>\n<span class="comment">// thread \'main\' panicked at \'assertion failed: `(left == right)`</span>\n<span class="comment">//  left: `4`,</span>\n<span class="comment">// right: `5`', keyPoints: ["assert! checks boolean conditions", "assert_eq! and assert_ne! check equality/inequality with better error messages", "Custom messages help diagnose failures", "debug_assert! variants are stripped in release builds", "assert_eq! requires PartialEq; for custom types, derive or implement it"], commonMistakes: ["Using assert! with == instead of assert_eq! (worse error messages)", "Passing non-boolean expressions to assert! (compiler error)", "Relying on debug_assert! for safety checks (they disappear in release)"], relatedConcepts: ["Panic", "PartialEq", "Debug", "Test", "Macro"] } },

                { id: 69, chapter: "Ch. 11", section: "Writing Tests", title: "should_panic", concept: "Expected Failures", description: "should_panic tests verify that code panics as expected. Use expected to check the panic message.", code: '#[test]\n#[should_panic(expected = "index out of bounds")]\nfn test_panic() {\n    v[99]; // should panic\n}', tags: ["should_panic", "panic", "expected", "failure", "test"],
                  deepDive: { explanation: "The #[should_panic] attribute marks a test that is expected to panic. If the test function panics, the test passes; if it completes normally, the test fails. The expected parameter allows you to verify that the panic message contains a specific substring, ensuring the code panics for the right reason. This is useful for testing error conditions and ensuring that invalid operations are caught. If expected is provided and the panic message doesn't contain it, the test fails. Without expected, any panic causes the test to pass.", extendedCode: '<span class="keyword">#[test]</span>\n<span class="keyword">#[should_panic]</span>\n<span class="keyword">fn</span> <span class="function">test_any_panic</span>() {\n    <span class="macro">panic!</span>(<span class="string">"oh no"</span>);\n}\n\n<span class="keyword">#[test]</span>\n<span class="keyword">#[should_panic(expected = <span class="string">"index out of bounds"</span>)]</span>\n<span class="keyword">fn</span> <span class="function">test_specific_panic</span>() {\n    <span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n    <span class="keyword">let</span> _ = v[<span class="string">99</span>]; <span class="comment">// panics with "index out of bounds"</span>\n}\n\n<span class="comment">// For more control, use std::panic::catch_unwind</span>\n<span class="keyword">use</span> std::panic;\n\n<span class="keyword">#[test]</span>\n<span class="keyword">fn</span> <span class="function">test_result</span>() {\n    <span class="keyword">let</span> result = panic::catch_unwind(|| {\n        <span class="macro">panic!</span>(<span class="string">"oh no"</span>);\n    });\n    <span class="macro">assert!</span>(result.is_err());\n}', keyPoints: ["#[should_panic] expects the test to panic", "expected checks that the panic message contains a substring", "Useful for testing error conditions and invalid inputs", "For more control, use std::panic::catch_unwind", "Tests without panic fail when #[should_panic] is present"], commonMistakes: ["Using should_panic when Result-based testing would be clearer", "expected substring not matching due to formatting differences", "Forgetting that should_panic tests pass on ANY panic (use expected to verify)"], relatedConcepts: ["Panic", "Error Testing", "catch_unwind", "Expected", "Failure"] } },

                { id: 70, chapter: "Ch. 11", section: "Writing Tests", title: "Result in Tests", concept: "Returning Result", description: "Tests can return Result<T, E> instead of panicking. Use ? for early returns on error.", code: '#[test]\nfn test_with_result() -> Result<(), String> {\n    if 2 + 2 == 4 { Ok(()) } else { Err(String::from("bad math")) }\n}', tags: ["Result", "test", "return", "Ok", "Err"],
                  deepDive: { explanation: "Test functions can return Result<(), E> instead of using assertions. The test passes if the function returns Ok(()) and fails if it returns Err. This allows using the ? operator in tests for concise error propagation. The error type must implement Debug so the test harness can print it on failure. This pattern is particularly useful for integration tests that perform I/O or other fallible operations. However, for simple unit tests, assertion macros are usually preferred because they provide better failure messages with line numbers.", extendedCode: '<span class="keyword">#[test]</span>\n<span class="keyword">fn</span> <span class="function">file_exists</span>() -> <span class="type">Result</span>&lt;(), <span class="type">std::io::Error</span>&gt; {\n    <span class="keyword">use</span> std::fs;\n    fs::read_to_string(<span class="string">"test_data.txt"</span>)?;\n    <span class="type">Ok</span>(())\n}\n\n<span class="keyword">#[test]</span>\n<span class="keyword">fn</span> <span class="function">complex_operation</span>() -> <span class="type">Result</span>&lt;(), <span class="type">String</span>&gt; {\n    <span class="keyword">let</span> result = some_operation()?;\n    <span class="keyword">if</span> result == <span class="string">42</span> {\n        <span class="type">Ok</span>(())\n    } <span class="keyword">else</span> {\n        <span class="type">Err</span>(<span class="macro">format!</span>(<span class="string">"Expected 42, got {}"</span>, result))\n    }\n}', keyPoints: ["Tests can return Result<(), E> for ?-based error handling", "Ok(()) means pass; Err means fail", "Error type must implement Debug", "Useful for I/O-heavy integration tests", "Assertion macros often provide better failure messages for unit tests"], commonMistakes: ["Using Result in tests when simple assertions would be clearer", "Forgetting that the error type must implement Debug", "Returning Ok with a value instead of Ok(()) — test functions expect unit"], relatedConcepts: ["Result", "? Operator", "Integration Test", "Error Handling", "Debug"] } },

                { id: 71, chapter: "Ch. 11", section: "Writing Tests", title: "Test Organization", concept: "Unit vs Integration", description: "Unit tests go in src files with #[cfg(test)]. Integration tests go in tests/ directory and test the public API.", code: '// src/lib.rs\n#[cfg(test)]\nmod tests { ... }\n\n// tests/integration_test.rs\nuse my_crate;', tags: ["unit test", "integration test", "cfg(test)", "tests directory", "organization"],
                  deepDive: { explanation: "Rust has three types of tests: unit tests, integration tests, and documentation tests. Unit tests go in the same file as the code, inside a #[cfg(test)] mod tests block, and test private functions. Integration tests go in the tests/ directory at the project root, are separate crates, and can only test the public API. Doc tests are code examples in /// comments that cargo test compiles and runs. Each integration test file is a separate binary, so they run in parallel but compile independently. For shared integration test code, use a tests/common/mod.rs module.", extendedCode: '<span class="comment">// src/lib.rs - Unit tests</span>\n<span class="keyword">pub fn</span> <span class="function">add</span>(a: <span class="type">i32</span>, b: <span class="type">i32</span>) -> <span class="type">i32</span> { a + b }\n\n<span class="keyword">#[cfg</span>(test)<span class="keyword">]</span>\n<span class="keyword">mod</span> tests {\n    <span class="keyword">use super</span>::*;\n    \n    <span class="keyword">#[test]</span>\n    <span class="keyword">fn</span> <span class="function">test_add</span>() {\n        <span class="macro">assert_eq!</span>(add(<span class="string">2</span>, <span class="string">2</span>), <span class="string">4</span>);\n    }\n}\n\n<span class="comment">// tests/integration_test.rs</span>\n<span class="keyword">use</span> my_crate;\n\n<span class="keyword">#[test]</span>\n<span class="keyword">fn</span> <span class="function">test_add_public</span>() {\n    <span class="macro">assert_eq!</span>(my_crate::add(<span class="string">2</span>, <span class="string">2</span>), <span class="string">4</span>);\n}\n\n<span class="comment">// tests/common/mod.rs - shared test utilities</span>\n<span class="keyword">pub fn</span> <span class="function">setup</span>() { ... }', keyPoints: ["Unit tests test private code in #[cfg(test)] modules", "Integration tests are in tests/ and test public API only", "Doc tests in /// comments are compiled and run by cargo test", "Each integration test file is a separate binary", "tests/common/mod.rs for shared test utilities"], commonMistakes: ["Trying to test private functions from integration tests (use pub(crate) or unit tests)", "Putting integration tests in src/ instead of tests/", "Not using #[cfg(test)] for unit tests (includes test code in release binaries)"], relatedConcepts: ["cfg(test)", "Integration Test", "Doc Test", "Public API", "Module"] } },

                // Chapter 12: I/O Project
                { id: 72, chapter: "Ch. 12", section: "I/O Project", title: "CLI Arguments", concept: "env::args", description: "Collect command line arguments using std::env::args. The first argument is the program name.", code: 'let args: Vec<String> = env::args().collect();\nlet query = &args[1];\nlet file_path = &args[2];', tags: ["args", "CLI", "command line", "env", "collect"],
                  deepDive: { explanation: "std::env::args() returns an iterator over the command line arguments passed to the program. The first argument (index 0) is always the program name/path. Subsequent arguments are the user-provided values. args() panics if any argument contains invalid Unicode. For robust argument parsing, use the clap crate (or structopt/argh which derive from structs). env::args_os() returns OsString values that don't panic on invalid Unicode but are harder to work with. Argument parsing should validate input and provide helpful error messages.", extendedCode: '<span class="keyword">use</span> std::env;\n\n<span class="keyword">let</span> args: <span class="type">Vec</span>&lt;<span class="type">String</span>&gt; = env::args().collect();\n\n<span class="comment">// args[0] is the program name</span>\n<span class="keyword">let</span> program = &args[<span class="string">0</span>];\n<span class="keyword">let</span> query = &args[<span class="string">1</span>];\n<span class="keyword">let</span> file_path = &args[<span class="string">2</span>];\n\n<span class="comment">// Better: use clap for robust parsing</span>\n<span class="comment">// [dependencies]</span>\n<span class="comment">// clap = { version = "4", features = ["derive"] }</span>\n\n<span class="keyword">use</span> clap::Parser;\n\n<span class="keyword">#[derive</span>(Parser)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Args</span> {\n    query: <span class="type">String</span>,\n    file_path: <span class="type">String</span>,\n}\n\n<span class="keyword">let</span> args = <span class="type">Args</span>::parse();', keyPoints: ["args().collect() returns Vec<String> with program name at index 0", "args() panics on invalid Unicode; use args_os() for robust handling", "clap crate is the standard for robust CLI argument parsing", "Always validate arguments and provide usage help", "Environment variables can be read with env::var()"], commonMistakes: ["Not checking the number of arguments before accessing indices", "Using args() when args_os() would be more robust for file paths", "Parsing arguments manually instead of using clap (error-prone)"], relatedConcepts: ["env", "args_os", "clap", "CLI", "Argument Parsing"] } },

                { id: 73, chapter: "Ch. 12", section: "I/O Project", title: "Reading Files", concept: "fs::read_to_string", description: "Read an entire file into a String. For larger files, use BufReader for efficiency.", code: 'use std::fs;\nlet contents = fs::read_to_string(file_path)\n    .expect("Should have been able to read the file");', tags: ["fs", "read_to_string", "file", "read", "IO"],
                  deepDive: { explanation: "std::fs::read_to_string is a convenience function that opens a file, reads all contents, and returns a String. It's ideal for small to medium files. For large files, use BufReader to read line-by-line or chunk-by-chunk to avoid loading everything into memory. The ? operator is preferred over expect for library code. File I/O errors include permission denied, file not found, and read errors. For binary files, use fs::read which returns Vec<u8>. Always handle errors appropriately — don't use expect in library code.", extendedCode: '<span class="keyword">use</span> std::fs;\n<span class="keyword">use</span> std::io::{self, BufRead, BufReader};\n\n<span class="comment">// Simple read (small files)</span>\n<span class="keyword">let</span> contents = fs::read_to_string(<span class="string">"file.txt"</span>)?;\n\n<span class="comment">// Read lines (memory efficient for large files)</span>\n<span class="keyword">let</span> file = fs::File::open(<span class="string">"file.txt"</span>)?;\n<span class="keyword">let</span> reader = BufReader::new(file);\n<span class="keyword">for</span> line <span class="keyword">in</span> reader.lines() {\n    <span class="keyword">let</span> line = line?;\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, line);\n}\n\n<span class="comment">// Read bytes (binary files)</span>\n<span class="keyword">let</span> bytes = fs::read(<span class="string">"image.png"</span>)?; <span class="comment">// Vec<u8></span>', keyPoints: ["read_to_string is convenient for small text files", "BufReader is efficient for large files or line-by-line processing", "Always use ? or match instead of expect in reusable code", "read_to_string returns a Result; handle errors appropriately", "Use fs::read for binary data (returns Vec<u8>)"], commonMistakes: ["Using read_to_string on very large files (memory exhaustion)", "Not handling the Result (use expect only in main/binary code)", "Forgetting that BufReader::lines() yields Result<String> (each line can fail)"], relatedConcepts: ["BufReader", "File", "Result", "read", "IO"] } },

                { id: 74, chapter: "Ch. 12", section: "I/O Project", title: "Refactoring with Iterators", concept: "Iterator Chains", description: "Replace manual loops with iterator methods like filter, map, and collect for cleaner, more idiomatic code.", code: 'let results: Vec<&str> = contents\n    .lines()\n    .filter(|line| line.contains(query))\n    .collect();', tags: ["iterator", "filter", "lines", "collect", "refactor"],
                  deepDive: { explanation: "Iterator methods provide a declarative, composable way to process collections. Chaining methods like filter, map, and collect often produces cleaner code than manual loops. The lines() method splits a string by newlines. filter takes a closure that returns bool, keeping only matching elements. map transforms elements. collect gathers results into a collection. Iterator chains are lazy — nothing happens until a consuming method like collect, sum, or for_each is called. This is idiomatic Rust and often as efficient as hand-written loops due to zero-cost abstractions.", extendedCode: '<span class="keyword">let</span> contents = <span class="string">"apple\nbanana\ncherry\navocado"</span>;\n\n<span class="comment">// Iterator chain</span>\n<span class="keyword">let</span> results: <span class="type">Vec</span>&lt;&<span class="type">str</span>&gt; = contents\n    .lines()\n    .filter(|line| line.contains(<span class="string">"a"</span>))\n    .collect();\n\n<span class="comment">// With case-insensitive search (lowercase both)</span>\n<span class="keyword">let</span> query = <span class="string">"A"</span>;\n<span class="keyword">let</span> results: <span class="type">Vec</span>&lt;&<span class="type">str</span>&gt; = contents\n    .lines()\n    .filter(|line| {\n        line.to_lowercase().contains(&query.to_lowercase())\n    })\n    .collect();\n\n<span class="comment">// Using fold for more complex accumulation</span>\n<span class="keyword">let</span> count = contents\n    .lines()\n    .filter(|line| line.contains(<span class="string">"a"</span>))\n    .count();', keyPoints: ["Iterator chains are declarative and composable", "Methods are lazy until a consumer (collect, count, sum) is called", "filter, map, and collect are the most common chain methods", "Closures capture environment by reference by default", "Iterator chains are zero-cost abstractions (compile to efficient loops)"], commonMistakes: ["Forgetting collect() at the end of a chain (returns an iterator, not a collection)", "Moving values into closures when borrowing would suffice", "Creating unnecessary intermediate collections instead of chaining"], relatedConcepts: ["Iterator", "filter", "map", "collect", "Closure"] } },

                { id: 75, chapter: "Ch. 12", section: "I/O Project", title: "Box<dyn Error>", concept: "Error Propagation", description: "Use Box<dyn Error> as a return type to allow any kind of error to be returned from main or functions.", code: 'fn main() -> Result<(), Box<dyn Error>> {\n    let contents = fs::read_to_string(file_path)?;\n    Ok(())\n}', tags: ["Box", "dyn Error", "main", "return", "propagation"],
                  deepDive: { explanation: "Box<dyn Error> is a trait object that can hold any error type implementing the Error trait. It's commonly used as a return type for main() and for functions that might produce different error types. The ? operator automatically converts errors using the From trait, so io::Error, parse errors, and custom errors can all be propagated with ?. For applications, anyhow::Error is often preferred because it provides better ergonomics, automatic backtraces, and context. For libraries, define custom error enums rather than using Box<dyn Error> to allow callers to match on specific errors.", extendedCode: '<span class="keyword">use</span> std::error::Error;\n<span class="keyword">use</span> std::fs;\n\n<span class="keyword">fn</span> <span class="function">main</span>() -> <span class="type">Result</span>&lt;(), <span class="type">Box</span>&lt;<span class="keyword">dyn</span> Error&gt;&gt; {\n    <span class="keyword">let</span> file_path = <span class="string">"config.txt"</span>;\n    <span class="keyword">let</span> contents = fs::read_to_string(file_path)?;\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, contents);\n    <span class="type">Ok</span>(())\n}\n\n<span class="comment">// For applications, anyhow is often better:</span>\n<span class="comment">// use anyhow::Result;</span>\n<span class="comment">// fn main() -> Result<()> { ... }</span>', keyPoints: ["Box<dyn Error> allows returning any error type from a function", "The ? operator automatically converts compatible error types", "Useful for main() and top-level application functions", "anyhow crate provides a more ergonomic alternative for applications", "Libraries should use specific error types, not Box<dyn Error>"], commonMistakes: ["Using Box<dyn Error> in library code (prevents callers from matching errors)", "Forgetting that dyn Error requires Box or other pointer types", "Not understanding that Box<dyn Error> erases the specific error type"], relatedConcepts: ["Trait Object", "Error Trait", "anyhow", "?", "From"] } },

                // Chapter 13: Iterators & Closures
                { id: 76, chapter: "Ch. 13", section: "Iterators & Closures", title: "Closures", concept: "Anonymous Functions", description: "Closures are anonymous functions that can capture variables from their environment. They infer parameter and return types.", code: 'let add_one = |x| x + 1;\nlet closure = |num| {\n    println!("calculating...");\n    num + 2\n};', tags: ["closure", "anonymous", "lambda", "capture", "environment"],
                  deepDive: { explanation: "Closures are anonymous functions that can capture variables from their surrounding environment. Unlike regular functions, they can infer parameter and return types (though you can annotate them explicitly). Closures are implemented as structs that implement the Fn, FnMut, or FnOnce traits depending on how they capture the environment. They are used extensively with iterator methods (map, filter, etc.) and for callbacks. The capture behavior (by reference, mutable reference, or by value) is inferred based on usage, but can be forced with the move keyword.", extendedCode: '<span class="keyword">let</span> x = <span class="string">4</span>;\n\n<span class="comment">// Closure capturing x by reference</span>\n<span class="keyword">let</span> equal_to_x = |z| z == x;\n<span class="macro">assert!</span>(equal_to_x(<span class="string">4</span>));\n\n<span class="comment">// Closure with move (captures by value)</span>\n<span class="keyword">let</span> equal_to_x = <span class="keyword">move</span> |z| z == x;\n\n<span class="comment">// Explicit type annotations (rarely needed)</span>\n<span class="keyword">let</span> add_one = |x: <span class="type">i32</span>| -> <span class="type">i32</span> { x + <span class="string">1</span> };\n\n<span class="comment">// Closure in iterator chain</span>\n<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n<span class="keyword">let</span> doubled: <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt; = v.iter().map(|x| x * <span class="string">2</span>).collect();', keyPoints: ["Closures infer parameter and return types", "They capture environment variables automatically", "move forces capture by value (useful for threads and long-lived closures)", "Implemented via Fn, FnMut, or FnOnce traits", "Used extensively with iterators and callbacks"], commonMistakes: ["Trying to use a closure after moving captured variables", "Capturing by reference when the closure outlives the captured variables", "Assuming closures are always Copy (they're only Copy if captures are Copy)"], relatedConcepts: ["Fn", "FnMut", "FnOnce", "move", "Iterator"] } },

                { id: 77, chapter: "Ch. 13", section: "Iterators & Closures", title: "Closure Traits", concept: "Fn, FnMut, FnOnce", description: "Closures implement traits based on how they capture environment: Fn (immutable borrow), FnMut (mutable borrow), FnOnce (takes ownership).", code: 'Fn: borrows values immutably\nFnMut: borrows values mutably\nFnOnce: consumes values (takes ownership)', tags: ["Fn", "FnMut", "FnOnce", "trait", "capture"],
                  deepDive: { explanation: "Closures automatically implement one or more of the Fn traits based on how they capture their environment. Fn(&self) is for closures that borrow immutably — they can be called multiple times. FnMut(&mut self) is for closures that mutate captured variables — also callable multiple times but requires mutable access. FnOnce(self) is for closures that consume captured variables (e.g., moving a value out) — can only be called once. The compiler chooses the least restrictive trait that satisfies the closure's behavior. Fn is a subtrait of FnMut, which is a subtrait of FnOnce, so a closure implementing Fn also implements FnMut and FnOnce.", extendedCode: '<span class="comment">// Fn: immutable borrow</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">let</span> closure = |y| y == x; <span class="comment">// borrows x immutably</span>\n<span class="function">call_twice</span>(closure);\n\n<span class="comment">// FnMut: mutable borrow</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> count = <span class="string">0</span>;\n<span class="keyword">let</span> <span class="keyword">mut</span> closure = || {\n    count += <span class="string">1</span>;\n    count\n};\n<span class="function">call_mut</span>(&<span class="keyword">mut</span> closure);\n\n<span class="comment">// FnOnce: takes ownership</span>\n<span class="keyword">let</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="keyword">let</span> closure = <span class="keyword">move</span> || <span class="macro">println!</span>(<span class="string">"{}"</span>, s); <span class="comment">// s moved into closure</span>\n<span class="function">call_once</span>(closure);\n<span class="comment">// closure can only be called once; s is consumed</span>', keyPoints: ["Fn: immutable borrow, callable multiple times", "FnMut: mutable borrow, callable multiple times with mut access", "FnOnce: takes ownership, callable once", "Compiler infers the trait automatically", "Fn is a subtrait of FnMut, which is a subtrait of FnOnce"], commonMistakes: ["Trying to call a FnOnce closure twice", "Passing a closure to a function expecting Fn when it needs FnMut", "Not using move when the closure needs to outlive the captured variables"], relatedConcepts: ["Closure", "Trait", "move", "Borrow", "Ownership"] } },

                { id: 78, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterators", concept: "Iterator Trait", description: "Iterators implement the Iterator trait with next() method. They are lazy — nothing happens until you call a consuming method.", code: 'pub trait Iterator {\n    type Item;\n    fn next(&mut self) -> Option<Self::Item>;\n}', tags: ["Iterator", "next", "Item", "lazy", "trait"],
                  deepDive: { explanation: "The Iterator trait is the foundation of Rust's iteration mechanism. It has one required method: next(), which returns Option<Self::Item>. Iterators are lazy — calling iterator methods creates an iterator chain, but no computation happens until a consuming method (like collect, sum, or for_each) is called. This enables efficient chaining without intermediate allocations. The Item associated type defines what the iterator produces. Many types in the standard library implement Iterator, including ranges, vectors, hash maps, and strings. Custom iterators can be created by implementing the Iterator trait.", extendedCode: '<span class="keyword">pub trait</span> <span class="type">Iterator</span> {\n    <span class="keyword">type</span> <span class="type">Item</span>;\n    <span class="keyword">fn</span> <span class="function">next</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) -> <span class="type">Option</span>&lt;<span class="keyword">Self</span>::Item&gt;;\n    \n    <span class="comment">// Many provided methods: map, filter, fold, etc.</span>\n}\n\n<span class="comment">// Creating a custom iterator</span>\n<span class="keyword">struct</span> <span class="type">Counter</span> {\n    count: <span class="type">u32</span>,\n}\n\n<span class="keyword">impl</span> <span class="type">Iterator</span> <span class="keyword">for</span> <span class="type">Counter</span> {\n    <span class="keyword">type</span> <span class="type">Item</span> = <span class="type">u32</span>;\n    \n    <span class="keyword">fn</span> <span class="function">next</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) -> <span class="type">Option</span>&lt;<span class="keyword">Self</span>::Item&gt; {\n        <span class="keyword">if</span> <span class="keyword">self</span>.count &lt; <span class="string">5</span> {\n            <span class="keyword">self</span>.count += <span class="string">1</span>;\n            <span class="type">Some</span>(<span class="keyword">self</span>.count)\n        } <span class="keyword">else</span> {\n            <span class="type">None</span>\n        }\n    }\n}', keyPoints: ["Iterator trait requires next() method returning Option<Item>", "Iterators are lazy — no computation until a consumer is called", "Many adapter methods provided: map, filter, take, skip, etc.", "Custom types can implement Iterator for custom iteration logic", "IntoIterator converts types into iterators (used by for loops)"], commonMistakes: ["Calling iterator methods without a consumer (nothing happens)", "Implementing Iterator without specifying the Item type", "Not understanding that iterators are consumed (single-use)"], relatedConcepts: ["IntoIterator", "next", "Lazy Evaluation", "Adapter", "Consumer"] } },

                { id: 79, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterator Methods", concept: "map, filter, collect", description: "Iterator adaptors transform iterators. Consuming methods like collect, sum, or for_each trigger evaluation.", code: 'let v: Vec<i32> = (1..=10)\n    .map(|x| x * 2)\n    .filter(|x| x > &5)\n    .collect();', tags: ["map", "filter", "collect", "adaptor", "consuming"],
                  deepDive: { explanation: "Iterator adapters are methods that transform one iterator into another. They are lazy and don't execute until a consuming method is called. Common adapters include: map (transform each element), filter (keep elements matching a predicate), enumerate (get index and value), take (limit to n elements), skip (skip n elements), and flat_map (map then flatten). Consuming methods trigger execution: collect (gather into a collection), sum (add all elements), count (count elements), for_each (execute side effect), and fold (reduce to a single value). Chaining adapters creates a pipeline of operations.", extendedCode: '<span class="keyword">let</span> v: <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt; = (<span class="string">1</span>..=<span class="string">10</span>)\n    .map(|x| x * <span class="string">2</span>)          <span class="comment">// transform</span>\n    .filter(|x| x > &<span class="string">5</span>)      <span class="comment">// filter</span>\n    .take(<span class="string">3</span>)                 <span class="comment">// limit to 3</span>\n    .collect();              <span class="comment">// consume into Vec</span>\n\n<span class="comment">// Other useful methods</span>\n<span class="keyword">let</span> sum: <span class="type">i32</span> = (<span class="string">1</span>..=<span class="string">5</span>).sum();\n<span class="keyword">let</span> count = (<span class="string">1</span>..=<span class="string">10</span>).filter(|x| x % <span class="string">2</span> == <span class="string">0</span>).count();\n\n<span class="comment">// fold (reduce)</span>\n<span class="keyword">let</span> product = [<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>, <span class="string">4</span>].iter().fold(<span class="string">1</span>, |acc, x| acc * x);\n\n<span class="comment">// find (returns Option)</span>\n<span class="keyword">let</span> first_even = [<span class="string">1</span>, <span class="string">3</span>, <span class="string">4</span>, <span class="string">5</span>].iter().find(|&&x| x % <span class="string">2</span> == <span class="string">0</span>);', keyPoints: ["Adapters (map, filter) are lazy and return new iterators", "Consumers (collect, sum, count) trigger execution", "Iterator chains are efficient — no intermediate collections", "collect requires type annotation or inference for the target collection", "fold is the general-purpose reducing operation"], commonMistakes: ["Forgetting collect() and getting an iterator instead of a collection", "Not understanding that filter keeps elements where closure returns true", "Using collect without type annotation (often needs turbofish or let type)"], relatedConcepts: ["Lazy Evaluation", "Adapter", "Consumer", "fold", "find"] } },

                { id: 80, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterator Performance", concept: "Zero-Cost Abstractions", description: "Iterators are zero-cost abstractions. The compiled code is as efficient as hand-written loops due to monomorphization and inlining.", code: '// This iterator chain compiles to the same\n// efficient machine code as a for loop', tags: ["zero-cost", "abstraction", "performance", "inline", "monomorphization"],
