                  deepDive: { explanation: "Borrowing allows you to access data without taking ownership. A reference (&T) is a non-owning pointer to a value. The borrower can read the data but cannot (by default) modify it or drop it. When the reference goes out of scope, the underlying data is not dropped because the reference never owned it. This solves the problem of wanting to use a value in multiple places without expensive cloning or complex ownership transfers. The borrow checker ensures references are always valid — you cannot have dangling references.", extendedCode: '<span class="comment">// Immutable reference (borrowing)</span>\n<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="keyword">let</span> len = <span class="function">calculate_length</span>(&s1); <span class="comment">// borrow s1</span>\n<span class="macro">println!</span>(<span class="string">"The length of '{}' is {}."</span>, s1, len); <span class="comment">// s1 still valid</span>\n\n<span class="keyword">fn</span> <span class="function">calculate_length</span>(s: &<span class="type">String</span>) -> <span class="type">usize</span> {\n    s.len() <span class="comment">// can read but not modify</span>\n}\n\n<span class="comment">// Multiple immutable borrows are allowed</span>\n<span class="keyword">let</span> r1 = &s1;\n<span class="keyword">let</span> r2 = &s1;\n<span class="macro">println!</span>(<span class="string">"{} and {}"</span>, r1, r2); <span class="comment">// OK: multiple readers</span>', keyPoints: ["References (&T) borrow without taking ownership", "The original owner remains valid after borrowing", "You can have multiple immutable references (&T) simultaneously", "References are automatically dereferenced in many contexts (dot operator)", "The borrow checker validates references at compile time"], commonMistakes: ["Trying to modify through an immutable reference (&T instead of &mut T)", "Returning a reference to local function data (dangling reference)", "Creating a reference to a value that is about to be dropped"], relatedConcepts: ["Mutable References", "Borrow Checker", "Dangling References", "Lifetime", "Pointer"] } },

                { id: 25, chapter: "Ch. 4", section: "Ownership", title: "Mutable References", concept: "Exclusive Borrow", description: "You can have only ONE mutable reference to a particular piece of data in a particular scope. Prevents data races.", code: 'let mut s = String::from("hello");\nchange(&mut s);\nfn change(s: &mut String) {\n    s.push_str(", world");\n}', tags: ["mut", "mutable reference", "&mut", "exclusive", "data race"],
                  deepDive: { explanation: "Mutable references (&mut T) allow modifying borrowed data. The key restriction is that you can have only one mutable reference to a particular piece of data in a given scope. This prevents data races at compile time — a condition where two or more pointers access the same data concurrently, at least one is writing, and there's no synchronization. You also cannot have a mutable reference while immutable references exist. This rule is checked at compile time by the borrow checker and is the core of Rust's memory safety guarantee.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n\n<span class="comment">// One mutable reference at a time</span>\n<span class="keyword">let</span> r1 = &<span class="keyword">mut</span> s;\n<span class="comment">// let r2 = &mut s; // ERROR: cannot borrow as mutable more than once</span>\n\nr1.push_str(<span class="string">" world"</span>);\n\n<span class="comment">// After r1 goes out of scope, you can create a new mutable reference</span>\n<span class="keyword">let</span> r2 = &<span class="keyword">mut</span> s;\n\n<span class="comment">// Cannot mix mutable and immutable</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="keyword">let</span> r1 = &s; <span class="comment">// immutable borrow</span>\n<span class="comment">// let r2 = &mut s; // ERROR: cannot borrow as mutable</span>\n<span class="macro">println!</span>(<span class="string">"{}"</span>, r1); <span class="comment">// r1 used here, so mutable borrow can't start earlier</span>', keyPoints: ["Only one &mut T to a value can exist in a scope at a time", "Cannot mix &T and &mut T in the same scope", "This prevents data races entirely at compile time", "Mutable references are automatically dereferenced (no -> operator like C++)", "The restriction is lexical (scope-based), though NLL (Non-Lexical Lifetimes) relaxes this"], commonMistakes: ["Trying to create two mutable references simultaneously (even for 'obviously safe' cases)", "Creating an immutable reference and then trying to mutate the original value", "Fighting the borrow checker instead of restructuring code (e.g., using clone or restructuring logic)"], relatedConcepts: ["Borrowing", "Data Race", "Borrow Checker", "Lifetime", "Scope"] } },

                { id: 26, chapter: "Ch. 4", section: "Ownership", title: "Dangling References", concept: "Lifetime Safety", description: "Rust prevents dangling references at compile time. The borrow checker ensures references never outlive their data.", code: '// This will NOT compile:\nfn dangle() -> &String {\n    let s = String::from("hello");\n    &s // s dropped here, reference invalid\n}', tags: ["dangling", "lifetime", "borrow checker", "compile error", "safety"],
                  deepDive: { explanation: "A dangling reference is a pointer to memory that has been freed or is no longer valid. In languages like C, this is a common source of security vulnerabilities and crashes. Rust's borrow checker eliminates dangling references at compile time. If you try to return a reference to a local variable, the compiler will reject it because the local variable is dropped at the end of the function, making the reference invalid. To return string data from a function, you must return the String itself (transferring ownership) or accept a reference parameter and return a reference derived from it.", extendedCode: '<span class="comment">// WILL NOT COMPILE: returns reference to local data</span>\n<span class="keyword">fn</span> <span class="function">dangle</span>() -> &<span class="type">String</span> {\n    <span class="keyword">let</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n    &s <span class="comment">// s will be dropped here, reference becomes dangling</span>\n}\n\n<span class="comment">// CORRECT: return the String itself (transfer ownership)</span>\n<span class="keyword">fn</span> <span class="function">no_dangle</span>() -> <span class="type">String</span> {\n    <span class="keyword">let</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n    s <span class="comment">// ownership moved to caller</span>\n}\n\n<span class="comment">// CORRECT: return reference to parameter (which outlives function)</span>\n<span class="keyword">fn</span> <span class="function">first_word</span>(s: &<span class="type">str</span>) -> &<span class="type">str</span> {\n    &s[<span class="string">0</span>..<span class="string">1</span>]\n}', keyPoints: ["The borrow checker prevents dangling references at compile time", "You cannot return references to local variables", "To return data, transfer ownership (return the value) or use a String parameter", "Lifetime annotations help the compiler verify reference validity across function boundaries", "This is a zero-cost abstraction — no runtime checks needed"], commonMistakes: ["Trying to return &String from a function that creates the String locally", "Thinking the borrow checker is too restrictive — it's preventing real bugs", "Using unsafe code to bypass the borrow checker without understanding lifetimes"], relatedConcepts: ["Lifetime", "Borrow Checker", "Scope", "Return Ownership", "Unsafe"] } },

                { id: 27, chapter: "Ch. 4", section: "Ownership", title: "String Slices", concept: "Slice Type", description: "A slice is a reference to a contiguous sequence of elements in a collection. String slices are immutable.", code: 'let s = String::from("hello world");\nlet hello = &s[0..5]; // slice from 0 to 4\nlet world = &s[6..11]; // slice from 6 to 10', tags: ["slice", "string slice", "&str", "range", "substring"],
                  deepDive: { explanation: "A slice is a view into a contiguous sequence of data — it doesn't own the data, just references it. String slices (&str) are references to a portion of a String. They consist of a pointer and a length, making them fat pointers (two words). Slices are always valid because the borrow checker ensures the underlying String lives at least as long as the slice. String slices are UTF-8 aware, but indexing is by byte position, not character position. Slicing at invalid UTF-8 boundaries causes a panic.", extendedCode: '<span class="keyword">let</span> s = <span class="type">String</span>::from(<span class="string">"hello world"</span>);\n\n<span class="comment">// Range syntax</span>\n<span class="keyword">let</span> hello = &s[<span class="string">0</span>..<span class="string">5</span>];   <span class="comment">// exclusive end</span>\n<span class="keyword">let</span> world = &s[<span class="string">6</span>..<span class="string">11</span>];\n<span class="keyword">let</span> hello2 = &s[..<span class="string">5</span>];    <span class="comment">// from start</span>\n<span class="keyword">let</span> world2 = &s[<span class="string">6</span>..];    <span class="comment">// to end</span>\n<span class="keyword">let</span> all = &s[..];         <span class="comment">// entire string</span>\n\n<span class="comment">// String literal is a &str</span>\n<span class="keyword">let</span> literal: &<span class="type">str</span> = <span class="string">"hello"</span>;\n\n<span class="comment">// UTF-8 byte indexing</span>\n<span class="keyword">let</span> japanese = <span class="type">String</span>::from(<span class="string">"こんにちは"</span>);\n<span class="comment">// let s = &japanese[0..1]; // PANIC: not a char boundary!</span>\n<span class="keyword">let</span> s = &japanese[<span class="string">0</span>..<span class="string">3</span>]; <span class="comment">// OK: one 3-byte character</span>', keyPoints: ["Slices are references to contiguous data (pointer + length)", "&str is a string slice; String is an owned, growable string", "Range syntax: [start..end] exclusive, [start..=end] inclusive", "String slicing uses byte indices, not character indices", "Slices prevent out-of-bounds access at runtime (panics on invalid ranges)"], commonMistakes: ["Slicing at non-UTF-8 character boundaries (causes panic)", "Assuming String indices correspond to character positions", "Trying to modify a &str (string slices are immutable)"], relatedConcepts: ["&str", "String", "Range", "UTF-8", "Borrowing"] } },

                { id: 28, chapter: "Ch. 4", section: "Ownership", title: "String Literals as Slices", concept: "&str Type", description: "String literals are stored in the binary and are of type &str — an immutable slice pointing to that specific binary location.", code: 'let s: &str = "Hello, world!";', tags: ["&str", "literal", "binary", "immutable", "slice"],
                  deepDive: { explanation: "String literals like \"hello\" are hardcoded directly into the final binary's read-only data section. They have the type &'static str, meaning they are string slices that live for the entire duration of the program ('static lifetime). They are immutable because modifying read-only binary data would be unsafe. This makes string literals extremely efficient — no heap allocation, no runtime creation. They are also valid for the entire program execution. &'static str can be coerced to &str, making them compatible with functions expecting string slices.", extendedCode: '<span class="comment">// String literal type is &\'static str</span>\n<span class="keyword">let</span> s: &<span class="keyword">\'static</span> <span class="type">str</span> = <span class="string">"I live forever in the binary"</span>;\n\n<span class="comment">// Can be used wherever &str is expected</span>\n<span class="keyword">fn</span> <span class="function">greet</span>(name: &<span class="type">str</span>) {\n    <span class="macro">println!</span>(<span class="string">"Hello, {}!"</span>, name);\n}\n\n<span class="function">greet</span>(<span class="string">"world"</span>); <span class="comment">// &\'static str coerces to &str</span>\n\n<span class="comment">// Deref coercion allows String to &str</span>\n<span class="keyword">let</span> owned = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="function">greet</span>(&owned); <span class="comment">// &String → &str automatically</span>', keyPoints: ["String literals are &'static str — immutable and live for the program's duration", "They are stored in the binary's read-only section, not the heap", "No allocation or runtime cost for creating string literals", "Deref coercion automatically converts &String to &str in function arguments", "Prefer &str parameters over &String for flexibility"], commonMistakes: ["Trying to return a String literal as a String (use .to_string() or .into())", "Expecting string literals to be modifiable (they are immutable)", "Using String function parameters when &str would be more flexible"], relatedConcepts: ["&str", "String", "Static Lifetime", "Deref Coercion", "Binary"] } },

                // Chapter 5: Structs
                { id: 29, chapter: "Ch. 5", section: "Structs", title: "Struct Definition", concept: "Custom Data Type", description: "Structs group related data together into named fields. Each field must have a type.", code: 'struct User {\n    active: bool,\n    username: String,\n    email: String,\n    sign_in_count: u64,\n}', tags: ["struct", "field", "custom type", "aggregate", "data"],
                  deepDive: { explanation: "Structs (structures) are custom data types that let you group related data together with named fields. Unlike tuples where you access elements by index, struct fields have descriptive names, making code more readable and self-documenting. Each field must have an explicit type. Structs can be used to model real-world entities (User, Product, Point) or abstract concepts (Config, State). Structs are stack-allocated by default, but fields that own heap data (like String) will have their data on the heap while the struct itself is on the stack.", extendedCode: '<span class="comment">// Struct definition</span>\n<span class="keyword">struct</span> <span class="type">User</span> {\n    active: <span class="type">bool</span>,\n    username: <span class="type">String</span>,\n    email: <span class="type">String</span>,\n    sign_in_count: <span class="type">u64</span>,\n}\n\n<span class="comment">// Struct with generic types</span>\n<span class="keyword">struct</span> <span class="type">Point</span>&lt;T&gt; {\n    x: T,\n    y: T,\n}\n\n<span class="comment">// Struct with lifetime parameters</span>\n<span class="keyword">struct</span> <span class="type">Borrowed</span>&lt;<span class="keyword">\'a</span>&gt; {\n    text: &<span class="keyword">\'a</span> <span class="type">str</span>,\n}', keyPoints: ["Structs group named fields into a custom type", "Field names make code self-documenting compared to tuples", "Structs are stack-allocated, but their fields may own heap data", "Generic structs can work with multiple types (Point<T>)", "Structs can hold references but require lifetime annotations"], commonMistakes: ["Forgetting that struct fields are private by default (use pub for public fields)", "Creating structs with references without lifetime annotations", "Assuming structs are automatically printable — derive Debug or implement Display"], relatedConcepts: ["Tuple Struct", "Unit Struct", "Methods", "Generics", "Lifetime"] } },

                { id: 30, chapter: "Ch. 5", section: "Structs", title: "Struct Instantiation", concept: "Creating Instances", description: "Create an instance by specifying values for each field. Use dot notation to access or mutate fields.", code: 'let mut user1 = User {\n    active: true,\n    username: String::from("user123"),\n    email: String::from("a@b.com"),\n    sign_in_count: 1,\n};\nuser1.email = String::from("c@d.com");', tags: ["instance", "struct", "dot notation", "field", "mutate"],
                  deepDive: { explanation: "To create a struct instance, you provide values for all fields in key: value syntax. The order of fields doesn't need to match the definition. Once created, you access fields with dot notation (instance.field). The entire instance must be mutable to change any field — Rust doesn't allow individual field mutability at the binding level. This means let mut user is required even if you only change one field. Field access moves owned fields (like String) if not borrowed, which affects ownership.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> user = <span class="type">User</span> {\n    active: <span class="keyword">true</span>,\n    username: <span class="type">String</span>::from(<span class="string">"alice"</span>),\n    email: <span class="type">String</span>::from(<span class="string">"alice@example.com"</span>),\n    sign_in_count: <span class="string">1</span>,\n};\n\n<span class="comment">// Access and mutate fields</span>\nuser.email = <span class="type">String</span>::from(<span class="string">"new@example.com"</span>);\n<span class="macro">println!</span>(<span class="string">"Email: {}"</span>, user.email);\n\n<span class="comment">// Moving a field out of a struct</span>\n<span class="keyword">let</span> name = user.username; <span class="comment">// moves String out</span>\n<span class="comment">// println!("{}", user.username); // ERROR: moved</span>\n\n<span class="comment">// But can still use other fields</span>\n<span class="macro">println!</span>(<span class="string">"Active: {}"</span>, user.active);', keyPoints: ["All fields must be provided when creating an instance (unless using .. syntax)", "The entire struct must be mutable (let mut) to change any field", "Field order in instantiation doesn't need to match definition", "Accessing a field moves it if it's not Copy; the struct becomes partially moved", "Partial moves prevent using the moved field but other fields remain valid"], commonMistakes: ["Trying to mutate a field without let mut on the entire struct", "Moving a field out and then trying to use the whole struct", "Forgetting that struct fields are private by default in other modules"], relatedConcepts: ["Struct Update Syntax", "Partial Move", "Ownership", "Mutability", "Methods"] } },

                { id: 31, chapter: "Ch. 5", section: "Structs", title: "Field Init Shorthand", concept: "Concise Syntax", description: "When parameter names match field names, you can use shorthand syntax to avoid repetition.", code: 'fn build_user(email: String, username: String) -> User {\n    User {\n        active: true,\n        username,  // shorthand\n        email,     // shorthand\n        sign_in_count: 1,\n    }\n}', tags: ["shorthand", "field init", "parameter", "concise", "syntax"],
                  deepDive: { explanation: "When a variable name matches a struct field name, you can use the shorthand syntax to avoid repetition. Instead of writing username: username, you simply write username. This is idiomatic Rust and makes constructor functions cleaner. The shorthand works because the compiler knows you want to use the variable with the same name as the field. This is particularly useful in builder functions and constructors where parameters naturally map to struct fields.", extendedCode: '<span class="keyword">fn</span> <span class="function">build_user</span>(email: <span class="type">String</span>, username: <span class="type">String</span>) -> <span class="type">User</span> {\n    <span class="type">User</span> {\n        active: <span class="keyword">true</span>,\n        username, <span class="comment">// same as username: username</span>\n        email,    <span class="comment">// same as email: email</span>\n        sign_in_count: <span class="string">1</span>,\n    }\n}\n\n<span class="comment">// Even shorter with variables in scope</span>\n<span class="keyword">let</span> active = <span class="keyword">true</span>;\n<span class="keyword">let</span> username = <span class="type">String</span>::from(<span class="string">"bob"</span>);\n<span class="keyword">let</span> email = <span class="type">String</span>::from(<span class="string">"bob@example.com"</span>);\n\n<span class="keyword">let</span> user = <span class="type">User</span> {\n    active,\n    username,\n    email,\n    sign_in_count: <span class="string">1</span>,\n};', keyPoints: ["Shorthand syntax reduces repetition when variable names match field names", "Works in any struct instantiation, not just function returns", "Can mix shorthand and explicit field initialization", "Improves readability in constructor functions", "The compiler resolves the shorthand based on the current scope"], commonMistakes: ["Using shorthand when the variable is a different type than the field", "Shadowing a field name with a variable of the wrong type", "Forgetting that shorthand still moves or copies the value"], relatedConcepts: ["Struct Instantiation", "Constructor", "Variable Binding", "Move Semantics"] } },

                { id: 32, chapter: "Ch. 5", section: "Structs", title: "Struct Update Syntax", concept: "Copying Fields", description: "Create a new instance using most values from another instance with .. syntax.", code: 'let user2 = User {\n    email: String::from("new@example.com"),\n    ..user1 // remaining fields from user1\n};', tags: ["update syntax", "..", "spread", "copy", "instance"],
                  deepDive: { explanation: "The struct update syntax (..instance) lets you create a new instance by copying or moving fields from an existing one. You specify only the fields you want to change, and the rest are taken from the source instance. This is similar to object spread syntax in JavaScript. However, because Rust has move semantics, fields that don't implement Copy are moved from the source instance. After using ..user1, user1 is partially moved and can no longer be used as a whole (though unmoved fields remain accessible).", extendedCode: '<span class="keyword">let</span> user1 = <span class="type">User</span> {\n    active: <span class="keyword">true</span>,\n    username: <span class="type">String</span>::from(<span class="string">"alice"</span>),\n    email: <span class="type">String</span>::from(<span class="string">"alice@example.com"</span>),\n    sign_in_count: <span class="string">1</span>,\n};\n\n<span class="keyword">let</span> user2 = <span class="type">User</span> {\n    email: <span class="type">String</span>::from(<span class="string">"new@example.com"</span>),\n    ..user1 <span class="comment">// moves username, copies active and sign_in_count</span>\n};\n\n<span class="comment">// user1.username was moved; user1 is partially invalid</span>\n<span class="comment">// println!("{}", user1.username); // ERROR!</span>\n<span class="macro">println!</span>(<span class="string">"{}"</span>, user1.active); <span class="comment">// OK: active was copied (bool is Copy)</span>', keyPoints: [".. syntax copies/moves remaining fields from another instance", "Fields that are Copy are copied; others are moved", "The source instance becomes partially moved after update syntax", "Useful for creating variations of a struct without repeating all fields", "Order matters: specified fields come before the .. spread"], commonMistakes: ["Using the source instance after .. syntax without realizing fields were moved", "Expecting deep copy behavior — only Copy fields are copied, others are moved", "Using .. syntax when the source has fields that shouldn't be moved"], relatedConcepts: ["Move Semantics", "Copy Trait", "Partial Move", "Struct Instantiation"] } },

                { id: 33, chapter: "Ch. 5", section: "Structs", title: "Tuple Structs", concept: "Named Tuple", description: "Tuple structs are structs without named fields. They have the meaning of a struct name but the structure of a tuple.", code: 'struct Color(i32, i32, i32);\nlet black = Color(0, 0, 0);', tags: ["tuple struct", "unnamed fields", "newtype", "Color", "Point"],
                  deepDive: { explanation: "Tuple structs are a hybrid of tuples and structs. They have a name (giving them semantic meaning) but unnamed fields accessed by index. They're useful when you want to distinguish between different types of tuples that have the same structure. For example, Color(i32, i32, i32) and Point(i32, i32, i32) are different types even though they contain the same data. The newtype pattern (a tuple struct with one field) is used to implement external traits on external types or to add type safety.", extendedCode: '<span class="comment">// Tuple structs</span>\n<span class="keyword">struct</span> <span class="type">Color</span>(<span class="type">i32</span>, <span class="type">i32</span>, <span class="type">i32</span>); <span class="comment">// RGB</span>\n<span class="keyword">struct</span> <span class="type">Point</span>(<span class="type">f64</span>, <span class="type">f64</span>, <span class="type">f64</span>); <span class="comment">// XYZ</span>\n\n<span class="keyword">let</span> black = <span class="type">Color</span>(<span class="string">0</span>, <span class="string">0</span>, <span class="string">0</span>);\n<span class="keyword">let</span> origin = <span class="type">Point</span>(<span class="string">0.0</span>, <span class="string">0.0</span>, <span class="string">0.0</span>);\n\n<span class="comment">// Access by index</span>\n<span class="keyword">let</span> red = black.<span class="string">0</span>;\n\n<span class="comment">// Newtype pattern (single-field tuple struct)</span>\n<span class="keyword">struct</span> <span class="type">Meters</span>(<span class="type">u32</span>);\n<span class="keyword">struct</span> <span class="type">Kilometers</span>(<span class="type">u32</span>);\n\n<span class="keyword">let</span> distance = <span class="type">Meters</span>(<span class="string">1000</span>);\n<span class="comment">// distance.0 gives 1000, but it's type-safe</span>', keyPoints: ["Tuple structs have named types but unnamed fields", "Useful for type safety and distinguishing similar data structures", "Fields accessed by index (.0, .1, etc.)", "Single-field tuple structs are the 'newtype pattern'", "Tuple structs can be destructured like regular tuples"], commonMistakes: ["Using tuple structs when a regular struct with named fields would be clearer", "Forgetting that tuple struct fields are private by default", "Confusing tuple structs with type aliases — they create distinct types"], relatedConcepts: ["Newtype Pattern", "Tuple", "Struct", "Type Safety", "Destructuring"] } },

                { id: 34, chapter: "Ch. 5", section: "Structs", title: "Unit-Like Structs", concept: "Empty Struct", description: "Structs with no fields. Useful when you need to implement a trait on some type but don't have data to store.", code: 'struct AlwaysEqual;\nlet subject = AlwaysEqual;', tags: ["unit-like", "empty struct", "trait", "marker", "phantom"],
                  deepDive: { explanation: "Unit-like structs are structs with no fields. They behave similarly to the unit type () but have a distinct type. They're useful when you need to implement a trait on a type but don't need to store any data. Common use cases include marker types, state machine states, and types that exist only to carry trait implementations. They occupy zero bytes at runtime (ZST - Zero Sized Type) and are optimized away by the compiler.", extendedCode: '<span class="comment">// Unit-like struct</span>\n<span class="keyword">struct</span> <span class="type">AlwaysEqual</span>;\n\n<span class="keyword">let</span> _subject = <span class="type">AlwaysEqual</span>;\n\n<span class="comment">// Use case: marker types for traits</span>\n<span class="keyword">trait</span> <span class="type">Marker</span> {}\n\n<span class="keyword">struct</span> <span class="type">Enabled</span>;\n<span class="keyword">struct</span> <span class="type">Disabled</span>;\n\n<span class="keyword">impl</span> <span class="type">Marker</span> <span class="keyword">for</span> <span class="type">Enabled</span> {}\n<span class="keyword">impl</span> <span class="type">Marker</span> <span class="keyword">for</span> <span class="type">Disabled</span> {}\n\n<span class="comment">// Use case: state machine states</span>\n<span class="keyword">struct</span> <span class="type">Idle</span>;\n<span class="keyword">struct</span> <span class="type">Running</span>;\n<span class="keyword">struct</span> <span class="type">Stopped</span>;\n\n<span class="keyword">struct</span> <span class="type">StateMachine</span>&lt;S&gt; {\n    _state: std::marker::PhantomData&lt;S&gt;,\n}', keyPoints: ["Unit-like structs have no fields and no parentheses", "They are zero-sized types (ZST) with no runtime overhead", "Useful for implementing traits without data", "Common in typestate patterns and marker traits", "Instantiated without parentheses: let x = MyStruct;"], commonMistakes: ["Using unit-like structs when an enum variant would be more appropriate", "Expecting them to have the same type as () — they are distinct types", "Forgetting they can still implement traits and have methods"], relatedConcepts: ["Zero Sized Type", "Trait", "Marker Type", "Typestate", "PhantomData"] } },

                { id: 35, chapter: "Ch. 5", section: "Structs", title: "Methods", concept: "Associated Functions", description: "Methods are defined within an impl block and take self as first parameter. They are called with dot notation.", code: 'impl Rectangle {\n    fn area(&self) -> u32 {\n        self.width * self.height\n    }\n}', tags: ["method", "impl", "self", "associated function", "dot notation"],
                  deepDive: { explanation: "Methods are functions defined within an impl block that take self as their first parameter. They provide object-oriented syntax (object.method()) while maintaining Rust's functional roots. The self parameter can be &self (immutable borrow), &mut self (mutable borrow), or self (takes ownership). Methods are called with dot notation, and Rust automatically handles referencing and dereferencing. The impl block associates functions with a type but doesn't create a new type.", extendedCode: '<span class="keyword">struct</span> <span class="type">Rectangle</span> {\n    width: <span class="type">u32</span>,\n    height: <span class="type">u32</span>,\n}\n\n<span class="keyword">impl</span> <span class="type">Rectangle</span> {\n    <span class="comment">// Method with immutable borrow</span>\n    <span class="keyword">fn</span> <span class="function">area</span>(&<span class="keyword">self</span>) -> <span class="type">u32</span> {\n        <span class="keyword">self</span>.width * <span class="keyword">self</span>.height\n    }\n    \n    <span class="comment">// Method with mutable borrow</span>\n    <span class="keyword">fn</span> <span class="function">scale</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>, factor: <span class="type">u32</span>) {\n        <span class="keyword">self</span>.width *= factor;\n        <span class="keyword">self</span>.height *= factor;\n    }\n    \n    <span class="comment">// Method taking ownership</span>\n    <span class="keyword">fn</span> <span class="function">destroy</span>(<span class="keyword">self</span>) -> <span class="type">String</span> {\n        <span class="macro">format!</span>(<span class="string">"Destroyed {}x{}"</span>, <span class="keyword">self</span>.width, <span class="keyword">self</span>.height)\n    }\n}\n\n<span class="keyword">let</span> <span class="keyword">mut</span> rect = <span class="type">Rectangle</span> { width: <span class="string">10</span>, height: <span class="string">20</span> };\n<span class="macro">println!</span>(<span class="string">"Area: {}"</span>, rect.area()); <span class="comment">// auto-borrows &rect</span>\nrect.scale(<span class="string">2</span>); <span class="comment">// auto-borrows &mut rect</span>', keyPoints: ["Methods take self, &self, or &mut self as first parameter", "Dot notation automatically handles referencing (&) and dereferencing (*)", "Multiple impl blocks for the same type are allowed (useful with generics)", "Methods can access private fields of other instances of the same type", "self is shorthand for self: Self, &self for self: &Self, etc."], commonMistakes: ["Using &mut self when &self would suffice (unnecessarily restricts usage)", "Taking ownership (self) when borrowing would work", "Forgetting that methods can access private fields of other instances of the same struct"], relatedConcepts: ["impl", "self", "Associated Functions", "Dot Notation", "Deref"] } },

                { id: 36, chapter: "Ch. 5", section: "Structs", title: "Associated Functions", concept: "Constructors", description: "Functions in impl blocks that don't take self. Often used as constructors (e.g., String::new()). Called with ::.", code: 'impl Rectangle {\n    fn square(size: u32) -> Self {\n        Self { width: size, height: size }\n    }\n}\nlet sq = Rectangle::square(3);', tags: ["associated function", "::", "constructor", "new", "Self"],
                  deepDive: { explanation: "Associated functions are functions defined in an impl block that don't take self as a parameter. They are called using the type name and double colon syntax (Type::function()). They are commonly used as constructors (like String::new(), Vec::new(), or custom constructors like Rectangle::square()). The Self keyword refers to the type being implemented, which is useful when the type name might change or is long. Associated functions can be combined with methods to provide a rich API for types.", extendedCode: '<span class="keyword">impl</span> <span class="type">Rectangle</span> {\n    <span class="comment">// Constructor</span>\n    <span class="keyword">fn</span> <span class="function">new</span>(width: <span class="type">u32</span>, height: <span class="type">u32</span>) -> <span class="keyword">Self</span> {\n        <span class="keyword">Self</span> { width, height } <span class="comment">// Self = Rectangle</span>\n    }\n    \n    <span class="comment">// Named constructor pattern</span>\n    <span class="keyword">fn</span> <span class="function">square</span>(size: <span class="type">u32</span>) -> <span class="keyword">Self</span> {\n        <span class="keyword">Self</span> { width: size, height: size }\n    }\n    \n    <span class="comment">// Factory method</span>\n    <span class="keyword">fn</span> <span class="function">from_tuple</span>(dims: (<span class="type">u32</span>, <span class="type">u32</span>)) -> <span class="keyword">Self</span> {\n        <span class="keyword">Self</span> { width: dims.<span class="string">0</span>, height: dims.<span class="string">1</span> }\n    }\n}\n\n<span class="keyword">let</span> rect = <span class="type">Rectangle</span>::new(<span class="string">10</span>, <span class="string">20</span>);\n<span class="keyword">let</span> sq = <span class="type">Rectangle</span>::square(<span class="string">5</span>);', keyPoints: ["Associated functions don't take self; called with Type::function()", "Commonly used as constructors (new, from, etc.)", "Self is an alias for the impl type, useful for refactoring", "Multiple constructors can be provided with different names", "The :: operator distinguishes associated functions from methods"], commonMistakes: ["Confusing associated functions with methods (no self vs &self)", "Using Self when you meant self (Self is the type, self is the instance)", "Forgetting that new() is just a convention, not a language feature"], relatedConcepts: ["Methods", "impl", "Self", "Constructor", ":: Operator"] } },

                // Chapter 6: Enums
                { id: 37, chapter: "Ch. 6", section: "Enums & Pattern Matching", title: "Enum Definition", concept: "Variant Types", description: "Enums allow defining a type by enumerating its possible variants. Each variant can have different types and amounts of associated data.", code: 'enum Message {\n    Quit,\n    Move { x: i32, y: i32 },\n    Write(String),\n    ChangeColor(i32, i32, i32),\n}', tags: ["enum", "variant", "Message", "custom type", "data"],
                  deepDive: { explanation: "Enums (enumerations) allow you to define a type by enumerating its possible variants. Unlike enums in C which are essentially integers, Rust enums can carry data — each variant can be a different type. This makes them extremely powerful for modeling state, messages, and outcomes. The Message enum above has four variants: Quit (no data), Move (named fields like a struct), Write (a single String), and ChangeColor (a tuple of three i32s). Enums are a core part of Rust's type system and are used extensively for error handling (Result), optional values (Option), and state machines.", extendedCode: '<span class="keyword">enum</span> <span class="type">Message</span> {\n    <span class="type">Quit</span>,                           <span class="comment">// no data</span>\n    <span class="type">Move</span> { x: <span class="type">i32</span>, y: <span class="type">i32</span> },         <span class="comment">// struct-like</span>\n    <span class="type">Write</span>(<span class="type">String</span>),                  <span class="comment">// tuple-like</span>\n    <span class="type">ChangeColor</span>(<span class="type">i32</span>, <span class="type">i32</span>, <span class="type">i32</span>),   <span class="comment">// tuple with multiple values</span>\n}\n\n<span class="comment">// Using variants</span>\n<span class="keyword">let</span> msg1 = <span class="type">Message</span>::<span class="type">Quit</span>;\n<span class="keyword">let</span> msg2 = <span class="type">Message</span>::<span class="type">Move</span> { x: <span class="string">10</span>, y: <span class="string">20</span> };\n<span class="keyword">let</span> msg3 = <span class="type">Message</span>::<span class="type">Write</span>(<span class="type">String</span>::from(<span class="string">"hello"</span>));\n\n<span class="comment">// Enum with generic data</span>\n<span class="keyword">enum</span> <span class="type">Option</span>&lt;T&gt; {\n    <span class="type">Some</span>(T),\n    <span class="type">None</span>,\n}', keyPoints: ["Each variant can have different types and shapes of data", "Enums are algebraic data types (sum types) — the value is one of the variants", "Useful for modeling mutually exclusive states or messages", "Can be generic (Option<T>, Result<T, E>)", "The size of an enum is the size of its largest variant plus a discriminant"], commonMistakes: ["Confusing Rust enums with C enums (Rust enums are much more powerful)", "Not handling all variants in match (compiler enforces exhaustiveness)", "Forgetting that enum variants are namespaced under the enum type"], relatedConcepts: ["Pattern Matching", "Option", "Result", "Variant", "Algebraic Data Type"] } },

                { id: 38, chapter: "Ch. 6", section: "Enums & Pattern Matching", title: "Option<T>", concept: "Null Alternative", description: "Rust doesn't have null. Instead, it has Option<T> which is either Some(T) or None.", code: 'enum Option<T> {\n    Some(T),\n    None,\n}\nlet some_number = Some(5);\nlet absent_number: Option<i32> = None;', tags: ["Option", "Some", "None", "null", "absence"],
                  deepDive: { explanation: "Rust doesn't have null pointers. Instead, it uses Option<T> to represent the possibility of absence. Option is an enum with two variants: Some(T) wraps a value, and None represents the absence of a value. This forces you to explicitly handle the case where a value might be missing. The compiler ensures you can't accidentally use a None value as if it were Some. This eliminates null pointer dereferences, which Tony Hoare called his 'billion-dollar mistake'. Option is heavily used in the standard library and Rust ecosystem.", extendedCode: '<span class="keyword">let</span> some_number = <span class="type">Some</span>(<span class="string">5</span>);\n<span class="keyword">let</span> absent_number: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt; = <span class="type">None</span>;\n\n<span class="comment">// Must handle both cases</span>\n<span class="keyword">match</span> some_number {\n    <span class="type">Some</span>(n) => <span class="macro">println!</span>(<span class="string">"Got: {}"</span>, n),\n    <span class="type">None</span> => <span class="macro">println!</span>(<span class="string">"Nothing"</span>),\n}\n\n<span class="comment">// Useful methods</span>\n<span class="keyword">let</span> x: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt; = <span class="type">Some</span>(<span class="string">2</span>);\n<span class="macro">assert_eq!</span>(x.is_some(), <span class="keyword">true</span>);\n<span class="macro">assert_eq!</span>(x.unwrap(), <span class="string">2</span>);\n<span class="macro">assert_eq!</span>(x.unwrap_or(<span class="string">0</span>), <span class="string">2</span>);\n\n<span class="keyword">let</span> y: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt; = <span class="type">None</span>;\n<span class="macro">assert_eq!</span>(y.unwrap_or(<span class="string">0</span>), <span class="string">0</span>);', keyPoints: ["Option<T> replaces null — explicit absence handling", "Some(T) contains a value; None represents absence", "The compiler forces you to handle both cases", "Option has many helper methods: map, unwrap_or, and_then, etc.", "Using Option is zero-cost — Some and None have no runtime overhead over nullable pointers"], commonMistakes: ["Using unwrap() on Option without checking (panics on None)", "Forgetting that Option<i32> is a different type from i32 (must extract the value)", "Using None without type annotation (compiler can't infer T)"], relatedConcepts: ["Result", "match", "if let", "unwrap", "Null Safety"] } },

                { id: 39, chapter: "Ch. 6", section: "Enums & Pattern Matching", title: "match with Option", concept: "Handling Absence", description: "Use match to handle both Some and None cases safely. The compiler checks all variants are handled.", code: 'fn plus_one(x: Option<i32>) -> Option<i32> {\n    match x {\n        None => None,\n        Some(i) => Some(i + 1),\n    }\n}', tags: ["match", "Option", "Some", "None", "exhaustive"],
                  deepDive: { explanation: "Pattern matching with Option is the idiomatic way to handle optional values. The match expression forces you to handle both Some and None cases, preventing null dereferences at compile time. When matching Some(i), the variable i is bound to the contained value. You can transform Options by matching and returning new Options. This pattern is so common that Option provides helper methods like map, and_then, and unwrap_or, but match remains the most explicit and flexible approach.", extendedCode: '<span class="keyword">fn</span> <span class="function">plus_one</span>(x: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt;) -> <span class="type">Option</span>&lt;<span class="type">i32</span>&gt; {\n    <span class="keyword">match</span> x {\n        <span class="type">None</span> => <span class="type">None</span>,\n        <span class="type">Some</span>(i) => <span class="type">Some</span>(i + <span class="string">1</span>),\n    }\n}\n\n<span class="comment">// More complex pattern matching</span>\n<span class="keyword">fn</span> <span class="function">describe</span>(x: <span class="type">Option</span>&lt;<span class="type">i32</span>&gt;) -> <span class="type">String</span> {\n    <span class="keyword">match</span> x {\n        <span class="type">Some</span>(<span class="string">0</span>) => <span class="string">"zero"</span>.to_string(),\n        <span class="type">Some</span>(n) <span class="keyword">if</span> n &lt; <span class="string">0</span> => <span class="macro">format!</span>(<span class="string">"negative {}"</span>, n),\n        <span class="type">Some</span>(n) => <span class="macro">format!</span>(<span class="string">"positive {}"</span>, n),\n        <span class="type">None</span> => <span class="string">"nothing"</span>.to_string(),\n    }\n}\n\n<span class="comment">// Using if let for single-case handling</span>\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(<span class="string">3</span>) = x {\n    <span class="macro">println!</span>(<span class="string">"three"</span>);\n}', keyPoints: ["match on Option is exhaustive — compiler ensures both cases handled", "Some(i) binds the inner value to a variable", "None must be handled explicitly; there is no implicit null", "if let is a shorthand when you only care about one variant", "Option methods (map, and_then) are often cleaner than explicit match"], commonMistakes: ["Forgetting the None arm (compiler error, but good to remember)", "Using unwrap() instead of proper pattern matching in library code", "Nested match on multiple Options instead of using ? or and_then"], relatedConcepts: ["Pattern Matching", "if let", "Result", "Exhaustiveness", "Option Methods"] } },

                { id: 40, chapter: "Ch. 6", section: "Enums & Pattern Matching", title: "if let", concept: "Concise Pattern Match", description: "if let is a shorter way to write a match that only cares about one pattern and ignores the rest.", code: 'if let Some(3) = some_u8_value {\n    println!("three");\n}\n// Equivalent to match with _ => ()', tags: ["if let", "concise", "pattern", "ignore", "else"],
                  deepDive: { explanation: "if let is syntactic sugar for a match that runs code when a specific pattern matches and ignores all other patterns. It's cleaner than match when you only care about one variant. You can add an else block to handle the non-matching case. while let is the loop equivalent, continuing while a pattern matches. if let is particularly useful with Option and Result when you only care about the success case. However, match is preferred when you need to handle multiple variants or when exhaustiveness is important.", extendedCode: '<span class="comment">// if let with Option</span>\n<span class="keyword">let</span> config_max = <span class="type">Some</span>(<span class="string">3u8</span>);\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(max) = config_max {\n    <span class="macro">println!</span>(<span class="string">"The maximum is configured to {}"</span>, max);\n}\n\n<span class="comment">// if let with else</span>\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(<span class="string">3</span>) = config_max {\n    <span class="macro">println!</span>(<span class="string">"three"</span>);\n} <span class="keyword">else</span> {\n    <span class="macro">println!</span>(<span class="string">"not three"</span>);\n}\n\n<span class="comment">// while let: loop while pattern matches</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> stack = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n<span class="keyword">while</span> <span class="keyword">let</span> <span class="type">Some</span>(top) = stack.pop() {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, top);\n}', keyPoints: ["if let is shorthand for match with one relevant arm", "More concise than match when you only care about one pattern", "Can include else for the non-matching case", "while let loops while a pattern continues to match", "Use match when exhaustiveness matters or multiple patterns are relevant"], commonMistakes: ["Using if let when match would be clearer (especially with multiple patterns)", "Forgetting that if let doesn't enforce exhaustiveness (unlike match)", "Using if let with complex conditions that would be clearer as a match"], relatedConcepts: ["match", "while let", "Pattern Matching", "Option", "Exhaustiveness"] } },

                { id: 41, chapter: "Ch. 6", section: "Enums & Pattern Matching", title: "match Arms", concept: "Arms & Patterns", description: "Each arm of a match has a pattern and code. The match expression is exhaustive — all cases must be covered.", code: 'match coin {\n    Coin::Penny => {\n        println!("Lucky penny!");\n        1\n    }\n    Coin::Nickel => 5,\n    _ => 0, // catch-all pattern\n}', tags: ["arm", "pattern", "exhaustive", "catch-all", "_"],
                  deepDive: { explanation: "A match arm consists of a pattern and an expression separated by =>. Patterns can be literal values, variable names, wildcards, or complex destructuring patterns. The match expression is evaluated by comparing the value against each pattern in order; the first matching arm is executed. Rust requires match to be exhaustive — every possible value of the type must be covered by at least one pattern. The _ pattern is a catch-all that matches any value. Match arms can contain blocks (multiple statements) or single expressions.", extendedCode: '<span class="keyword">enum</span> <span class="type">Coin</span> {\n    <span class="type">Penny</span>,\n    <span class="type">Nickel</span>,\n    <span class="type">Dime</span>,\n    <span class="type">Quarter</span>(<span class="type">UsState</span>),\n}\n\n<span class="keyword">fn</span> <span class="function">value_in_cents</span>(coin: <span class="type">Coin</span>) -> <span class="type">u8</span> {\n    <span class="keyword">match</span> coin {\n        <span class="type">Coin</span>::<span class="type">Penny</span> => {\n            <span class="macro">println!</span>(<span class="string">"Lucky penny!"</span>);\n            <span class="string">1</span>\n        }\n        <span class="type">Coin</span>::<span class="type">Nickel</span> => <span class="string">5</span>,\n        <span class="type">Coin</span>::<span class="type">Dime</span> => <span class="string">10</span>,\n        <span class="type">Coin</span>::<span class="type">Quarter</span>(state) => {\n            <span class="macro">println!</span>(<span class="string">"State quarter from {:?}!"</span>, state);\n            <span class="string">25</span>\n        }\n    }\n}', keyPoints: ["Arms are evaluated top-to-bottom; first match wins", "Match must be exhaustive — compiler rejects non-exhaustive matches", "The _ pattern matches any value and is commonly used as a catch-all", "Arms can be blocks { } or single expressions", "Patterns can destructure enums, structs, tuples, and nested types"], commonMistakes: ["Non-exhaustive match (missing enum variants)", "Overlapping patterns where an earlier arm shadows a later one", "Using _ when you should handle all variants explicitly"], relatedConcepts: ["Pattern Matching", "Enum", "Exhaustiveness", "Destructuring", "Wildcard"] } },

                // Chapter 7: Modules
                { id: 42, chapter: "Ch. 7", section: "Packages & Modules", title: "Packages & Crates", concept: "Code Organization", description: "A package contains one or more crates. A crate is a binary or library. src/main.rs is a binary crate root; src/lib.rs is a library crate root.", code: 'my_project/\n├── Cargo.toml\n├── src/\n│   ├── main.rs\n│   └── lib.rs', tags: ["package", "crate", "binary", "library", "root"],
                  deepDive: { explanation: "A package is a Cargo project that contains one or more crates. It has a Cargo.toml file. A crate is the smallest unit of compilation in Rust — either a binary (executable) or a library. A package can have multiple binary crates (in src/bin/ or specified in Cargo.toml) but at most one library crate (src/lib.rs). The crate root is the source file that Cargo passes to rustc to start compilation. Modules defined in the crate root can be in the same file or separate files following specific naming conventions.", extendedCode: '<span class="comment">// Package structure</span>\nmy_project/\n├── Cargo.toml\n├── src/\n│   ├── main.rs          <span class="comment">// binary crate root</span>\n│   ├── lib.rs           <span class="comment">// library crate root (optional)</span>\n│   └── bin/\n│       └── extra.rs     <span class="comment">// additional binary</span>\n\n<span class="comment">// In Cargo.toml, you can specify multiple binaries</span>\n[[bin]]\nname = <span class="string">"extra"</span>\npath = <span class="string">"src/bin/extra.rs"</span>\n\n<span class="comment">// Library crate root (src/lib.rs)</span>\n<span class="keyword">pub fn</span> <span class="function">add</span>(a: <span class="type">i32</span>, b: <span class="type">i32</span>) -> <span class="type">i32</span> {\n    a + b\n}\n\n<span class="comment">// Binary using the library</span>\n<span class="keyword">use</span> my_project::add;\n<span class="keyword">fn</span> <span class="function">main</span>() {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, add(<span class="string">2</span>, <span class="string">3</span>));\n}', keyPoints: ["A package contains one or more crates (at most one library)", "src/main.rs is the binary crate root; src/lib.rs is the library crate root", "Additional binaries go in src/bin/ or are declared in Cargo.toml", "The library crate is automatically available to binaries in the same package", "Crate root is the entry point for compilation"], commonMistakes: ["Putting multiple lib.rs files or having library code in main.rs", "Confusing the package name with the crate name (they often match)", "Trying to use binary-only code from the library crate"], relatedConcepts: ["Modules", "Cargo.toml", "src/lib.rs", "src/main.rs", "Workspace"] } },

                { id: 43, chapter: "Ch. 7", section: "Packages & Modules", title: "Modules", concept: "Namespaces", description: "Modules organize code within a crate and control privacy. Use mod to declare a module.", code: 'mod front_of_house {\n    pub mod hosting {\n        pub fn add_to_waitlist() {}\n    }\n}', tags: ["mod", "module", "namespace", "organization", "privacy"],
                  deepDive: { explanation: "Modules are Rust's way of organizing code within a crate and controlling visibility (privacy). A module groups related definitions (functions, structs, enums, traits) into a namespace. By default, everything in a module is private — it can only be accessed by code in the same module or child modules. Use the pub keyword to make items public. Modules can be defined inline with mod { } or in separate files following the module filesystem convention (mod_name.rs or mod_name/mod.rs).", extendedCode: '<span class="comment">// Inline module</span>\n<span class="keyword">mod</span> front_of_house {\n    <span class="keyword">pub mod</span> hosting {\n        <span class="keyword">pub fn</span> <span class="function">add_to_waitlist</span>() {}\n        <span class="keyword">fn</span> <span class="function">seat_at_table</span>() {} <span class="comment">// private</span>\n    }\n    \n    <span class="keyword">mod</span> serving { <span class="comment">// private module</span>\n        <span class="keyword">fn</span> <span class="function">take_order</span>() {}\n    }\n}\n\n<span class="comment">// File-based module (src/front_of_house.rs or src/front_of_house/mod.rs)</span>\n<span class="comment">// Declaration in crate root:</span>\n<span class="keyword">mod</span> front_of_house; <span class="comment">// loads from front_of_house.rs</span>\n\n<span class="comment">// Accessing module items</span>\n<span class="keyword">use</span> crate::front_of_house::hosting;\nhosting::add_to_waitlist();', keyPoints: ["Modules organize code and control privacy within a crate", "Everything is private by default; use pub to make items public", "Modules can be inline (mod { }) or file-based (mod_name.rs)", "Child modules can access private items of parent modules", "The module tree is rooted at the crate root (main.rs or lib.rs)"], commonMistakes: ["Forgetting pub on items that need to be accessed from outside the module", "Confusing file-based modules with inline modules", "Trying to access private items from sibling modules (use pub or pub(super))"], relatedConcepts: ["pub", "use", "Privacy", "Namespace", "Crate Root"] } },

                { id: 44, chapter: "Ch. 7", section: "Packages & Modules", title: "pub Keyword", concept: "Visibility", description: "Items in a module are private by default. Use pub to make them public.", code: 'mod back_of_house {\n    pub struct Breakfast {\n        pub toast: String,\n        seasonal_fruit: String, // private\n    }\n}', tags: ["pub", "public", "private", "visibility", "access"],
                  deepDive: { explanation: "The pub keyword makes items visible outside their module. Without pub, items are private to their module and descendants. Privacy in Rust is all-or-nothing for a module: child modules can see private items in their ancestors, but sibling modules cannot see each other's private items. For structs, pub makes the struct visible, but fields are still private unless individually marked pub. For enums, making the enum pub makes all variants public (unlike structs).", extendedCode: '<span class="keyword">mod</span> back_of_house {\n    <span class="keyword">pub struct</span> <span class="type">Breakfast</span> {\n        <span class="keyword">pub</span> toast: <span class="type">String</span>,       <span class="comment">// public field</span>\n        seasonal_fruit: <span class="type">String</span>, <span class="comment">// private field</span>\n    }\n    \n    <span class="keyword">pub enum</span> <span class="type">Appetizer</span> { <span class="comment">// enum is public</span>\n        <span class="type">Soup</span>,    <span class="comment">// variants are public too</span>\n        <span class="type">Salad</span>,\n    }\n    \n    <span class="keyword">impl</span> <span class="type">Breakfast</span> {\n        <span class="keyword">pub fn</span> <span class="function">summer</span>(toast: &<span class="type">str</span>) -> <span class="type">Breakfast</span> {\n            <span class="type">Breakfast</span> {\n                toast: <span class="type">String</span>::from(toast),\n                seasonal_fruit: <span class="type">String</span>::from(<span class="string">"peaches"</span>), <span class="comment">// can access private field</span>\n            }\n        }\n    }\n}', keyPoints: ["pub makes an item visible outside its module", "Struct fields are private by default, even if the struct is public", "Enum variants are public if the enum is public", "Child modules can access private items in parent modules", "pub(crate) limits visibility to the current crate; pub(super) to parent module"], commonMistakes: ["Making a struct pub but forgetting to make fields pub", "Assuming enum variants are private like struct fields", "Overusing pub when pub(crate) or pub(super) would be more appropriate"], relatedConcepts: ["Privacy", "Module", "Struct", "Enum", "Visibility"] } },

                { id: 45, chapter: "Ch. 7", section: "Packages & Modules", title: "use Keyword", concept: "Bringing Paths into Scope", description: "Use use to create shortcuts to items, reducing repetition of long paths.", code: 'use crate::front_of_house::hosting;\nhosting::add_to_waitlist();', tags: ["use", "import", "scope", "path", "shortcut"],
                  deepDive: { explanation: "The use keyword brings public items from modules into scope, creating shortcuts so you don't have to write full paths every time. It doesn't copy or import code — it simply creates a new name for an existing path. You can use use to bring in functions, structs, enums, traits, and modules. The pub use syntax re-exports an item, making it available as if it were defined in the current module. This is useful for creating a clean public API by exposing internal items at a higher level.", extendedCode: '<span class="comment">// Bringing a function into scope</span>\n<span class="keyword">use</span> crate::front_of_house::hosting::add_to_waitlist;\nadd_to_waitlist(); <span class="comment">// no need for full path</span>\n\n<span class="comment">// Bringing a module into scope</span>\n<span class="keyword">use</span> crate::front_of_house::hosting;\nhosting::add_to_waitlist();\n\n<span class="comment">// Renaming with as</span>\n<span class="keyword">use</span> std::fmt::Result <span class="keyword">as</span> FmtResult;\n<span class="keyword">use</span> std::io::Result <span class="keyword">as</span> IoResult;\n\n<span class="comment">// Nested paths</span>\n<span class="keyword">use</span> std::{cmp::Ordering, io, io::Write};\n\n<span class="comment">// Glob operator</span>\n<span class="keyword">use</span> std::collections::*;\n\n<span class="comment">// Re-exporting</span>\n<span class="keyword">pub use</span> crate::front_of_house::hosting;', keyPoints: ["use creates shortcuts, not copies", "Prefer bringing modules into scope rather than functions (clearer origin)", "pub use re-exports items for a cleaner API", "The as keyword renames imports to avoid naming conflicts", "Glob imports (*) are convenient but reduce clarity — use sparingly"], commonMistakes: ["Bringing functions directly into scope instead of their parent module (unclear where they come from)", "Naming conflicts when using multiple imports with the same name", "Forgetting that use only works with pub items"], relatedConcepts: ["Path", "Module", "pub use", "Scope", "Glob Import"] } },

                { id: 46, chapter: "Ch. 7", section: "Packages & Modules", title: "super & self", concept: "Relative Paths", description: "super refers to the parent module. self refers to the current module. Used for relative paths.", code: 'super::some_function(); // parent module\nself::some_function();  // current module', tags: ["super", "self", "relative", "path", "parent"],
                  deepDive: { explanation: "In module paths, self refers to the current module and super refers to the parent module. These are used for relative paths within use statements and module access. super is particularly useful when a module needs to access private items in its parent. self is rarely needed explicitly but can be used for clarity or in complex path scenarios. Relative paths start from the current module, while absolute paths start from the crate root (crate::).", extendedCode: '<span class="keyword">mod</span> outer {\n    <span class="keyword">fn</span> <span class="function">private_fn</span>() {}\n    \n    <span class="keyword">mod</span> inner {\n        <span class="comment">// Access parent module's private function</span>\n        <span class="keyword">fn</span> <span class="function">call_parent</span>() {\n            <span class="keyword">super</span>::private_fn();\n        }\n        \n        <span class="comment">// self refers to current module</span>\n        <span class="keyword">use</span> <span class="keyword">self</span>::some_fn;\n        \n        <span class="keyword">fn</span> <span class="function">some_fn</span>() {}\n    }\n}\n\n<span class="comment">// In use statements</span>\n<span class="keyword">use</span> <span class="keyword">self</span>::module::Item; <span class="comment">// explicit current module</span>\n<span class="keyword">use</span> <span class="keyword">super</span>::parent_module::Item; <span class="comment">// parent module</span>', keyPoints: ["super refers to the parent module in the module tree", "self refers to the current module (rarely needed explicitly)", "Relative paths are useful for module-internal organization", "super can access private items in the parent module", "crate:: provides absolute paths from the crate root"], commonMistakes: ["Using super in the crate root (there is no parent)", "Confusing super with crate:: (super is relative, crate is absolute)", "Overusing absolute paths when relative paths would be clearer"], relatedConcepts: ["Path", "Module Tree", "crate::", "Absolute Path", "Relative Path"] } },

                { id: 47, chapter: "Ch. 7", section: "Packages & Modules", title: "Re-exporting", concept: "pub use", description: "pub use re-exports an item so that external code can use it as if it were defined in that module.", code: 'pub use self::front_of_house::hosting;', tags: ["re-export", "pub use", "external", "API", "shortcut"],
                  deepDive: { explanation: "Re-exporting with pub use allows you to expose an internal item through a different module path. This is a powerful pattern for API design: you can organize your code internally however you want, but present a simplified, clean public API. For example, a crate might have deep internal module hierarchies, but re-export commonly used items at the crate root so users can access them with just use crate::Item. This is extensively used in the standard library and popular crates.", extendedCode: '<span class="comment">// Internal organization</span>\n<span class="keyword">mod</span> network {\n    <span class="keyword">pub mod</span> tcp {\n        <span class="keyword">pub struct</span> <span class="type">Listener</span> { ... }\n        <span class="keyword">pub struct</span> <span class="type">Stream</span> { ... }\n    }\n    <span class="keyword">pub mod</span> udp {\n        <span class="keyword">pub struct</span> <span class="type">Socket</span> { ... }\n    }\n}\n\n<span class="comment">// Re-export for clean API</span>\n<span class="keyword">pub use</span> <span class="keyword">self</span>::network::tcp::{Listener, Stream};\n<span class="keyword">pub use</span> <span class="keyword">self</span>::network::udp::Socket;\n\n<span class="comment">// Users can now write:</span>\n<span class="comment">// use my_crate::Listener;</span>\n<span class="comment">// instead of:</span>\n<span class="comment">// use my_crate::network::tcp::Listener;</span>', keyPoints: ["pub use re-exports items at a different module path", "Allows internal organization to differ from public API", "Common pattern for simplifying crate usage", "Can re-export multiple items, modules, or even external crates", "The prelude pattern uses re-exports for commonly used items"], commonMistakes: ["Re-exporting too many items, cluttering the namespace", "Forgetting pub on the re-export (use without pub is private)", "Re-exporting items that should remain internal implementation details"], relatedConcepts: ["use", "pub", "API Design", "Prelude", "Module"] } },

                // Chapter 8: Common Collections
                { id: 48, chapter: "Ch. 8", section: "Common Collections", title: "Vectors", concept: "Vec<T>", description: "Vectors store values of the same type in a contiguous heap allocation. They can grow or shrink.", code: 'let mut v = Vec::new();\nv.push(1);\nv.push(2);\nlet v2 = vec![1, 2, 3]; // macro', tags: ["Vec", "vector", "collection", "push", "vec!"],
                  deepDive: { explanation: "Vec<T> (vector) is Rust's most common growable collection. It stores elements of the same type in a contiguous heap allocation, providing O(1) indexing and amortized O(1) appending. Vec manages its own capacity — when full, it reallocates to a larger buffer (typically doubling capacity). The vec! macro provides convenient initialization. Vec is a generic type, so Vec<i32> and Vec<String> are different types. Elements are dropped when the Vec is dropped or when explicitly removed.", extendedCode: '<span class="comment">// Creating vectors</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> v = <span class="type">Vec</span>::new();\nv.push(<span class="string">1</span>);\nv.push(<span class="string">2</span>);\n\n<span class="keyword">let</span> v2 = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>]; <span class="comment">// macro initialization</span>\n<span class="keyword">let</span> v3 = <span class="macro">vec!</span>[<span class="string">0</span>; <span class="string">5</span>];      <span class="comment">// [0, 0, 0, 0, 0]</span>\n\n<span class="comment">// Pre-allocate capacity</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> v4 = <span class="type">Vec</span>::with_capacity(<span class="string">1000</span>);\n\n<span class="comment">// Iterating</span>\n<span class="keyword">for</span> i <span class="keyword">in</span> &v2 {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, i);\n}\n\n<span class="comment">// Collecting from iterator</span>\n<span class="keyword">let</span> v5: <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt; = (<span class="string">0</span>..<span class="string">5</span>).collect();', keyPoints: ["Vec stores elements contiguously on the heap", "O(1) indexing; amortized O(1) push", "Reallocates when capacity is exceeded (doubles capacity)", "vec![] macro provides convenient initialization", "Can pre-allocate with with_capacity() to avoid reallocations"], commonMistakes: ["Accessing out of bounds with [index] (panics) instead of get() (returns Option)", "Holding a reference to an element while modifying the vector (borrow checker error)", "Forgetting that pop() returns Option<T>"], relatedConcepts: ["Slice", "Heap", "Capacity", "Iterator", "Collection"] } },

                { id: 49, chapter: "Ch. 8", section: "Common Collections", title: "Reading Vectors", concept: "Indexing & get", description: "Access elements by index (panics if out of bounds) or get (returns Option).", code: 'let third: &i32 = &v[2]; // may panic\nlet third: Option<&i32> = v.get(2); // returns None if out of bounds', tags: ["index", "get", "Option", "panic", "bounds"],
                  deepDive: { explanation: "Vectors support two primary access methods: indexing with [] and the get method. Indexing returns a reference directly but panics if the index is out of bounds. This is appropriate when you know the index is valid (e.g., after bounds checking or in tight loops with known ranges). The get method returns an Option<&T>, returning None for out-of-bounds access instead of panicking. This is safer when the index might be invalid. Both methods borrow the vector, so you cannot modify the vector while holding references to its elements.", extendedCode: '<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>, <span class="string">4</span>, <span class="string">5</span>];\n\n<span class="comment">// Indexing (panics if out of bounds)</span>\n<span class="keyword">let</span> first: &<span class="type">i32</span> = &v[<span class="string">0</span>];\n\n<span class="comment">// get() returns Option</span>\n<span class="keyword">match</span> v.get(<span class="string">100</span>) {\n    <span class="type">Some</span>(value) => <span class="macro">println!</span>(<span class="string">"Found: {}"</span>, value),\n    <span class="type">None</span> => <span class="macro">println!</span>(<span class="string">"Out of bounds"</span>),\n}\n\n<span class="comment">// first() and last() convenience methods</span>\n<span class="keyword">let</span> first = v.first(); <span class="comment">// Option<&T></span>\n<span class="keyword">let</span> last = v.last();   <span class="comment">// Option<&T></span>\n\n<span class="comment">// Mutable access</span>\n<span class="keyword">let</span> first_mut = &<span class="keyword">mut</span> v[<span class="string">0</span>];\n*first_mut = <span class="string">100</span>;', keyPoints: ["[] indexing panics on out-of-bounds; use when index is guaranteed valid", "get() returns Option<&T> for safe access", "first() and last() are convenience methods returning Option", "Mutable indexing uses &mut v[i]", "Cannot push to vector while holding references to its elements"], commonMistakes: ["Using [index] with user-provided indices without bounds checking", "Trying to use get() when you need mutable access (use get_mut())", "Holding a reference while modifying the vector"], relatedConcepts: ["Option", "Panic", "Bounds Checking", "Borrowing", "Slice"] } },

                { id: 50, chapter: "Ch. 8", section: "Common Collections", title: "Iterating Vectors", concept: "for loop", description: "Iterate immutably or mutably over vectors. Cannot modify length while iterating.", code: 'for i in &mut v {\n    *i += 50; // dereference to mutate\n}', tags: ["iterate", "for", "mutable", "dereference", "*"],
                  deepDive: { explanation: "Vectors can be iterated immutably (&v), mutably (&mut v), or by value (v.into_iter()). When iterating by reference, the iterator yields references to elements. To mutate through a mutable reference, you must dereference with the * operator. You cannot modify the vector's length (push, pop, insert) while iterating because the iterator holds a borrow on the vector. If you need to modify the collection while iterating, collect indices first, or use retain/drain methods.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> v = <span class="macro">vec!</span>[<span class="string">100</span>, <span class="string">32</span>, <span class="string">57</span>];\n\n<span class="comment">// Immutable iteration</span>\n<span class="keyword">for</span> i <span class="keyword">in</span> &v {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, i);\n}\n\n<span class="comment">// Mutable iteration</span>\n<span class="keyword">for</span> i <span class="keyword">in</span> &<span class="keyword">mut</span> v {\n    *i += <span class="string">50</span>; <span class="comment">// dereference to mutate the value</span>\n}\n\n<span class="comment">// By-value iteration (consumes vector)</span>\n<span class="keyword">for</span> i <span class="keyword">in</span> v {\n    <span class="macro">println!</span>(<span class="string">"Consumed: {}"</span>, i);\n}\n<span class="comment">// v is now invalid</span>\n\n<span class="comment">// Using iterator methods</span>\n<span class="keyword">let</span> sum: <span class="type">i32</span> = v.iter().sum();', keyPoints: ["for i in &v iterates by immutable reference", "for i in &mut v iterates by mutable reference (use * to mutate)", "for i in v consumes the vector", "Cannot modify vector length while iterating", "Iterator methods (map, filter, fold) are often more idiomatic than loops"], commonMistakes: ["Forgetting to dereference (*i) when mutating through a mutable reference", "Trying to push/pop while iterating (borrow checker error)", "Consuming the vector when you meant to borrow it"], relatedConcepts: ["Iterator", "Dereference", "Borrowing", "into_iter", "retain"] } },

                { id: 51, chapter: "Ch. 8", section: "Common Collections", title: "Strings", concept: "UTF-8 Text", description: "String is a growable, mutable, owned UTF-8 encoded string. String::from and .to_string() create them.", code: 'let s1 = String::from("hello");\nlet s2 = "hello".to_string();\nlet mut s3 = String::from("hello");\ns3.push_str(" world");', tags: ["String", "UTF-8", "push_str", "to_string", "text"],
                  deepDive: { explanation: "String is Rust's growable, mutable, owned UTF-8 encoded string type. It wraps a Vec<u8> and guarantees valid UTF-8. String::from and .to_string() are the primary constructors. String differs from &str: String owns its data and can grow, while &str is a borrowed slice. Because String is UTF-8, indexing by character position isn't O(1) — you must iterate or use specific methods. String implements Deref<Target=str>, so all &str methods are available on String.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n\n<span class="comment">// Appending</span>\ns.push(<span class="string">\'!\'</span>);           <span class="comment">// single char</span>\ns.push_str(<span class="string">" world"</span>);  <span class="comment">// string slice</span>\n\n<span class="comment">// Length vs capacity</span>\n<span class="macro">println!</span>(<span class="string">"len: {}, capacity: {}"</span>, s.len(), s.capacity());\n\n<span class="comment">// UTF-8: len() returns bytes, not characters</span>\n<span class="keyword">let</span> japanese = <span class="type">String</span>::from(<span class="string">"こんにちは"</span>);\n<span class="macro">assert_eq!</span>(japanese.len(), <span class="string">15</span>); <span class="comment">// 5 chars × 3 bytes each</span>\n\n<span class="comment">// Conversions</span>\n<span class="keyword">let</span> slice: &<span class="type">str</span> = &s; <span class="comment">// Deref coercion</span>\n<span class="keyword">let</span> s2 = slice.to_string(); <span class="comment">// &str to String</span>', keyPoints: ["String is a wrapper around Vec<u8> with UTF-8 guarantee", "String::from and .to_string() are the main constructors", "push() adds a char; push_str() adds a string slice", "len() returns byte length, not character count", "String implements Deref<Target=str>, so &str methods work on String"], commonMistakes: ["Using [index] on String (not allowed because UTF-8 boundaries)", "Assuming len() returns character count", "Using push() with a string instead of push_str()"], relatedConcepts: ["&str", "Vec<u8>", "UTF-8", "Deref", "push_str"] } },

                { id: 52, chapter: "Ch. 8", section: "Common Collections", title: "String Concatenation", concept: "+ and format!", description: "The + operator takes ownership of the left string. format! is better for multiple concatenations.", code: 'let s3 = s1 + &s2; // s1 moved\nlet s = format!("{s1}-{s2}-{s3}"); // no ownership taken', tags: ["concatenate", "+", "format!", "ownership", "string"],
