<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rust Book — Searchable Notes</title>
    <style>
        :root {
            --bg: #faf8f5;
            --sidebar-bg: #f3f0eb;
            --card-bg: #ffffff;
            --accent: #ce422b;
            --accent-hover: #a53320;
            --text: #2d2d2d;
            --text-muted: #6b6b6b;
            --border: #e0dcd6;
            --highlight: #fff3cd;
            --code-bg: #f6f3ee;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 16px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--card-bg);
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(206, 66, 43, 0.1);
        }

        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chapter-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.15s;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-item:hover {
            background: rgba(206, 66, 43, 0.08);
            color: var(--text);
        }

        .chapter-item.active {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        .chapter-item .ch-num {
            display: inline-block;
            width: 28px;
            font-weight: 600;
            opacity: 0.7;
        }

        .chapter-item.active .ch-num {
            opacity: 1;
        }

        .stats {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        /* Main Content */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 20px 32px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .main-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .main-header .meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }

        .note-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .note-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-card:hover::before {
            opacity: 1;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        .note-location {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--sidebar-bg);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .note-concept {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-style: italic;
            border-left: 2px solid var(--border);
            padding-left: 10px;
        }

        .note-description {
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .note-code {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: "SF Mono", Monaco, "Cascadia Code", "Fira Code", Consolas, monospace;
            font-size: 0.8rem;
            overflow-x: auto;
            color: #333;
            margin-bottom: 12px;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: var(--sidebar-bg);
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag.highlight {
            background: var(--highlight);
            color: #856404;
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
            .notes-grid {
                grid-template-columns: 1fr;
            }
        }

        mark {
            background: var(--highlight);
            padding: 1px 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🦀 The Rust Book</h1>
                <p>3rd Edition • Searchable Notes</p>
            </div>
            <div class="search-box">
                <input type="text" id="globalSearch" placeholder="Search any keyword, concept, code...">
            </div>
            <div class="chapter-list" id="chapterList"></div>
            <div class="stats" id="stats"></div>
        </aside>

        <main class="main">
            <div class="main-header">
                <h2 id="mainTitle">All Notes</h2>
                <span class="meta" id="resultCount">Loading...</span>
            </div>
            <div class="content" id="content">
                <div class="notes-grid" id="notesGrid"></div>
            </div>
        </main>
    </div>

            // Chapter 7: Modules
            { id: 42, chapter: "Ch. 7", section: "Packages & Modules", title: "Packages & Crates", concept: "Code Organization", description: "A package contains one or more crates. A crate is a binary or library. src/main.rs is a binary crate root; src/lib.rs is a library crate root.", code: 'my_project/\n├── Cargo.toml\n├── src/\n│   ├── main.rs\n│   └── lib.rs', tags: ["package", "crate", "binary", "library", "root"] },
            { id: 43, chapter: "Ch. 7", section: "Packages & Modules", title: "Modules", concept: "Namespaces", description: "Modules organize code within a crate and control privacy. Use mod to declare a module.", code: 'mod front_of_house {\n    pub mod hosting {\n        pub fn add_to_waitlist() {}\n    }\n}', tags: ["mod", "module", "namespace", "organization", "privacy"] },
            { id: 44, chapter: "Ch. 7", section: "Packages & Modules", title: "pub Keyword", concept: "Visibility", description: "Items in a module are private by default. Use pub to make them public.", code: 'mod back_of_house {\n    pub struct Breakfast {\n        pub toast: String,\n        seasonal_fruit: String, // private\n    }\n}', tags: ["pub", "public", "private", "visibility", "access"] },
            { id: 45, chapter: "Ch. 7", section: "Packages & Modules", title: "use Keyword", concept: "Bringing Paths into Scope", description: "Use use to create shortcuts to items, reducing repetition of long paths.", code: 'use crate::front_of_house::hosting;\nhosting::add_to_waitlist();', tags: ["use", "import", "scope", "path", "shortcut"] },
            { id: 46, chapter: "Ch. 7", section: "Packages & Modules", title: "super & self", concept: "Relative Paths", description: "super refers to the parent module. self refers to the current module. Used for relative paths.", code: 'super::some_function(); // parent module\nself::some_function();  // current module', tags: ["super", "self", "relative", "path", "parent"] },
            { id: 47, chapter: "Ch. 7", section: "Packages & Modules", title: "Re-exporting", concept: "pub use", description: "pub use re-exports an item so that external code can use it as if it were defined in that module.", code: 'pub use self::front_of_house::hosting;', tags: ["re-export", "pub use", "external", "API", "shortcut"] },

            // Chapter 8: Common Collections
            { id: 48, chapter: "Ch. 8", section: "Common Collections", title: "Vectors", concept: "Vec<T>", description: "Vectors store values of the same type in a contiguous heap allocation. They can grow or shrink.", code: 'let mut v = Vec::new();\nv.push(1);\nv.push(2);\nlet v2 = vec![1, 2, 3]; // macro', tags: ["Vec", "vector", "collection", "push", "vec!"] },
            { id: 49, chapter: "Ch. 8", section: "Common Collections", title: "Reading Vectors", concept: "Indexing & get", description: "Access elements by index (panics if out of bounds) or get (returns Option).", code: 'let third: &i32 = &v[2]; // may panic\nlet third: Option<&i32> = v.get(2); // returns None if out of bounds', tags: ["index", "get", "Option", "panic", "bounds"] },
            { id: 50, chapter: "Ch. 8", section: "Common Collections", title: "Iterating Vectors", concept: "for loop", description: "Iterate immutably or mutably over vectors. Cannot modify length while iterating.", code: 'for i in &mut v {\n    *i += 50; // dereference to mutate\n}', tags: ["iterate", "for", "mutable", "dereference", "*"] },
            { id: 51, chapter: "Ch. 8", section: "Common Collections", title: "Strings", concept: "UTF-8 Text", description: "String is a growable, mutable, owned UTF-8 encoded string. String::from and .to_string() create them.", code: 'let s1 = String::from("hello");\nlet s2 = "hello".to_string();\nlet mut s3 = String::from("hello");\ns3.push_str(" world");', tags: ["String", "UTF-8", "push_str", "to_string", "text"] },
            { id: 52, chapter: "Ch. 8", section: "Common Collections", title: "String Concatenation", concept: "+ and format!", description: "The + operator takes ownership of the left string. format! is better for multiple concatenations.", code: 'let s3 = s1 + &s2; // s1 moved\nlet s = format!("{s1}-{s2}-{s3}"); // no ownership taken', tags: ["concatenate", "+", "format!", "ownership", "string"] },
            { id: 53, chapter: "Ch. 8", section: "Common Collections", title: "Hash Maps", concept: "HashMap<K, V>", description: "Hash maps store key-value pairs. Keys must implement Eq and Hash traits.", code: 'use std::collections::HashMap;\nlet mut scores = HashMap::new();\nscores.insert(String::from("Blue"), 10);', tags: ["HashMap", "hash", "key-value", "insert", "collection"] },
            { id: 54, chapter: "Ch. 8", section: "Common Collections", title: "Hash Map Access", concept: "get & entry", description: "Use get to retrieve values. Use entry (or_insert) for insert-if-not-exists logic.", code: 'scores.entry(String::from("Yellow"))\n    .or_insert(50); // inserts 50 if key missing', tags: ["entry", "or_insert", "get", "default", "update"] },

            // Chapter 9: Error Handling
            { id: 55, chapter: "Ch. 9", section: "Error Handling", title: "panic!", concept: "Unrecoverable Errors", description: "panic! macro stops execution and unwinds the stack (or aborts). Used for unrecoverable errors.", code: 'panic!("crash and burn");', tags: ["panic", "unrecoverable", "abort", "unwind", "crash"] },
            { id: 56, chapter: "Ch. 9", section: "Error Handling", title: "Result<T, E>", concept: "Recoverable Errors", description: "Result is an enum: Ok(T) for success, Err(E) for failure. Used for operations that might fail.", code: 'enum Result<T, E> {\n    Ok(T),\n    Err(E),\n}\nlet f = File::open("hello.txt"); // returns Result<File, io::Error>', tags: ["Result", "Ok", "Err", "recoverable", "File"] },
            { id: 57, chapter: "Ch. 9", section: "Error Handling", title: "unwrap & expect", concept: "Convenience Methods", description: "unwrap returns the value inside Ok or panics on Err. expect is like unwrap but with a custom message.", code: 'let f = File::open("hello.txt").unwrap();\nlet f = File::open("hello.txt")\n    .expect("Failed to open hello.txt");', tags: ["unwrap", "expect", "panic", "convenience", "message"] },
            { id: 58, chapter: "Ch. 9", section: "Error Handling", title: "Propagating Errors", concept: "? Operator", description: "The ? operator returns the Err value early from a function, or unwraps the Ok value.", code: 'fn read_username_from_file() -> Result<String, io::Error> {\n    let mut username = String::new();\n    File::open("hello.txt")?.read_to_string(&mut username)?;\n    Ok(username)\n}', tags: ["?", "propagate", "early return", "Result", "chaining"] },
            { id: 59, chapter: "Ch. 9", section: "Error Handling", title: "Custom Error Types", concept: "Error Trait", description: "Implement std::error::Error for custom types. Often combined with enums to represent multiple error kinds.", code: '#[derive(Debug)]\nenum MyError {\n    NotFound,\n    InvalidFormat,\n}', tags: ["custom error", "Error trait", "derive", "Debug", "enum"] },

            // Chapter 10: Generics, Traits, Lifetimes
            { id: 60, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Generic Functions", concept: "Type Parameters", description: "Generics abstract over types to avoid code duplication while maintaining type safety at compile time.", code: 'fn largest<T: std::cmp::PartialOrd>(list: &[T]) -> &T {\n    let mut largest = &list[0];\n    for item in list {\n        if item > largest { largest = item; }\n    }\n    largest\n}', tags: ["generic", "T", "type parameter", "PartialOrd", "abstraction"] },
            { id: 61, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Struct Generics", concept: "Generic Data Structures", description: "Structs and enums can hold generic data types. Multiple type parameters are allowed.", code: 'struct Point<T, U> {\n    x: T,\n    y: U,\n}\nlet p = Point { x: 5, y: 4.0 };', tags: ["generic struct", "Point", "multiple types", "T", "U"] },
            { id: 62, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Traits", concept: "Shared Behavior", description: "Traits define shared behavior (interfaces). Types implement traits to promise certain functionality.", code: 'pub trait Summary {\n    fn summarize(&self) -> String;\n}\nimpl Summary for NewsArticle { ... }', tags: ["trait", "interface", "Summary", "impl", "behavior"] },
            { id: 63, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Trait Bounds", concept: "Constraining Generics", description: "Trait bounds restrict generic types to those that implement specific traits.", code: 'pub fn notify<T: Summary>(item: &T) {}\n// or with where clause:\npub fn notify<T>(item: &T) where T: Summary {}', tags: ["trait bound", "where", "constraint", "generic", "Summary"] },
            { id: 64, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Trait Objects", concept: "Dynamic Dispatch", description: "Trait objects (dyn Trait) allow polymorphism. They use dynamic dispatch and must be used behind a pointer.", code: 'pub fn notify(item: &dyn Summary) {\n    println!("Breaking! {}", item.summarize());\n}', tags: ["dyn", "trait object", "dynamic dispatch", "polymorphism", "pointer"] },
            { id: 65, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Lifetimes", concept: "Reference Validity", description: "Lifetimes ensure references are valid as long as needed. They are compile-time checks, not runtime.", code: 'fn longest<\'a>(x: &\'a str, y: &\'a str) -> &\'a str {\n    if x.len() > y.len() { x } else { y }\n}', tags: ["lifetime", "\'a", "reference", "validity", "annotation"] },
            { id: 66, chapter: "Ch. 10", section: "Generics, Traits, Lifetimes", title: "Lifetime Elision", concept: "Automatic Inference", description: "The compiler can infer lifetimes in common patterns (elision rules), reducing annotation boilerplate.", code: 'fn first_word(s: &str) -> &str { ... }\n// Same as: fn first_word<\'a>(s: &\'a str) -> &\'a str', tags: ["elision", "lifetime inference", "compiler", "shorthand", "rules"] },

            // Chapter 11: Tests
            { id: 67, chapter: "Ch. 11", section: "Writing Tests", title: "Test Functions", concept: "Unit Testing", description: "Tests are functions annotated with #[test]. Run with cargo test. They panic on failure.", code: '#[test]\nfn it_works() {\n    let result = 2 + 2;\n    assert_eq!(result, 4);\n}', tags: ["test", "#[test]", "cargo test", "unit", "assert"] },
            { id: 68, chapter: "Ch. 11", section: "Writing Tests", title: "Assertions", concept: "assert!, assert_eq!, assert_ne!", description: "assert! checks for true. assert_eq! checks equality. assert_ne! checks inequality. All take optional message.", code: 'assert!(true);\nassert_eq!(left, right);\nassert_ne!(left, right, "custom message");', tags: ["assert", "assert_eq", "assert_ne", "equality", "check"] },
            { id: 69, chapter: "Ch. 11", section: "Writing Tests", title: "should_panic", concept: "Expected Failures", description: "should_panic tests verify that code panics as expected. Use expected to check the panic message.", code: '#[test]\n#[should_panic(expected = "index out of bounds")]\nfn test_panic() {\n    v[99]; // should panic\n}', tags: ["should_panic", "panic", "expected", "failure", "test"] },
            { id: 70, chapter: "Ch. 11", section: "Writing Tests", title: "Result in Tests", concept: "Returning Result", description: "Tests can return Result<T, E> instead of panicking. Use ? for early returns on error.", code: '#[test]\nfn test_with_result() -> Result<(), String> {\n    if 2 + 2 == 4 { Ok(()) } else { Err(String::from("bad math")) }\n}', tags: ["Result", "test", "return", "Ok", "Err"] },
            { id: 71, chapter: "Ch. 11", section: "Writing Tests", title: "Test Organization", concept: "Unit vs Integration", description: "Unit tests go in src files with #[cfg(test)]. Integration tests go in tests/ directory and test the public API.", code: '// src/lib.rs\n#[cfg(test)]\nmod tests { ... }\n\n// tests/integration_test.rs\nuse my_crate;', tags: ["unit test", "integration test", "cfg(test)", "tests directory", "organization"] },

            // Chapter 12: I/O Project
            { id: 72, chapter: "Ch. 12", section: "I/O Project", title: "CLI Arguments", concept: "env::args", description: "Collect command line arguments using std::env::args. The first argument is the program name.", code: 'let args: Vec<String> = env::args().collect();\nlet query = &args[1];\nlet file_path = &args[2];', tags: ["args", "CLI", "command line", "env", "collect"] },
            { id: 73, chapter: "Ch. 12", section: "I/O Project", title: "Reading Files", concept: "fs::read_to_string", description: "Read an entire file into a String. For larger files, use BufReader for efficiency.", code: 'use std::fs;\nlet contents = fs::read_to_string(file_path)\n    .expect("Should have been able to read the file");', tags: ["fs", "read_to_string", "file", "read", "IO"] },
            { id: 74, chapter: "Ch. 12", section: "I/O Project", title: "Refactoring with Iterators", concept: "Iterator Chains", description: "Replace manual loops with iterator methods like filter, map, and collect for cleaner, more idiomatic code.", code: 'let results: Vec<&str> = contents\n    .lines()\n    .filter(|line| line.contains(query))\n    .collect();', tags: ["iterator", "filter", "lines", "collect", "refactor"] },
            { id: 75, chapter: "Ch. 12", section: "I/O Project", title: "Box<dyn Error>", concept: "Error Propagation", description: "Use Box<dyn Error> as a return type to allow any kind of error to be returned from main or functions.", code: 'fn main() -> Result<(), Box<dyn Error>> {\n    let contents = fs::read_to_string(file_path)?;\n    Ok(())\n}', tags: ["Box", "dyn Error", "main", "return", "propagation"] },

            // Chapter 13: Iterators & Closures
            { id: 76, chapter: "Ch. 13", section: "Iterators & Closures", title: "Closures", concept: "Anonymous Functions", description: "Closures are anonymous functions that can capture variables from their environment. They infer parameter and return types.", code: 'let add_one = |x| x + 1;\nlet closure = |num| {\n    println!("calculating...");\n    num + 2\n};', tags: ["closure", "anonymous", "lambda", "capture", "environment"] },
            { id: 77, chapter: "Ch. 13", section: "Iterators & Closures", title: "Closure Traits", concept: "Fn, FnMut, FnOnce", description: "Closures implement traits based on how they capture environment: Fn (immutable borrow), FnMut (mutable borrow), FnOnce (takes ownership).", code: 'Fn: borrows values immutably\nFnMut: borrows values mutably\nFnOnce: consumes values (takes ownership)', tags: ["Fn", "FnMut", "FnOnce", "trait", "capture"] },
            { id: 78, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterators", concept: "Iterator Trait", description: "Iterators implement the Iterator trait with next() method. They are lazy — nothing happens until you call a consuming method.", code: 'pub trait Iterator {\n    type Item;\n    fn next(&mut self) -> Option<Self::Item>;\n}', tags: ["Iterator", "next", "Item", "lazy", "trait"] },
            { id: 79, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterator Methods", concept: "map, filter, collect", description: "Iterator adaptors transform iterators. Consuming methods like collect, sum, or for_each trigger evaluation.", code: 'let v: Vec<i32> = (1..=10)\n    .map(|x| x * 2)\n    .filter(|x| x > &5)\n    .collect();', tags: ["map", "filter", "collect", "adaptor", "consuming"] },
            { id: 80, chapter: "Ch. 13", section: "Iterators & Closures", title: "Iterator Performance", concept: "Zero-Cost Abstractions", description: "Iterators are zero-cost abstractions. The compiled code is as efficient as hand-written loops due to monomorphization and inlining.", code: '// This iterator chain compiles to the same\n// efficient machine code as a for loop', tags: ["zero-cost", "abstraction", "performance", "inline", "monomorphization"] },

            // Chapter 14: Cargo & Crates.io
            { id: 81, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Workspaces", concept: "Multi-Crate Projects", description: "Workspaces allow managing multiple related packages that share a single Cargo.lock and output directory.", code: '[workspace]\nmembers = [\n    "adder",\n    "add-one",\n]', tags: ["workspace", "multi-crate", "Cargo.lock", "members", "project"] },
            { id: 82, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Documentation Comments", concept: "/// and //!", description: "/// documents the item after it. //! documents the enclosing item (module/crate). Generates HTML with cargo doc.", code: '/// Adds one to the given number.\n/// # Examples\n/// let five = add_one(4);\npub fn add_one(x: i32) -> i32 { x + 1 }', tags: ["doc comment", "///", "cargo doc", "documentation", "markdown"] },
            { id: 83, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Publishing Crates", concept: "crates.io", description: "Publish libraries to crates.io using cargo publish. Requires auth token and semantic versioning.", code: '$ cargo login <API_TOKEN>\n$ cargo publish', tags: ["crates.io", "publish", "cargo", "version", "registry"] },
            { id: 84, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Profiles", concept: "dev & release", description: "Cargo has built-in profiles for development and release, controlling optimization levels and debug info.", code: '[profile.release]\nopt-level = 3\nlto = true', tags: ["profile", "release", "dev", "optimization", "Cargo.toml"] },

            // Chapter 15: Smart Pointers
            { id: 85, chapter: "Ch. 15", section: "Smart Pointers", title: "Box<T>", concept: "Heap Allocation", description: "Box<T> allocates data on the heap and stores a pointer on the stack. Useful for recursive types or large data transfers.", code: 'let b = Box::new(5);\nprintln!("b = {}", b); // auto-dereferenced', tags: ["Box", "heap", "pointer", "recursive", "allocation"] },
            { id: 86, chapter: "Ch. 15", section: "Smart Pointers", title: "Deref Trait", concept: "Custom Dereference", description: "Implementing Deref allows smart pointers to be treated like references. Enables deref coercion.", code: 'impl<T> Deref for MyBox<T> {\n    type Target = T;\n    fn deref(&self) -> &T { &self.0 }\n}', tags: ["Deref", "dereference", "coercion", "smart pointer", "trait"] },
            { id: 87, chapter: "Ch. 15", section: "Smart Pointers", title: "Drop Trait", concept: "Custom Cleanup", description: "Drop lets you customize what happens when a value goes out of scope. Used for resource cleanup.", code: 'impl Drop for CustomSmartPointer {\n    fn drop(&mut self) {\n        println!("Dropping!");\n    }\n}', tags: ["Drop", "destructor", "cleanup", "scope", "resource"] },
            { id: 88, chapter: "Ch. 15", section: "Smart Pointers", title: "Rc<T>", concept: "Reference Counting", description: "Rc<T> enables multiple ownership via reference counting. Only for single-threaded scenarios.", code: 'use std::rc::Rc;\nlet data = Rc::new(5);\nlet data2 = Rc::clone(&data);', tags: ["Rc", "reference count", "multiple ownership", "clone", "single-threaded"] },
            { id: 89, chapter: "Ch. 15", section: "Smart Pointers", title: "RefCell<T>", concept: "Interior Mutability", description: "RefCell<T> enforces borrowing rules at runtime rather than compile time. Uses borrow() and borrow_mut().", code: 'use std::cell::RefCell;\nlet cell = RefCell::new(5);\n*cell.borrow_mut() += 1;', tags: ["RefCell", "interior mutability", "borrow", "runtime", "cell"] },
            { id: 90, chapter: "Ch. 15", section: "Smart Pointers", title: "Reference Cycles", concept: "Memory Leaks", description: "Rc + RefCell can create reference cycles causing memory leaks. Use Weak<T> to break cycles.", code: 'use std::rc::Weak;\nlet weak = Rc::downgrade(&rc); // Weak reference', tags: ["Weak", "reference cycle", "memory leak", "downgrade", "Rc"] },

            // Chapter 16: Fearless Concurrency
            { id: 91, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Threads", concept: "spawn & join", description: "Create threads with thread::spawn. Use join to wait for threads to finish and get their results.", code: 'let handle = thread::spawn(|| {\n    for i in 1..10 { println!(\"hi number {i}\"); }\n});\nhandle.join().unwrap();', tags: ["thread", "spawn", "join", "concurrent", "parallel"] },
            { id: 92, chapter: "Ch. 16", section: "Fearless Concurrency", title: "move Closures", concept: "Transferring Ownership", description: "Use move before a closure to force it to take ownership of captured variables, useful for threads.", code: 'let v = vec![1, 2, 3];\nlet handle = thread::spawn(move || {\n    println!("Vector: {v:?}");\n});', tags: ["move", "closure", "thread", "ownership", "capture"] },
            { id: 93, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Message Passing", concept: "Channels", description: "mpsc (multiple producer, single consumer) channels transfer data between threads using send and recv.", code: 'let (tx, rx) = mpsc::channel();\ntx.send(val).unwrap();\nlet received = rx.recv().unwrap();', tags: ["channel", "mpsc", "send", "recv", "message"] },
            { id: 94, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Mutex<T>", concept: "Mutual Exclusion", description: "Mutex provides interior mutability across threads. Must acquire lock before accessing data. Lock releases when guard drops.", code: 'let m = Mutex::new(5);\n{\n    let mut num = m.lock().unwrap();\n    *num = 6;\n} // lock released here', tags: ["Mutex", "lock", "thread-safe", "interior mutability", "guard"] },
            { id: 95, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Arc<T>", concept: "Atomic Reference Count", description: "Arc<T> is like Rc<T> but thread-safe. Use Arc with Mutex to share mutable state between threads.", code: 'let counter = Arc::new(Mutex::new(0));\nlet counter2 = Arc::clone(&counter);\nthread::spawn(move || {\n    let mut num = counter2.lock().unwrap();\n    *num += 1;\n});', tags: ["Arc", "atomic", "thread-safe", "Mutex", "share"] },
            { id: 96, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Send & Sync Traits", concept: "Thread Safety Markers", description: "Send: safe to transfer ownership between threads. Sync: safe to share references between threads. Automatically implemented by compiler.", code: '// Automatically derived for types composed of\n// Send/Sync types. Unsafe to implement manually.', tags: ["Send", "Sync", "trait", "marker", "thread safety"] },

            // Chapter 17: Async Programming
            { id: 97, chapter: "Ch. 17", section: "Async Programming", title: "async & await", concept: "Asynchronous Syntax", description: "async transforms a block/function into a Future. await pauses execution until the Future resolves, without blocking the thread.", code: 'async fn fetch_data() -> String { ... }\nlet data = fetch_data().await;', tags: ["async", "await", "Future", "non-blocking", "syntax"] },
            { id: 98, chapter: "Ch. 17", section: "Async Programming", title: "Futures", concept: "Lazy Computation", description: "Futures represent asynchronous computations. They are lazy — nothing happens until polled by an executor/runtime.", code: 'use std::future::Future;\nlet f = my_async_fn(); // Future created, not executed\nf.await; // Now it runs', tags: ["Future", "lazy", "poll", "executor", "runtime"] },
            { id: 99, chapter: "Ch. 17", section: "Async Programming", title: "Pin", concept: "Memory Stability", description: "Pin ensures a Future isn't moved in memory after polling, which is required for self-referential async structs.", code: 'use std::pin::Pin;\nfn poll(self: Pin<&mut Self>, cx: &mut Context) -> Poll<T>', tags: ["Pin", "self-referential", "move", "memory", "stability"] },
            { id: 100, chapter: "Ch. 17", section: "Async Programming", title: "Tokio Runtime", concept: "Async Executor", description: "Tokio is the most popular async runtime for Rust. It provides the executor, timer, and I/O drivers needed to run async code.", code: '#[tokio::main]\nasync fn main() {\n    let listener = TcpListener::bind("127.0.0.1:8080").await.unwrap();\n}', tags: ["tokio", "runtime", "executor", "async main", "TcpListener"] },

            // Chapter 18: OOP Features
            { id: 101, chapter: "Ch. 18", section: "OOP Features", title: "Encapsulation", concept: "Data Hiding", description: "Rust supports encapsulation via pub. Implementation details are hidden, exposing only a public API.", code: 'pub struct AveragedCollection {\n    list: Vec<i32>, // private\n    average: f64,   // private\n}', tags: ["encapsulation", "pub", "private", "API", "hiding"] },
            { id: 102, chapter: "Ch. 18", section: "OOP Features", title: "Inheritance vs Composition", concept: "No Inheritance", description: "Rust doesn't have inheritance. Use composition (structs containing other structs) and traits for polymorphism.", code: '// Composition over inheritance\nstruct Engine { ... }\nstruct Car {\n    engine: Engine, // composed, not inherited\n}', tags: ["composition", "inheritance", "trait object", "polymorphism", "no inheritance"] },
            { id: 103, chapter: "Ch. 18", section: "OOP Features", title: "Trait Objects", concept: "Dynamic Polymorphism", description: "Trait objects (dyn Trait) provide dynamic polymorphism similar to virtual methods in OOP languages.", code: 'pub trait Draw { fn draw(&self); }\npub struct Screen {\n    pub components: Vec<Box<dyn Draw>>,\n}', tags: ["dyn", "trait object", "polymorphism", "Screen", "Draw"] },

            // Chapter 19: Patterns & Matching
            { id: 104, chapter: "Ch. 19", section: "Patterns & Matching", title: "Pattern Locations", concept: "Where Patterns Work", description: "Patterns appear in match arms, if let, while let, for loops, let statements, and function parameters.", code: 'let (x, y) = (1, 2); // destructuring\nif let Some(x) = opt { ... }', tags: ["pattern", "destructure", "match", "if let", "let"] },
            { id: 105, chapter: "Ch. 19", section: "Patterns & Matching", title: "Refutability", concept: "Irrefutable Patterns", description: "Irrefutable patterns match all possible values (e.g., x in let x = 5). Refutable patterns might fail (e.g., Some(x) on None).", code: 'let x = 5; // irrefutable\nif let Some(x) = opt { ... } // refutable', tags: ["refutable", "irrefutable", "pattern", "let", "match"] },
            { id: 106, chapter: "Ch. 19", section: "Patterns & Matching", title: "Pattern Syntax", concept: "Advanced Patterns", description: "Patterns can match literals, named variables, multiple patterns (|), ranges (..=), destructuring, and use @ bindings.", code: 'match num {\n    1 | 2 => println!("one or two"),\n    3..=9 => println!("three to nine"),\n    n @ 10..=20 => println!("matched {n}"),\n    _ => println!("other"),\n}', tags: ["pattern syntax", "|", "range", "@ binding", "destructure"] },

            { id: 125, chapter: "App. D", section: "Development Tools", title: "Clippy", concept: "Linting", description: "Clippy is a collection of lints to catch common mistakes and improve idiomatic Rust code.", code: '$ cargo clippy', tags: ["clippy", "lint", "warning", "idiomatic", "tool"] },
            { id: 126, chapter: "App. E", section: "Editions", title: "Rust Editions", concept: "Language Versions", description: "Editions allow Rust to evolve without breaking existing code. Current: 2015, 2018, 2021, 2024. Specified in Cargo.toml.", code: '[package]\nedition = "2024"', tags: ["edition", "2015", "2018", "2021", "2024", "version"] }
        ];

        // State
        let currentChapter = 'All';
        let searchQuery = '';

        // DOM Elements
        const chapterList = document.getElementById('chapterList');
        const notesGrid = document.getElementById('notesGrid');
        const globalSearch = document.getElementById('globalSearch');
        const mainTitle = document.getElementById('mainTitle');
        const resultCount = document.getElementById('resultCount');
        const stats = document.getElementById('stats');

        // Extract unique chapters
        const chapters = [...new Set(bookData.map(d => d.chapter))];

        // Render chapter list
        function renderChapters() {
            chapterList.innerHTML = '';
            
            // All option
            const allItem = document.createElement('div');
            allItem.className = `chapter-item ${currentChapter === 'All' ? 'active' : ''}`;
            allItem.innerHTML = '<span class="ch-num">All</span> All Chapters';
            allItem.onclick = () => { currentChapter = 'All'; renderChapters(); filterNotes(); };
            chapterList.appendChild(allItem);

            chapters.forEach(ch => {
                const item = document.createElement('div');
                item.className = `chapter-item ${currentChapter === ch ? 'active' : ''}`;
                const section = bookData.find(d => d.chapter === ch)?.section || '';
                item.innerHTML = `<span class="ch-num">${ch}</span> ${section}`;
                item.onclick = () => { currentChapter = ch; renderChapters(); filterNotes(); };
                chapterList.appendChild(item);
            });
        }

        // Highlight search terms
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Render notes
        function renderNotes(notes) {
            if (notes.length === 0) {
                notesGrid.innerHTML = `
                    <div class="no-results" style="grid-column: 1 / -1;">
                        <h3>No notes found</h3>
                        <p>Try a different keyword or chapter filter.</p>
                    </div>
                `;
                resultCount.textContent = '0 results';
                return;
            }

            notesGrid.innerHTML = notes.map(note => {
                const title = highlightText(note.title, searchQuery);
                const concept = highlightText(note.concept, searchQuery);
                const desc = highlightText(note.description, searchQuery);
                const code = note.code ? highlightText(note.code, searchQuery) : '';
                const tags = note.tags.map(t => {
                    const isMatch = searchQuery && t.toLowerCase().includes(searchQuery.toLowerCase());
                    return `<span class="tag ${isMatch ? 'highlight' : ''}">${t}</span>`;
                }).join('');

                return `
                    <div class="note-card" onclick="copyToClipboard('${note.id}')">
                        <div class="note-header">
                            <div class="note-title">${title}</div>
                            <div class="note-location">${note.chapter} • ${note.section}</div>
                        </div>
                        <div class="note-concept">${concept}</div>
                        <div class="note-description">${desc}</div>
                        ${code ? `<div class="note-code"><pre>${code}</pre></div>` : ''}
                        <div class="note-tags">${tags}</div>
                    </div>
                `;
            }).join('');

            resultCount.textContent = `${notes.length} result${notes.length !== 1 ? 's' : ''}`;
        }

        // Filter logic
        function filterNotes() {
            const query = searchQuery.toLowerCase().trim();
            
            let filtered = bookData;
            
            // Chapter filter
            if (currentChapter !== 'All') {
                filtered = filtered.filter(n => n.chapter === currentChapter);
            }
            
            // Search filter
            if (query) {
                filtered = filtered.filter(n => {
                    const searchText = `${n.title} ${n.concept} ${n.description} ${n.code || ''} ${n.tags.join(' ')} ${n.section}`.toLowerCase();
                    return searchText.includes(query);
                });
            }

            mainTitle.textContent = currentChapter === 'All' ? 'All Notes' : `${currentChapter}: ${bookData.find(d => d.chapter === currentChapter)?.section}`;
            renderNotes(filtered);
        }

        // Copy note to clipboard
        function copyToClipboard(id) {
            const note = bookData.find(n => n.id === id);
            if (!note) return;
            
            const text = `${note.title} (${note.chapter} - ${note.section})\nConcept: ${note.concept}\n\n${note.description}\n\n${note.code || ''}`;
            navigator.clipboard.writeText(text).then(() => {
                // Visual feedback could be added here
            });
        }

        // Event listeners
        globalSearch.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterNotes();
        });

        // Stats
        stats.textContent = `${bookData.length} concepts indexed`;

        // Initialize
        renderChapters();
        filterNotes();
    </script>
