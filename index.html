<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>The Rust Book — Deep Dive Notes</title>
        <style>
            :root {
                --bg: #faf8f5;
                --sidebar-bg: #f3f0eb;
                --card-bg: #ffffff;
                --accent: #ce422b;
                --accent-hover: #a53320;
                --text: #2d2d2d;
                --text-muted: #6b6b6b;
                --border: #e0dcd6;
                --highlight: #fff3cd;
                --code-bg: #f6f3ee;
                --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
                --shadow-hover: 0 4px 16px rgba(0, 0, 0, 0.1);
                --detail-bg: #ffffff;
                --backdrop: rgba(0, 0, 0, 0.35);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                height: 100vh;
                overflow: hidden;
            }

            .app {
                display: grid;
                grid-template-columns: 280px 1fr;
                height: 100vh;
            }

            /* Sidebar */
            .sidebar {
                background: var(--sidebar-bg);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                z-index: 10;
            }

            .sidebar-header {
                padding: 24px 20px 16px;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-header h1 {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--accent);
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .sidebar-header p {
                font-size: 0.75rem;
                color: var(--text-muted);
                margin-top: 4px;
            }

            .search-box {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
            }

            .search-box input {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 0.9rem;
                background: var(--card-bg);
                outline: none;
                transition: all 0.2s;
            }

            .search-box input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(206, 66, 43, 0.1);
            }

            .chapter-list {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
            }

            .chapter-item {
                padding: 8px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 0.85rem;
                color: var(--text-muted);
                transition: all 0.15s;
                margin-bottom: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .chapter-item:hover {
                background: rgba(206, 66, 43, 0.08);
                color: var(--text);
            }

            .chapter-item.active {
                background: var(--accent);
                color: white;
                font-weight: 500;
            }

            .chapter-item .ch-num {
                display: inline-block;
                width: 36px;
                font-weight: 600;
                opacity: 0.7;
            }

            .chapter-item.active .ch-num {
                opacity: 1;
            }

            .stats {
                padding: 12px 16px;
                border-top: 1px solid var(--border);
                font-size: 0.8rem;
                color: var(--text-muted);
                text-align: center;
            }

            /* Main Content */
            .main {
                display: flex;
                flex-direction: column;
                overflow: hidden;
                position: relative;
            }

            .main-header {
                padding: 20px 32px;
                background: var(--card-bg);
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-shrink: 0;
            }

            .main-header h2 {
                font-size: 1.25rem;
                font-weight: 600;
            }

            .main-header .meta {
                font-size: 0.85rem;
                color: var(--text-muted);
            }

            .content {
                flex: 1;
                overflow-y: auto;
                padding: 24px 32px;
            }

            .notes-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
                gap: 20px;
            }

            .note-card {
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 24px;
                box-shadow: var(--shadow);
                transition: all 0.2s;
                cursor: pointer;
                position: relative;
                overflow: hidden;
            }

            .note-card:hover {
                box-shadow: var(--shadow-hover);
                transform: translateY(-2px);
                border-color: var(--accent);
            }

            .note-card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: var(--accent);
                opacity: 0;
                transition: opacity 0.2s;
            }

            .note-card:hover::before {
                opacity: 1;
            }

            .note-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }

            .note-title {
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--text);
                line-height: 1.3;
            }

            .note-location {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                background: var(--sidebar-bg);
                color: var(--accent);
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 0.75rem;
                font-weight: 600;
                white-space: nowrap;
                flex-shrink: 0;
                margin-left: 8px;
            }

            .note-concept {
                font-size: 0.85rem;
                color: var(--text-muted);
                margin-bottom: 12px;
                font-style: italic;
                border-left: 2px solid var(--border);
                padding-left: 10px;
            }

            .note-description {
                font-size: 0.9rem;
                color: var(--text);
                margin-bottom: 16px;
                line-height: 1.6;
            }

            .note-code {
                background: var(--code-bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 12px 16px;
                font-family:
                    "SF Mono", Monaco, "Cascadia Code", "Fira Code", Consolas,
                    monospace;
                font-size: 0.8rem;
                overflow-x: auto;
                color: #333;
                margin-bottom: 12px;
            }

            .note-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            .tag {
                background: var(--sidebar-bg);
                color: var(--text-muted);
                padding: 3px 10px;
                border-radius: 4px;
                font-size: 0.75rem;
                font-weight: 500;
            }

            .tag.highlight {
                background: var(--highlight);
                color: #856404;
                font-weight: 600;
            }

            .no-results {
                text-align: center;
                padding: 60px 20px;
                color: var(--text-muted);
                grid-column: 1 / -1;
            }

            .no-results h3 {
                font-size: 1.3rem;
                margin-bottom: 8px;
                color: var(--text);
            }

            /* Detail Panel */
            .backdrop {
                position: fixed;
                inset: 0;
                background: var(--backdrop);
                backdrop-filter: blur(4px);
                opacity: 0;
                visibility: hidden;
                transition:
                    opacity 0.3s,
                    visibility 0.3s;
                z-index: 100;
            }

            .backdrop.active {
                opacity: 1;
                visibility: visible;
            }

            .detail-panel {
                position: fixed;
                top: 0;
                right: 0;
                width: 600px;
                max-width: 100%;
                height: 100vh;
                background: var(--detail-bg);
                box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
                transform: translateX(100%);
                transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
                z-index: 101;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .detail-panel.active {
                transform: translateX(0);
            }

            .detail-header {
                padding: 24px 28px;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                flex-shrink: 0;
                background: var(--card-bg);
            }

            .detail-header-content {
                flex: 1;
                min-width: 0;
            }

            .detail-header h2 {
                font-size: 1.4rem;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 6px;
                line-height: 1.3;
            }

            .detail-meta {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                align-items: center;
            }

            .detail-concept-badge {
                background: rgba(206, 66, 43, 0.1);
                color: var(--accent);
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.8rem;
                font-weight: 600;
            }

            .detail-location {
                color: var(--text-muted);
                font-size: 0.8rem;
            }

            .close-btn {
                background: var(--sidebar-bg);
                border: none;
                width: 36px;
                height: 36px;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1.2rem;
                color: var(--text-muted);
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                flex-shrink: 0;
                margin-left: 12px;
            }

            .close-btn:hover {
                background: var(--accent);
                color: white;
            }

            .detail-body {
                flex: 1;
                overflow-y: auto;
                padding: 28px;
            }

            .detail-section {
                margin-bottom: 28px;
            }

            .detail-section:last-child {
                margin-bottom: 0;
            }

            .detail-section h3 {
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--text-muted);
                margin-bottom: 12px;
                font-weight: 700;
            }

            .detail-section p {
                font-size: 0.95rem;
                line-height: 1.7;
                color: var(--text);
            }

            .detail-section ul {
                list-style: none;
                padding: 0;
            }

            .detail-section ul li {
                padding: 8px 0;
                padding-left: 24px;
                position: relative;
                font-size: 0.92rem;
                line-height: 1.6;
                color: var(--text);
                border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            }

            .detail-section ul li:last-child {
                border-bottom: none;
            }

            .detail-section ul li::before {
                content: "→";
                position: absolute;
                left: 0;
                color: var(--accent);
                font-weight: 700;
            }

            .detail-section ul.pitfalls li::before {
                content: "⚠";
                color: #e6a817;
            }

            .detail-section ul.related li::before {
                content: "🔗";
                color: var(--accent);
            }

            .detail-code-block {
                background: #1e1e1e;
                color: #d4d4d4;
                border-radius: 10px;
                padding: 20px;
                overflow-x: auto;
                font-family:
                    "SF Mono", Monaco, "Cascadia Code", "Fira Code", Consolas,
                    monospace;
                font-size: 0.85rem;
                line-height: 1.5;
                position: relative;
                margin: 12px 0;
            }

            .detail-code-block pre {
                margin: 0;
                white-space: pre;
                word-wrap: normal;
            }

            .copy-code-btn {
                position: absolute;
                top: 12px;
                right: 12px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #ccc;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 0.75rem;
                cursor: pointer;
                opacity: 0;
                transition: opacity 0.2s;
            }

            .detail-code-block:hover .copy-code-btn {
                opacity: 1;
            }

            .copy-code-btn:hover {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }

            .detail-code-block .comment {
                color: #6a9955;
            }

            .detail-code-block .keyword {
                color: #569cd6;
            }

            .detail-code-block .string {
                color: #ce9178;
            }

            .detail-code-block .function {
                color: #dcdcaa;
            }

            .detail-code-block .type {
                color: #4ec9b0;
            }

            .detail-code-block .macro {
                color: #4ec9b0;
            }

            .detail-footer {
                padding: 16px 28px;
                border-top: 1px solid var(--border);
                background: var(--sidebar-bg);
                font-size: 0.8rem;
                color: var(--text-muted);
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-shrink: 0;
            }

            .detail-tags {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            /* Scrollbar */
            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: #ccc;
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: #aaa;
            }

            mark {
                background: var(--highlight);
                padding: 1px 2px;
                border-radius: 2px;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .app {
                    grid-template-columns: 1fr;
                }
                .sidebar {
                    display: none;
                }
                .notes-grid {
                    grid-template-columns: 1fr;
                }
                .detail-panel {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h1>🦀 The Rust Book</h1>
                    <p>3rd Edition • Deep Dive Notes</p>
                </div>
                <div class="search-box">
                    <input
                        type="text"
                        id="globalSearch"
                        placeholder="Search any keyword, concept, code..."
                    />
                </div>
                <div class="chapter-list" id="chapterList"></div>
                <div class="stats" id="stats"></div>
            </aside>

            <main class="main">
                <div class="main-header">
                    <h2 id="mainTitle">All Notes</h2>
                    <span class="meta" id="resultCount">Loading...</span>
                </div>
                <div class="content" id="content">
                    <div class="notes-grid" id="notesGrid"></div>
                </div>
            </main>
        </div>

        <!-- Detail Panel -->
        <div class="backdrop" id="backdrop" onclick="closeDetail()"></div>
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header" id="detailHeader">
                <div class="detail-header-content">
                    <h2 id="detailTitle">Title</h2>
                    <div class="detail-meta">
                        <span class="detail-concept-badge" id="detailConcept"
                            >Concept</span
                        >
                        <span class="detail-location" id="detailLocation"
                            >Ch. 1</span
                        >
                    </div>
                </div>
                <button
                    class="close-btn"
                    onclick="closeDetail()"
                    aria-label="Close"
                >
                    ✕
                </button>
            </div>
            <div class="detail-body" id="detailBody"></div>
            <div class="detail-footer">
                <div class="detail-tags" id="detailTags"></div>
                <span id="detailId">#1</span>
            </div>
        </div>

        <script>
            // Comprehensive Rust Book Data with Deep Dives
            const bookData = [
                // Chapter 1: Getting Started
                { id: 1, chapter: "Ch. 1", section: "Getting Started", title: "Rustup & Toolchain", concept: "Installation", description: "Rust is installed via rustup, which manages versions and components. It installs rustc, cargo, and rustfmt.", code: "$ curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh", tags: ["install", "rustup", "toolchain", "setup", "rustc"],
                  deepDive: { explanation: "Rustup is the official toolchain installer and manager for Rust. Unlike single-version compilers, rustup allows you to install multiple Rust versions side-by-side and switch between them effortlessly. It manages three release channels: stable (production-ready, updated every 6 weeks), beta (upcoming stable features for testing), and nightly (bleeding-edge, updated daily). Rustup also installs essential tools: rustc (the compiler), cargo (build system/package manager), rustfmt (code formatter), and clippy (linter). It keeps everything in ~/.cargo/bin by default.", extendedCode: '<span class="comment"># Update to latest stable</span>\n$ rustup update\n\n<span class="comment"># Install nightly for experimental features</span>\n$ rustup install nightly\n\n<span class="comment"># Switch default toolchain</span>\n$ rustup default nightly\n\n<span class="comment"># Add components</span>\n$ rustup component add rust-src rust-analyzer\n\n<span class="comment"># Show installed toolchains</span>\n$ rustup show', keyPoints: ["Manages multiple Rust versions simultaneously via channels", "Installs rustc, cargo, rustfmt, clippy, and rust-analyzer", "Default installation path is ~/.cargo/bin — ensure it's in your PATH", "Stable channel is recommended for production; nightly for experimentation", "rustup update keeps your toolchain current without reinstalling"], commonMistakes: ["Forgetting to source the environment or restart the terminal after installation", "Not adding ~/.cargo/bin to PATH causes 'command not found' errors", "Using nightly in production code that relies on unstable features which may break"], relatedConcepts: ["Cargo", "rustc", "Toolchain Channels", "rustfmt", "Clippy"] } },

                { id: 2, chapter: "Ch. 1", section: "Getting Started", title: "Cargo", concept: "Build Tool", description: "Cargo is Rust's package manager and build system. It handles dependencies, building, testing, and documentation.", code: "$ cargo new project_name\n$ cargo build\n$ cargo run\n$ cargo test", tags: ["cargo", "build", "run", "test", "package", "project"],
                  deepDive: { explanation: "Cargo is the backbone of the Rust ecosystem. It handles the entire project lifecycle: creating projects from templates, downloading and compiling dependencies, building your code, running tests, generating documentation, and publishing to crates.io. Cargo enforces conventions: source code goes in src/, binaries are defined in src/main.rs, libraries in src/lib.rs, and dependencies are declared in Cargo.toml. It uses a lock file (Cargo.lock) to ensure reproducible builds across machines and time.", extendedCode: '<span class="comment"># Create a new binary project</span>\n$ cargo new my_app\n\n<span class="comment"># Create a library</span>\n$ cargo new --lib my_lib\n\n<span class="comment"># Build in release mode (optimizations enabled)</span>\n$ cargo build --release\n\n<span class="comment"># Run with arguments</span>\n$ cargo run -- arg1 arg2\n\n<span class="comment"># Check code without producing binaries (faster)</span>\n$ cargo check\n\n<span class="comment"># Generate and open documentation</span>\n$ cargo doc --open', keyPoints: ["cargo new creates a project with Git init and .gitignore", "cargo check is faster than build for verifying compilation", "Cargo.lock ensures deterministic builds; commit it for binaries, ignore for libraries", "Dependencies are cached globally in ~/.cargo/registry", "cargo test runs unit tests, integration tests, and doc tests automatically"], commonMistakes: ["Modifying Cargo.lock manually instead of letting Cargo manage it", "Running cargo build instead of cargo check during rapid development (slower)", "Forgetting --release flag when benchmarking (debug builds are much slower)"], relatedConcepts: ["Cargo.toml", "crates.io", "Semantic Versioning", "Workspaces", "Profiles"] } },

                { id: 3, chapter: "Ch. 1", section: "Getting Started", title: "Hello, world!", concept: "First Program", description: "The entry point of every Rust program is the main function. Statements end with semicolons.", code: 'fn main() {\n    println!("Hello, world!");\n}', tags: ["hello world", "main", "println", "entry point", "function"],
                  deepDive: { explanation: "Every Rust executable starts execution at the main function. Unlike some languages, Rust requires an explicit entry point — there is no top-level code outside functions. The println! macro (note the exclamation mark) handles formatted output to stdout. It is not a regular function because it uses variadic arguments at compile time via macro expansion. The ! distinguishes it from function calls. Statements in Rust end with semicolons; omitting them turns the expression into a return value.", extendedCode: '<span class="comment">// main.rs is always the binary entry point</span>\n<span class="keyword">fn</span> <span class="function">main</span>() {\n    <span class="comment">// println! is a macro, not a function</span>\n    <span class="macro">println!</span>(<span class="string">"Hello, world!"</span>);\n    \n    <span class="comment">// Formatting with placeholders</span>\n    <span class="macro">println!</span>(<span class="string">"Hello, {}!"</span>, <span class="string">"Rust"</span>);\n    <span class="macro">println!</span>(<span class="string">"The answer is {}"</span>, 42);\n}', keyPoints: ["main() is the required entry point for binary crates", "println! is a macro — macros use ! and expand at compile time", "Statements end with semicolons; expressions without semicolons return values", "Rust is statically typed but the compiler often infers types", "Comments use // for single-line and /* */ for multi-line"], commonMistakes: ["Forgetting the ! in println and trying to call it as a function", "Missing semicolons inside functions (causes confusing compiler errors)", "Trying to write top-level executable statements outside of functions"], relatedConcepts: ["Macros", "Functions", "Statements vs Expressions", "Entry Point"] } },

                { id: 4, chapter: "Ch. 1", section: "Getting Started", title: "Cargo.toml", concept: "Manifest", description: "Configuration file that contains metadata and dependencies for a Rust project.", code: '[package]\nname = "project"\nversion = "0.1.0"\nedition = "2024"', tags: ["toml", "manifest", "dependencies", "config", "package"],
                  deepDive: { explanation: "Cargo.toml is the manifest file that defines everything about your Rust package. It declares the package name, version, authors, edition (language version), and dependencies. The edition field is crucial — it specifies which version of Rust syntax your code uses (2015, 2018, 2021, or 2024). Editions allow Rust to evolve without breaking existing code. The [dependencies] section lists external crates from crates.io or other sources (git, local paths).", extendedCode: '<span class="comment"># Cargo.toml structure</span>\n[<span class="function">package</span>]\nname = <span class="string">"my-project"</span>\nversion = <span class="string">"1.0.0"</span>\nedition = <span class="string">"2024"</span>\nauthors = [<span class="string">"Your Name <you@example.com>"</span>]\ndescription = <span class="string">"A brief description"</span>\nlicense = <span class="string">"MIT OR Apache-2.0"</span>\n\n[<span class="function">dependencies</span>]\nserde = { version = <span class="string">"1.0"</span>, features = [<span class="string">"derive"</span>] }\ntokio = { version = <span class="string">"1"</span>, features = [<span class="string">"full"</span>] }\n\n[<span class="function">dev-dependencies</span>]\nmockall = <span class="string">"0.12"</span>', keyPoints: ["Always specify an edition (2024 is current); omitting it defaults to 2015", "Semantic versioning (0.1.0, 1.0.0) helps Cargo resolve compatible updates", "Features allow conditional compilation of crate functionality", "dev-dependencies are only included for tests and examples, not production builds", "Workspace members can be defined to manage multi-crate projects"], commonMistakes: ["Forgetting the edition field and getting confusing syntax errors", "Using = \"1.0\" vs = \"=1.0.0\" — the first allows compatible updates, the second pins exactly", "Modifying Cargo.lock directly instead of updating dependencies properly"], relatedConcepts: ["Semantic Versioning", "Features", "Workspaces", "crates.io", "Edition"] } },

                // Chapter 2: Guessing Game
                { id: 5, chapter: "Ch. 2", section: "Guessing Game", title: "Variable Binding with let", concept: "Immutability by Default", description: "Variables are immutable by default in Rust. Use mut to make them mutable.", code: 'let apples = 5; // immutable\nlet mut bananas = 5; // mutable', tags: ["let", "mut", "immutable", "variable", "binding"],
                  deepDive: { explanation: "Rust's most important design decision is that variables are immutable by default. This prevents an entire class of bugs where values change unexpectedly. When you declare let x = 5, the compiler guarantees x will always be 5 in this scope. To change a value, you must explicitly opt-in with mut, which signals to readers and the compiler that mutation is expected. This immutability extends to the binding itself, not necessarily the data (for types like String, the content can be modified if the binding is mutable).", extendedCode: '<span class="keyword">let</span> x = <span class="string">5</span>;      <span class="comment">// immutable binding</span>\n<span class="comment">// x = 6; // ERROR: cannot assign twice to immutable variable</span>\n\n<span class="keyword">let</span> <span class="keyword">mut</span> y = <span class="string">5</span>;  <span class="comment">// mutable binding</span>\ny = <span class="string">6</span>;          <span class="comment">// OK</span>\n\n<span class="comment">// Immutability is about the binding, not always the data</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> s = <span class="type">String</span>::from(<span class="string">"hello"</span>);\ns.push_str(<span class="string">" world"</span>); <span class="comment">// mut allows modifying the string</span>', keyPoints: ["let creates an immutable binding by default — no accidental mutations", "mut must be added to both the binding and any references that need to mutate", "Immutability enables compiler optimizations and safer concurrent code", "Constants (const) are always immutable and require type annotations", "Shadowing (reusing a name) is different from mutability"], commonMistakes: ["Assuming let mut is needed for all variables — many should be immutable", "Confusing mut on the binding vs mut on a reference (&mut vs let mut)", "Trying to mutate a variable without mut and getting a confusing error about 'cannot assign twice'"], relatedConcepts: ["Shadowing", "Constants", "References", "Borrowing", "Ownership"] } },

                { id: 6, chapter: "Ch. 2", section: "Guessing Game", title: "String::new()", concept: "String Type", description: "Creates a new, empty growable string instance on the heap.", code: 'let mut guess = String::new();', tags: ["String", "new", "heap", "mutable", "empty"],
                  deepDive: { explanation: "String is Rust's growable, mutable, UTF-8 encoded text type. Unlike string literals (&str) which are stored in the program binary and immutable, String owns its data on the heap and can be modified. String::new() is an associated function (similar to a static method) that creates an empty String with zero capacity. As you push content, it reallocates on the heap when needed. String is part of the standard library, not the language core, which is why it's namespaced under std::string::String.", extendedCode: '<span class="keyword">let</span> <span class="keyword">mut</span> s = <span class="type">String</span>::new();\n<span class="macro">assert_eq!</span>(s.len(), <span class="string">0</span>);\n<span class="macro">assert_eq!</span>(s.capacity(), <span class="string">0</span>);\n\ns.push(<span class="string">\'a\'</span>);\ns.push_str(<span class="string">"bc"</span>);\n<span class="macro">assert_eq!</span>(s, <span class="string">"abc"</span>);\n\n<span class="comment">// with_capacity avoids reallocations if you know the size</span>\n<span class="keyword">let</span> s2 = <span class="type">String</span>::with_capacity(<span class="string">100</span>);', keyPoints: ["String owns heap-allocated UTF-8 data and can grow", "String::new() creates an empty string with no initial capacity", "with_capacity() pre-allocates heap space to avoid frequent reallocations", "String differs from &str: String is owned and mutable, &str is borrowed and immutable", "String implements Deref<Target=str>, so String methods are available on &str too"], commonMistakes: ["Confusing String with &str — String is owned, &str is a borrowed slice", "Not pre-allocating capacity when building large strings in loops (performance hit)", "Assuming String::new() allocates memory — it starts with zero capacity"], relatedConcepts: ["&str", "Heap", "Deref", "UTF-8", "Capacity"] } },

                { id: 7, chapter: "Ch. 2", section: "Guessing Game", title: "Reading Input", concept: "Standard Input", description: "Use std::io::stdin to read user input from the terminal.", code: 'io::stdin()\n    .read_line(&mut guess)\n    .expect("Failed to read line");', tags: ["stdin", "read_line", "input", "io", "expect"],
                  deepDive: { explanation: "std::io::stdin() returns a handle to the standard input stream for your process. The read_line method reads bytes from this stream until a newline (0xA) is encountered and appends them to the provided String buffer. It includes the trailing newline character in the result, which is why you often need .trim() afterward. read_line returns a Result<usize> indicating how many bytes were read, or an error if the operation fails. The expect method is a quick way to unwrap a Result, panicking with a custom message if it contains an Err.", extendedCode: '<span class="keyword">use</span> std::io::{self, Write};\n\n<span class="keyword">let</span> <span class="keyword">mut</span> input = <span class="type">String</span>::new();\n\n<span class="comment">// stdin() returns a Stdin handle; read_line needs &mut String</span>\nio::stdin().read_line(&<span class="keyword">mut</span> input)\n    .expect(<span class="string">"Failed to read line"</span>);\n\n<span class="comment">// read_line includes the \\n, so trim it</span>\n<span class="keyword">let</span> trimmed = input.trim();\n\n<span class="comment">// Alternative: print prompt without newline and flush</span>\n<span class="macro">print!</span>(<span class="string">"Enter value: "</span>);\nio::stdout().flush().unwrap();', keyPoints: ["stdin() returns a handle; you typically don't need to store it in a variable", "read_line appends to the string (doesn't replace) and includes the newline", "Always handle the Result, even if just with expect during prototyping", "trim() removes whitespace including \\n, \\r\\n, and spaces from both ends", "For robust CLI apps, consider the dialoguer or inquire crates"], commonMistakes: ["Forgetting that read_line appends rather than replaces existing string content", "Not trimming the newline, causing comparison logic to fail", "Ignoring the Result entirely (compiler will warn/error in newer editions)"], relatedConcepts: ["Result", "expect", "trim", "read_line", "Stdin"] } },

                { id: 8, chapter: "Ch. 2", section: "Guessing Game", title: "Result & expect", concept: "Error Handling", description: "read_line returns a Result type. expect will panic if the Result is Err, or return the value if Ok.", code: '.expect("Failed to read line");', tags: ["Result", "expect", "panic", "error", "Ok", "Err"],
                  deepDive: { explanation: "Result<T, E> is Rust's primary error-handling type for recoverable errors. It has two variants: Ok(T) representing success, and Err(E) representing failure with error information. The expect method extracts the success value from Ok, or panics with the provided message if the Result is Err. It's useful for prototyping and cases where failure truly is unrecoverable (e.g., missing config files on startup). However, for production code, prefer proper error handling with match, if let, or the ? operator.", extendedCode: '<span class="keyword">enum</span> <span class="type">Result</span>&lt;T, E&gt; {\n    <span class="type">Ok</span>(T),\n    <span class="type">Err</span>(E),\n}\n\n<span class="comment">// Using expect (panics on error)</span>\n<span class="keyword">let</span> file = <span class="type">File</span>::open(<span class="string">"config.txt"</span>)\n    .expect(<span class="string">"config.txt should exist"</span>);\n\n<span class="comment">// Proper error handling with match</span>\n<span class="keyword">match</span> <span class="type">File</span>::open(<span class="string">"config.txt"</span>) {\n    <span class="type">Ok</span>(file) => file,\n    <span class="type">Err</span>(e) => {\n        <span class="macro">eprintln!</span>(<span class="string">"Error: {}"</span>, e);\n        std::process::exit(<span class="string">1</span>);\n    }\n}', keyPoints: ["Result is an enum with Ok(T) and Err(E) variants", "expect is for prototyping or truly unrecoverable errors only", "unwrap() is like expect but without a custom message", "In production, propagate errors with ? or handle them explicitly", "The error type E in Result<T, E> usually implements std::error::Error"], commonMistakes: ["Using expect/unwrap everywhere in production code instead of proper error handling", "Writing vague expect messages — good messages explain WHY the program can't continue", "Confusing Result with Option — Result is for operations that might fail, Option is for values that might be absent"], relatedConcepts: ["Option", "match", "unwrap", "panic", "? Operator"] } },

                { id: 9, chapter: "Ch. 2", section: "Guessing Game", title: "Shadowing", concept: "Variable Rebinding", description: "You can declare a new variable with the same name as a previous one, shadowing the old value.", code: 'let guess = String::new();\nlet guess: u32 = guess.trim().parse().expect("Not a number!");', tags: ["shadowing", "reuse", "variable", "parse", "trim"],
                  deepDive: { explanation: "Shadowing allows you to reuse a variable name within the same scope, effectively creating a new variable that happens to have the same name. Unlike mutation (mut), shadowing creates a completely new binding — you can even change the type. This is idiomatic in Rust for transformations: you start with a String from input, then shadow it with a parsed u32. The old value is no longer accessible, but since it's been consumed (moved or transformed), that's usually fine. Shadowing is preferred over mutation when the transformation is conceptually a new value.", extendedCode: '<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">let</span> x = x + <span class="string">1</span>;   <span class="comment">// shadows first x, now 6</span>\n<span class="keyword">let</span> x = x * <span class="string">2</span>;   <span class="comment">// shadows second x, now 12</span>\n\n<span class="comment">// Type change via shadowing</span>\n<span class="keyword">let</span> spaces = <span class="string">"   "</span>;\n<span class="keyword">let</span> spaces = spaces.len(); <span class="comment">// now usize, not &str</span>\n\n<span class="comment">// Shadowing in inner scopes</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n{\n    <span class="keyword">let</span> x = <span class="string">99</span>; <span class="comment">// shadows only in this block</span>\n    <span class="macro">println!</span>(<span class="string">"inner: {}"</span>, x); <span class="comment">// 99</span>\n}\n<span class="macro">println!</span>(<span class="string">"outer: {}"</span>, x); <span class="comment">// 5</span>', keyPoints: ["Shadowing creates a new variable, it doesn't mutate the old one", "You can change the type when shadowing, unlike with mut", "Shadowing is scoped — inner blocks can shadow without affecting outer scope", "Useful for transforming values through a pipeline (parse, convert, etc.)", "The original value is dropped when shadowed if no other references exist"], commonMistakes: ["Shadowing when you actually need mutation (e.g., in loops where you need to update state)", "Accidentally shadowing in an inner scope and expecting the outer variable to change", "Confusing shadowing with reassignment — mut allows reassignment, shadowing creates a new binding"], relatedConcepts: ["mut", "Scope", "Variable Binding", "Type Conversion"] } },

                { id: 10, chapter: "Ch. 2", section: "Guessing Game", title: "match Expression", concept: "Pattern Matching", description: "match allows comparing a value against patterns and executing code based on which pattern matches.", code: 'match guess.cmp(&secret_number) {\n    Ordering::Less => println!("Too small!"),\n    Ordering::Greater => println!("Too big!"),\n    Ordering::Equal => println!("You win!"),\n}', tags: ["match", "pattern", "Ordering", "cmp", "arms"],
                  deepDive: { explanation: "match is one of Rust's most powerful features — exhaustive pattern matching that ensures you handle all possible cases. The value being matched is compared against 'arms' (each arm has a pattern and code to execute). Rust requires match to be exhaustive: every possible value must be covered. The cmp method returns an Ordering enum (Less, Equal, Greater). match is an expression, meaning it returns a value, so all arms must return the same type if the result is used.", extendedCode: '<span class="keyword">enum</span> <span class="type">Message</span> {\n    <span class="type">Quit</span>,\n    <span class="type">Move</span> { x: <span class="type">i32</span>, y: <span class="type">i32</span> },\n    <span class="type">Write</span>(<span class="type">String</span>),\n}\n\n<span class="keyword">let</span> msg = <span class="type">Message</span>::Move { x: <span class="string">10</span>, y: <span class="string">20</span> };\n\n<span class="keyword">let</span> result = <span class="keyword">match</span> msg {\n    <span class="type">Message</span>::<span class="type">Quit</span> => <span class="string">"quitting"</span>.to_string(),\n    <span class="type">Message</span>::<span class="type">Move</span> { x, y } => {\n        <span class="macro">format!</span>(<span class="string">"moving to ({}, {})"</span>, x, y)\n    }\n    <span class="type">Message</span>::<span class="type">Write</span>(text) => text,\n};', keyPoints: ["match is exhaustive — the compiler ensures all variants are handled", "Each arm has a pattern => code; the first matching arm wins", "match is an expression and can return a value", "Patterns can destructure structs, enums, tuples, and nested types", "The _ pattern is a catch-all for remaining cases"], commonMistakes: ["Non-exhaustive match patterns (compiler error — add missing arms or _)", "Forgetting that match arms don't fall through (unlike switch in C/Java)", "Using if-else chains when match would be clearer and safer"], relatedConcepts: ["Pattern Matching", "Enum", "if let", "Destructuring", "Exhaustiveness"] } },

                { id: 11, chapter: "Ch. 2", section: "Guessing Game", title: "Random Numbers", concept: "External Crates", description: "Use the rand crate to generate random numbers. Added to Cargo.toml dependencies.", code: '[dependencies]\nrand = "0.8.5"', tags: ["rand", "random", "crate", "dependency", "Cargo.toml"],
                  deepDive: { explanation: "The rand crate is the standard way to generate random numbers in Rust. It provides a cryptographically secure random number generator (ThreadRng) and various distributions. To use it, you add it to Cargo.toml under [dependencies], and Cargo automatically downloads and compiles it from crates.io. The rand crate uses the Rng trait, which provides methods like gen_range, gen, and shuffle. The thread_rng() function provides a lazily-initialized, thread-local RNG that is seeded from the OS's entropy source.", extendedCode: '<span class="keyword">use</span> rand::Rng;\n\n<span class="keyword">let</span> <span class="keyword">mut</span> rng = rand::thread_rng();\n\n<span class="comment">// Random number in range [1, 100] (inclusive)</span>\n<span class="keyword">let</span> n: <span class="type">i32</span> = rng.gen_range(<span class="string">1</span>..=<span class="string">100</span>);\n\n<span class="comment">// Random boolean</span>\n<span class="keyword">let</span> b: <span class="type">bool</span> = rng.gen();\n\n<span class="comment">// Shuffle a vector</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> items = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>, <span class="string">4</span>, <span class="string">5</span>];\nitems.shuffle(&<span class="keyword">mut</span> rng);', keyPoints: ["Add rand to Cargo.toml, then use rand::Rng trait", "thread_rng() is the standard source of randomness; it's automatically seeded", "gen_range uses inclusive syntax (1..=100) or exclusive (1..100)", "For cryptographic security, use rand::rngs::OsRng instead of thread_rng", "rand is split into rand (core) and rand_core (traits) for modularity"], commonMistakes: ["Forgetting to import the Rng trait (needed for gen_range, gen methods)", "Using rand::random() without specifying type (compiler can't infer)", "Using the same RNG across threads without synchronization — use thread_rng() per thread"], relatedConcepts: ["Crates.io", "Dependencies", "Traits", "Cargo.toml", "ThreadRng"] } },

                { id: 12, chapter: "Ch. 2", section: "Guessing Game", title: "loop", concept: "Infinite Loop", description: "loop creates an infinite loop that continues until explicitly stopped with break.", code: 'loop {\n    // code runs forever\n    if some_condition { break; }\n}', tags: ["loop", "break", "infinite", "iteration", "repeat"],
                  deepDive: { explanation: "loop is Rust's infinite loop construct. Unlike while(true) in other languages, loop is explicitly designed to loop forever until a break is encountered. This is useful when the termination condition is complex or when you need to loop at least once. A key feature is that loop can return a value via break expression — you can break with a value that becomes the loop's result. This is idiomatic for retry logic or polling where you need to return the successful result.", extendedCode: '<span class="comment">// Loop that returns a value</span>\n<span class="keyword">let</span> result = <span class="keyword">loop</span> {\n    <span class="keyword">let</span> guess = get_input();\n    <span class="keyword">if</span> guess == secret {\n        <span class="keyword">break</span> guess; <span class="comment">// returns guess from the loop</span>\n    }\n    <span class="macro">println!</span>(<span class="string">"Try again"</span>);\n};\n\n<span class="comment">// Labeled loops for nested control</span>\n<span class="string">\'outer</span>: <span class="keyword">loop</span> {\n    <span class="keyword">loop</span> {\n        <span class="keyword">break</span> <span class="string">\'outer</span>; <span class="comment">// breaks the outer loop</span>\n    }\n}', keyPoints: ["loop is the most primitive loop; it runs until break is called", "break can return a value, making loop an expression", "Labeled loops (e.g., 'outer:) allow breaking out of nested loops", "loop is evaluated at compile time for termination in some contexts", "Use loop when you need at least one iteration or complex break logic"], commonMistakes: ["Creating an infinite loop accidentally without a break condition", "Forgetting that loop can return values — useful for retry-with-result patterns", "Using loop when while or for would be clearer and more idiomatic"], relatedConcepts: ["while", "for", "break", "continue", "Labeled Blocks"] } },

                // Chapter 3: Common Programming Concepts
                { id: 13, chapter: "Ch. 3", section: "Common Concepts", title: "Constants", concept: "Immutable Values", description: "Constants are always immutable and must have a type annotation. They can be declared in any scope.", code: 'const MAX_POINTS: u32 = 100_000;', tags: ["const", "constant", "immutable", "type annotation", "scope"],
                  deepDive: { explanation: "Constants are values bound to a name that are immutable and must be known at compile time. Unlike variables declared with let, constants can be declared in any scope (including global scope) and must have an explicit type annotation. They are inlined at compile time to their usage sites, meaning they don't have a fixed memory address. Use constants for values that multiple parts of your code need to know and that won't change (e.g., buffer sizes, timeouts, mathematical constants).", extendedCode: '<span class="comment">// Global constant</span>\n<span class="keyword">const</span> MAX_USERS: <span class="type">usize</span> = <span class="string">100</span>;\n<span class="keyword">const</span> PI: <span class="type">f64</span> = <span class="string">3.14159</span>;\n\n<span class="comment">// Constants can be shadowed by let, but not mutated</span>\n<span class="keyword">fn</span> <span class="function">main</span>() {\n    <span class="keyword">const</span> LOCAL_CONST: <span class="type">i32</span> = <span class="string">42</span>;\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, LOCAL_CONST);\n    \n    <span class="comment">// Shadowing is allowed</span>\n    <span class="keyword">let</span> LOCAL_CONST = <span class="string">99</span>; <span class="comment">// different binding</span>\n}', keyPoints: ["const requires explicit type annotation and compile-time evaluatable value", "Constants can be declared in global scope; let bindings cannot", "Constants are inlined — they don't allocate memory at runtime", "Naming convention is SCREAMING_SNAKE_CASE", "Only functions marked const can be used in const declarations (const fn)"], commonMistakes: ["Trying to use let for global values — use const or static instead", "Assigning a runtime-computed value to const (e.g., const X = 5 + 3 is fine, but not const X = some_function())", "Confusing const with immutable let — const is always immutable and global-capable"], relatedConcepts: ["static", "let", "Immutable", "Global Scope", "const fn"] } },

                { id: 14, chapter: "Ch. 3", section: "Common Concepts", title: "Scalar Types", concept: "Basic Types", description: "Rust has four scalar types: integers, floating-point numbers, Booleans, and characters.", code: 'let a: u32 = 255;\nlet b: f64 = 3.14;\nlet c: bool = true;\nlet d: char = \'z\';', tags: ["scalar", "integer", "float", "bool", "char", "types"],
                  deepDive: { explanation: "Scalar types represent a single value. Rust has four: integers (whole numbers), floating-point numbers (numbers with decimals), Booleans (true/false), and characters (single Unicode scalar values). Rust is statically typed, but the compiler can infer types in many cases. When types can't be inferred, you must annotate them. Integer types are denoted by bit width and signedness (e.g., i32, u64). f64 is the default float type because modern CPUs handle it efficiently. char is 4 bytes and supports Unicode, unlike C's 1-byte char.", extendedCode: '<span class="comment">// Integer types</span>\n<span class="keyword">let</span> a: <span class="type">i8</span> = -<span class="string">128</span>;      <span class="comment">// signed 8-bit</span>\n<span class="keyword">let</span> b: <span class="type">u32</span> = <span class="string">4_000_000_000</span>; <span class="comment">// unsigned 32-bit, underscores for readability</span>\n<span class="keyword">let</span> c = <span class="string">0xFF</span>;            <span class="comment">// inferred as i32, hex literal</span>\n\n<span class="comment">// Floating point</span>\n<span class="keyword">let</span> x = <span class="string">2.0</span>;   <span class="comment">// f64 (default)</span>\n<span class="keyword">let</span> y: <span class="type">f32</span> = <span class="string">3.0</span>;\n\n<span class="comment">// Boolean and char</span>\n<span class="keyword">let</span> flag: <span class="type">bool</span> = <span class="keyword">false</span>;\n<span class="keyword">let</span> emoji: <span class="type">char</span> = <span class="string">\'🎉\'</span>; <span class="comment">// 4-byte Unicode scalar', keyPoints: ["Integer default is i32; float default is f64", "Use underscores in numeric literals for readability (1_000_000)", "char is 4 bytes (Unicode scalar), not 1 byte like in C", "bool is a single byte; true and false are keywords", "Type inference works bottom-up and across statements"], commonMistakes: ["Assuming char is 1 byte (it's 4 bytes in Rust)", "Integer overflow in release mode wraps around (panics in debug)", "Comparing integers of different signedness without explicit casting"], relatedConcepts: ["Integer Overflow", "Type Inference", "Unicode", "Primitive Types", "Casting"] } },

                { id: 15, chapter: "Ch. 3", section: "Common Concepts", title: "Integer Types", concept: "Signed & Unsigned", description: "Integers can be signed (i8-i128, isize) or unsigned (u8-u128, usize). Default is i32.", code: 'let signed: i32 = -42;\nlet unsigned: u32 = 42;\nlet arch: usize = 0;', tags: ["i32", "u32", "isize", "usize", "integer", "bits"],
                  deepDive: { explanation: "Rust integer types are explicit about signedness and bit width. Signed integers (i8 through i128, isize) can represent negative numbers using two's complement. Unsigned integers (u8 through u128, usize) only represent non-negative numbers. isize and usize are architecture-dependent: 64-bit on 64-bit systems, 32-bit on 32-bit systems. usize is the type used for indexing collections and memory sizes. i32 is the default because it provides a good balance of range and performance on modern CPUs. Integer literals can be decimal, hex (0x), octal (0o), or binary (0b).", extendedCode: '<span class="comment">// Explicit types</span>\n<span class="keyword">let</span> a: <span class="type">i64</span> = -<span class="string">9_223_372_036_854_775_808</span>;\n<span class="keyword">let</span> b: <span class="type">u8</span> = <span class="string">255</span>;\n\n<span class="comment">// Architecture-dependent</span>\n<span class="keyword">let</span> ptr_size: <span class="type">usize</span> = std::mem::size_of::<span class="type">usize</span>();\n\n<span class="comment">// Literal formats</span>\n<span class="keyword">let</span> hex = <span class="string">0xFF</span>;\n<span class="keyword">let</span> octal = <span class="string">0o77</span>;\n<span class="keyword">let</span> binary = <span class="string">0b1111_0000</span>;\n<span class="keyword">let</span> byte = <span class="string">b\'A\'</span>; <span class="comment">// u8 only, ASCII literal</span>', keyPoints: ["i32 is the default integer type; use it unless you have a specific reason", "usize is for indexing, lengths, and pointer arithmetic; isize for pointer differences", "u8 is commonly used for raw bytes and binary data", "Integer overflow in debug mode panics; in release mode it wraps (two's complement)", "Use checked_, wrapping_, saturating_, and overflowing_ methods for explicit overflow behavior"], commonMistakes: ["Using i32 for collection indices when usize is required (causes type errors)", "Assuming integer overflow panics in release builds — it wraps silently", "Mixing signed and unsigned integers in comparisons without casting"], relatedConcepts: ["usize", "isize", "Overflow", "Type Casting", "Binary Data"] } },

                { id: 16, chapter: "Ch. 3", section: "Common Concepts", title: "Compound Types", concept: "Tuples & Arrays", description: "Tuples group values of different types. Arrays hold elements of the same type with fixed length.", code: 'let tup: (i32, f64, &str) = (500, 6.4, "hi");\nlet arr: [i32; 5] = [1, 2, 3, 4, 5];', tags: ["tuple", "array", "compound", "fixed", "group"],
                  deepDive: { explanation: "Compound types group multiple values into one type. Tuples have fixed length and can contain different types. They are useful for returning multiple values from functions. Arrays have fixed length and contain elements of the same type. The length is part of the type ([i32; 5] is different from [i32; 3]). Arrays are stack-allocated and have O(1) indexing. For growable collections, use Vec instead of arrays. Tuples can be destructured with let (x, y) = point, and elements are accessed with .0, .1, etc.", extendedCode: '<span class="comment">// Tuple destructuring</span>\n<span class="keyword">let</span> tup = (<span class="string">500</span>, <span class="string">6.4</span>, <span class="string">"hi"</span>);\n<span class="keyword">let</span> (x, y, z) = tup;\n<span class="macro">println!</span>(<span class="string">"y is {}"</span>, y); <span class="comment">// 6.4</span>\n\n<span class="comment">// Tuple indexing</span>\n<span class="keyword">let</span> five_hundred = tup.<span class="string">0</span>;\n\n<span class="comment">// Array with type and length</span>\n<span class="keyword">let</span> a: [<span class="type">i32</span>; <span class="string">5</span>] = [<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>, <span class="string">4</span>, <span class="string">5</span>];\n\n<span class="comment">// Initialize array with same value</span>\n<span class="keyword">let</span> b = [<span class="string">3</span>; <span class="string">5</span>]; <span class="comment">// [3, 3, 3, 3, 3]</span>\n\n<span class="comment">// Array indexing</span>\n<span class="keyword">let</span> first = a[<span class="string">0</span>];', keyPoints: ["Tuples can hold different types; arrays must hold the same type", "Array length is part of the type and checked at compile time", "Tuple elements accessed with .0, .1, etc. (zero-indexed)", "Arrays are stack-allocated and have fixed size; use Vec for dynamic size", "The unit type () is an empty tuple, representing 'no value'"], commonMistakes: ["Trying to grow an array (arrays are fixed-size; use Vec<T> instead)", "Accessing tuple elements with [0] instead of .0", "Forgetting that array bounds are checked at runtime (panics on out-of-bounds)"], relatedConcepts: ["Tuple", "Array", "Vec", "Destructuring", "Stack Allocation"] } },

                { id: 17, chapter: "Ch. 3", section: "Common Concepts", title: "Functions", concept: "Declaration & Calls", description: "Functions are declared with fn. Parameters require type annotations. The last expression is implicitly returned.", code: 'fn add(a: i32, b: i32) -> i32 {\n    a + b // no semicolon = return value\n}', tags: ["fn", "function", "parameter", "return", "expression"],
                  deepDive: { explanation: "Functions in Rust are declared with the fn keyword. Every parameter must have an explicit type annotation — Rust does not infer parameter types. Return types are specified with ->. If the last expression in a function doesn't end with a semicolon, it becomes the return value. Early returns use the return keyword. Functions can be declared before or after their call sites (Rust has no forward declaration requirement). Statements (ending with ;) do not return values, while expressions (no ;) evaluate to a value.", extendedCode: '<span class="comment">// Function with multiple parameters and return type</span>\n<span class="keyword">fn</span> <span class="function">calculate</span>(x: <span class="type">i32</span>, y: <span class="type">i32</span>) -> <span class="type">i32</span> {\n    <span class="keyword">let</span> sum = x + y; <span class="comment">// statement</span>\n    sum * <span class="string">2</span>       <span class="comment">// expression (returned)</span>\n}\n\n<span class="comment">// Early return</span>\n<span class="keyword">fn</span> <span class="function">divide</span>(a: <span class="type">f64</span>, b: <span class="type">f64</span>) -> <span class="type">f64</span> {\n    <span class="keyword">if</span> b == <span class="string">0.0</span> {\n        <span class="keyword">return</span> <span class="type">f64</span>::NAN;\n    }\n    a / b\n}\n\n<span class="comment">// Unit return type (no meaningful return)</span>\n<span class="keyword">fn</span> <span class="function">greet</span>(name: &<span class="type">str</span>) {\n    <span class="macro">println!</span>(<span class="string">"Hello, {}!"</span>, name);\n}', keyPoints: ["All function parameters must have explicit type annotations", "The last expression (without semicolon) is the return value", "return keyword is for early returns; otherwise it's implicit", "Functions can return tuples to return multiple values", "The -> () return type (unit) is implicit if omitted"], commonMistakes: ["Adding a semicolon to the last expression, turning it into a statement and causing a type mismatch", "Omitting parameter type annotations (compiler error)", "Trying to return different types from different branches without a common enum type"], relatedConcepts: ["Expressions vs Statements", "Return Type", "Parameters", "Unit Type", "Tuples"] } },

                { id: 18, chapter: "Ch. 3", section: "Common Concepts", title: "Control Flow", concept: "if / else", description: "if expressions evaluate conditions. The condition must be a bool (no implicit conversion).", code: 'if number % 4 == 0 {\n    println!("divisible by 4");\n} else if number % 3 == 0 {\n    println!("divisible by 3");\n} else {\n    println!("else");\n}', tags: ["if", "else", "control flow", "condition", "boolean"],
                  deepDive: { explanation: "if in Rust is an expression, not just a statement. This means it can return a value and be used in assignments. Critically, the condition must be a bool — Rust does not implicitly convert integers or other types to booleans. There is no 'truthy' or 'falsy' concept. This eliminates an entire class of bugs (like if x = 5 instead of if x == 5). Because if is an expression, all branches must return the same type. The else branch is required if the result is used.", extendedCode: '<span class="comment">// if as an expression</span>\n<span class="keyword">let</span> condition = <span class="keyword">true</span>;\n<span class="keyword">let</span> number = <span class="keyword">if</span> condition { <span class="string">5</span> } <span class="keyword">else</span> { <span class="string">6</span> };\n\n<span class="comment">// This will NOT compile:</span>\n<span class="comment">// let x = if condition { 5 } else { "six" }; // type mismatch!</span>\n\n<span class="comment">// Condition must be bool</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">if</span> x == <span class="string">5</span> { <span class="comment">// Must use ==, not just if x</span>\n    <span class="macro">println!</span>(<span class="string">"five"</span>);\n}\n\n<span class="comment">// Multiple conditions</span>\n<span class="keyword">if</span> x % <span class="string">2</span> == <span class="string">0</span> && x % <span class="string">3</span> == <span class="string">0</span> {\n    <span class="macro">println!</span>(<span class="string">"divisible by 6"</span>);\n}', keyPoints: ["if is an expression and can return values from branches", "Conditions must be explicit bool — no implicit conversion", "All branches must return the same type when if is used as an expression", "else if chains are evaluated top-to-bottom; first true branch wins", "No ternary operator ? : — use if/else expression instead"], commonMistakes: ["Using if x instead of if x != 0 (no implicit boolean conversion)", "Returning different types from if branches (e.g., integer vs string)", "Forgetting else when using if as an expression"], relatedConcepts: ["match", "Boolean", "Expressions", "Type Consistency", "else if"] } },

                { id: 19, chapter: "Ch. 3", section: "Common Concepts", title: "Loops", concept: "while & for", description: "while evaluates a condition. for iterates over a collection or range. for is the safest and most common.", code: 'for number in (1..4).rev() {\n    println!("{number}!");\n}\n// 3! 2! 1!', tags: ["for", "while", "loop", "range", "iterate", "rev"],
                  deepDive: { explanation: "Rust has three loop constructs: loop (infinite), while (conditional), and for (iterative). The for loop is the most idiomatic and safest because it handles all elements without risk of off-by-one errors or index out of bounds. It uses the Iterator trait under the hood. Ranges (a..b exclusive, a..=b inclusive) are commonly used with for. while is used when the number of iterations is unknown and depends on a condition. All loops can use break and continue, and can be labeled to control nested loops.", extendedCode: '<span class="comment">// for with inclusive range</span>\n<span class="keyword">for</span> i <span class="keyword">in</span> <span class="string">1</span>..=<span class="string">5</span> {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, i);\n}\n\n<span class="comment">// for over a collection (borrows immutably)</span>\n<span class="keyword">let</span> names = <span class="macro">vec!</span>[<span class="string">"Alice"</span>, <span class="string">"Bob"</span>];\n<span class="keyword">for</span> name <span class="keyword">in</span> &names {\n    <span class="macro">println!</span>(<span class="string">"Hello {}"</span>, name);\n}\n\n<span class="comment">// while loop</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> n = <span class="string">3</span>;\n<span class="keyword">while</span> n != <span class="string">0</span> {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, n);\n    n -= <span class="string">1</span>;\n}\n\n<span class="comment">// Iterating with index</span>\n<span class="keyword">for</span> (i, val) <span class="keyword">in</span> names.iter().enumerate() {\n    <span class="macro">println!</span>(<span class="string">"{}: {}"</span>, i, val);\n}', keyPoints: ["for is the safest and most common loop in Rust", "Ranges: 1..5 is exclusive (1-4), 1..=5 is inclusive (1-5)", "for loops use iterators; collections are borrowed, not consumed", "while is for unknown iteration counts; loop is for infinite/retry logic", "Use .iter(), .iter_mut(), or .into_iter() to control borrowing behavior"], commonMistakes: ["Using while with index-based iteration instead of for (less safe, slower)", "Consuming a collection in a for loop when you meant to borrow it", "Off-by-one errors in ranges — remember .. is exclusive, ..= is inclusive"], relatedConcepts: ["Iterator", "Range", "loop", "while", "enumerate"] } },

                // Chapter 4: Ownership
                { id: 20, chapter: "Ch. 4", section: "Ownership", title: "Ownership Rules", concept: "Memory Management", description: "1. Each value has an owner. 2. Only one owner at a time. 3. Value is dropped when owner goes out of scope.", code: '// s owns the String\nlet s = String::from("hello");\n// s moved to s2, s is no longer valid\nlet s2 = s;', tags: ["ownership", "move", "drop", "scope", "rules"],
                  deepDive: { explanation: "Ownership is Rust's most unique feature and the foundation of its memory safety guarantees without a garbage collector. Instead of manual memory management or garbage collection, Rust uses a system of ownership enforced by the compiler. The three rules are simple but profound: every value has exactly one owner at any time; when the owner goes out of scope, the value is automatically dropped (memory freed); and ownership can be transferred (moved) to another variable or function. This prevents double-free, use-after-free, and dangling pointer bugs at compile time.", extendedCode: '<span class="comment">// Rule 1: Each value has an owner</span>\n<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"hello"</span>); <span class="comment">// s1 is the owner</span>\n\n<span class="comment">// Rule 2: Only one owner at a time</span>\n<span class="keyword">let</span> s2 = s1; <span class="comment">// ownership moved to s2; s1 is now invalid</span>\n<span class="comment">// println!("{}", s1); // ERROR: borrow of moved value</span>\n\n<span class="comment">// Rule 3: Dropped when owner goes out of scope</span>\n{\n    <span class="keyword">let</span> s3 = <span class="type">String</span>::from(<span class="string">"temporary"</span>);\n} <span class="comment">// s3 dropped here automatically</span>\n\n<span class="comment">// Ownership transferred to function</span>\n<span class="function">takes_ownership</span>(s2); <span class="comment">// s2 moved into function, invalid hereafter</span>\n\n<span class="keyword">fn</span> <span class="function">takes_ownership</span>(s: <span class="type">String</span>) {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, s);\n} <span class="comment">// s dropped here</span>', keyPoints: ["Ownership eliminates entire classes of memory bugs at compile time", "Move semantics transfer ownership; the source becomes invalid", "Drop trait determines what happens when a value goes out of scope", "Primitive types with Copy trait are copied, not moved", "Ownership is checked at compile time — zero runtime cost"], commonMistakes: ["Using a variable after moving it (use-after-move compiler error)", "Assuming assignment copies like in C++ or Python (it moves by default)", "Trying to return references to local variables (dangling references)"], relatedConcepts: ["Move Semantics", "Copy Trait", "Borrowing", "Drop Trait", "Scope"] } },

                { id: 21, chapter: "Ch. 4", section: "Ownership", title: "Move Semantics", concept: "Transfer of Ownership", description: "When a value is assigned to another variable or passed to a function, ownership is moved (not copied).", code: 'let s1 = String::from("hello");\nlet s2 = s1; // s1 moved into s2\n// println!("{s1}"); // ERROR!', tags: ["move", "ownership", "assignment", "invalid", "transfer"],
                  deepDive: { explanation: "Move semantics mean that when a value is assigned to a new variable or passed to a function, ownership is transferred rather than copied. The original variable is no longer valid. This is the default behavior for heap-allocated types like String, Vec, and Box. Moving is efficient because it only copies the pointer, length, and capacity on the stack — the heap data stays in place. After a move, the compiler prevents use of the original variable, ensuring no double-free occurs. This is fundamentally different from C++ copy constructors or Python reference counting.", extendedCode: '<span class="comment">// String moves on assignment</span>\n<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="keyword">let</span> s2 = s1; <span class="comment">// s1 moved to s2</span>\n\n<span class="comment">// This is what happens under the hood:</span>\n<span class="comment">// s1: [ptr, len, cap] → heap: "hello"</span>\n<span class="comment">// s2: [ptr, len, cap] → same heap data</span>\n<span class="comment">// s1 is invalidated to prevent double-free</span>\n\n<span class="comment">// Move into function</span>\n<span class="keyword">fn</span> <span class="function">process</span>(data: <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt;) -> <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt; {\n    <span class="comment">// process data...</span>\n    data <span class="comment">// return ownership back</span>\n}\n\n<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n<span class="keyword">let</span> v = <span class="function">process</span>(v); <span class="comment">// moved in, then returned and rebound</span>', keyPoints: ["Move is the default for non-Copy types; it's a shallow pointer copy", "The original variable is invalidated after a move", "Moves happen on assignment, function calls, and struct field initialization", "Clone trait provides explicit deep copying when needed", "Return values transfer ownership back to the caller"], commonMistakes: ["Using a variable after passing it to a function without returning it", "Expecting C++-like copy behavior by default (Rust is more explicit)", "Cloning unnecessarily when borrowing (&) would suffice"], relatedConcepts: ["Copy Trait", "Clone", "Borrowing", "Ownership", "Heap"] } },

                { id: 22, chapter: "Ch. 4", section: "Ownership", title: "Clone", concept: "Deep Copy", description: "Use clone() to explicitly create a deep copy of heap data when you need independent duplicates.", code: 'let s1 = String::from("hello");\nlet s2 = s1.clone(); // both valid', tags: ["clone", "copy", "deep copy", "heap", "duplicate"],
                  deepDive: { explanation: "The Clone trait provides an explicit way to create a deep copy of a value. Unlike implicit copying in other languages, Rust requires you to call .clone() explicitly, making expensive operations visible in your code. When you clone a String, Vec, or other heap-allocated type, the heap data is duplicated, and both copies are independent. This is useful when you need two owners of the same data. However, cloning can be expensive for large data structures, so prefer borrowing (&) when possible. Types that implement Copy are automatically cloned on assignment without explicit .clone().", extendedCode: '<span class="keyword">let</span> s1 = <span class="type">String</span>::from(<span class="string">"hello"</span>);\n<span class="keyword">let</span> s2 = s1.clone(); <span class="comment">// Explicit deep copy</span>\n\n<span class="macro">assert_eq!</span>(s1, s2); <span class="comment">// Both valid and independent</span>\n\n<span class="comment">// Clone is a trait — implement it for custom types</span>\n<span class="keyword">#[derive</span>(Clone)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Config</span> {\n    host: <span class="type">String</span>,\n    port: <span class="type">u16</span>,\n}\n\n<span class="keyword">let</span> c1 = <span class="type">Config</span> { host: <span class="type">String</span>::from(<span class="string">"localhost"</span>), port: <span class="string">8080</span> };\n<span class="keyword">let</span> c2 = c1.clone();\n\n<span class="comment">// For simple structs of Copy types, derive Copy too</span>\n<span class="keyword">#[derive</span>(Clone, Copy)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Point</span> { x: <span class="type">i32</span>, y: <span class="type">i32</span> }', keyPoints: ["Clone is explicit — expensive operations are visible in code", "Clone duplicates heap data; both copies are independent owners", "Derive Clone with #[derive(Clone)] for structs containing Clone types", "Clone is recursive — all fields must implement Clone", "Prefer borrowing over cloning when you don't need ownership"], commonMistakes: ["Cloning excessively instead of using references (performance cost)", "Deriving Clone on structs containing non-Clone types (compiler error)", "Confusing clone() with copy semantics — clone is explicit, copy is implicit"], relatedConcepts: ["Copy Trait", "Borrowing", "Heap Allocation", "Derive", "Trait Bounds"] } },

                { id: 23, chapter: "Ch. 4", section: "Ownership", title: "Copy Trait", concept: "Stack-Only Types", description: "Types with Copy trait (integers, bool, char, floats, tuples of Copy types) are copied instead of moved.", code: 'let x = 5;\nlet y = x; // x is still valid (Copy trait)\nprintln!("{x}"); // works!', tags: ["Copy", "trait", "stack", "primitive", "duplicate"],
                  deepDive: { explanation: "The Copy trait marks types that can be duplicated by simply copying bits on the stack. When a Copy type is assigned or passed to a function, the original remains valid because the data was bitwise copied. This applies to primitive scalar types (integers, floats, bool, char) and tuples/arrays of Copy types. Types containing heap data (String, Vec, Box) cannot implement Copy because a bitwise copy would create two owners of the same heap memory, leading to a double-free. Copy and Clone are closely related: Copy implies Clone, but not vice versa.", extendedCode: '<span class="comment">// Primitive types are Copy</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">let</span> y = x; <span class="comment">// x is copied, still valid</span>\n<span class="macro">println!</span>(<span class="string">"x = {}, y = {}"</span>, x, y);\n\n<span class="comment">// Tuples of Copy types are Copy</span>\n<span class="keyword">let</span> p1 = (<span class="string">1</span>, <span class="keyword">true</span>);\n<span class="keyword">let</span> p2 = p1; <span class="comment">// p1 still valid</span>\n\n<span class="comment">// Custom types can derive Copy if all fields are Copy</span>\n<span class="keyword">#[derive</span>(Clone, Copy)<span class="keyword">]</span>\n<span class="keyword">struct</span> <span class="type">Point</span> { x: <span class="type">f64</span>, y: <span class="type">f64</span> }\n\n<span class="comment">// This struct CANNOT be Copy because String is not Copy</span>\n<span class="keyword">struct</span> <span class="type">Person</span> {\n    name: <span class="type">String</span>, <span class="comment">// not Copy</span>\n    age: <span class="type">u32</span>,    <span class="comment">// Copy</span>\n}', keyPoints: ["Copy types are bitwise duplicated on assignment — original stays valid", "Only stack-only types can be Copy; heap types cannot", "Copy is implicit; Clone is explicit", "Arrays and tuples of Copy types are automatically Copy", "You cannot implement Copy manually if any field is not Copy"], commonMistakes: ["Trying to derive Copy on structs containing String or Vec", "Assuming all types are Copy like in C (Rust is more conservative)", "Confusing Copy with Clone — Copy is implicit and cheap, Clone is explicit and may be expensive"], relatedConcepts: ["Clone", "Move Semantics", "Stack vs Heap", "Primitive Types", "Derive"] } },

                { id: 24, chapter: "Ch. 4", section: "Ownership", title: "References & Borrowing", concept: "Non-Owning Pointers", description: "References allow using a value without taking ownership. Creating a reference is called borrowing.", code: 'fn calculate_length(s: &String) -> usize {\n    s.len()\n}\nlet s1 = String::from("hello");\nlet len = calculate_length(&s1); // s1 still owns the string', tags: ["reference", "borrow", "&", "ownership", "pointer"],
