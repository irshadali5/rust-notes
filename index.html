                  deepDive: { explanation: "Rust's iterator chain approach is a zero-cost abstraction — the compiled machine code is as efficient as hand-written loops. This is achieved through monomorphization (generating specific code for each type), inlining (replacing function calls with the function body), and loop unrolling. The compiler optimizes away intermediate iterators and closures, producing tight loops. In fact, iterator methods can sometimes be faster than manual loops because they avoid bounds checking and can use SIMD optimizations. The 'zero-cost' principle means you don't pay for what you don't use, and what you do use has no overhead beyond the essential work.", extendedCode: '<span class="comment">// Iterator version (idiomatic, equally fast)</span>\n<span class="keyword">let</span> sum: <span class="type">u32</span> = (<span class="string">1</span>..=<span class="string">100</span>)\n    .filter(|x| x % <span class="string">2</span> == <span class="string">0</span>)\n    .map(|x| x * x)\n    .sum();\n\n<span class="comment">// Equivalent loop (same performance after optimization)</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> sum = <span class="string">0</span>;\n<span class="keyword">for</span> x <span class="keyword">in</span> <span class="string">1</span>..=<span class="string">100</span> {\n    <span class="keyword">if</span> x % <span class="string">2</span> == <span class="string">0</span> {\n        sum += x * x;\n    }\n}\n\n<span class="comment">// Iterators can be faster due to no bounds checking</span>\n<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>, <span class="string">4</span>, <span class="string">5</span>];\n<span class="keyword">let</span> sum: <span class="type">i32</span> = v.iter().sum(); <span class="comment">// no bounds checks needed</span>', keyPoints: ["Iterator chains compile to efficient machine code", "Monomorphization and inlining eliminate abstraction overhead", "Often faster than manual loops due to eliminated bounds checks", "Zero-cost means no runtime penalty for using high-level abstractions", "Prefer iterators for clarity and performance"], commonMistakes: ["Prematurely optimizing by writing manual loops instead of iterators", "Assuming iterators are slower than loops (usually not true in Rust)", "Creating intermediate Vecs instead of chaining iterators"], relatedConcepts: ["Zero-Cost Abstraction", "Monomorphization", "Inlining", "SIMD", "Optimization"] } },

                // Chapter 14: Cargo & Crates.io
                { id: 81, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Workspaces", concept: "Multi-Crate Projects", description: "Workspaces allow managing multiple related packages that share a single Cargo.lock and output directory.", code: '[workspace]\nmembers = [\n    "adder",\n    "add-one",\n]', tags: ["workspace", "multi-crate", "Cargo.lock", "members", "project"],
                  deepDive: { explanation: "Cargo workspaces allow you to manage multiple related packages in a single project. All workspace members share a single Cargo.lock file and target/ output directory, ensuring consistent dependencies and faster builds. Workspaces are defined by a root Cargo.toml with a [workspace] section listing members. Each member has its own Cargo.toml and can depend on other members using path dependencies. This is ideal for large projects split into multiple crates (e.g., a library, binary, and tools).", extendedCode: '<span class="comment">// Workspace root Cargo.toml</span>\n[<span class="function">workspace</span>]\nmembers = [<span class="string">"adder"</span>, <span class="string">"add-one"</span>]\nresolver = <span class="string">"2"</span>\n\n<span class="comment">// adder/Cargo.toml</span>\n[<span class="function">package</span>]\nname = <span class="string">"adder"</span>\ndependencies = { add-one = { path = <span class="string">"../add-one"</span> } }\n\n<span class="comment">// add-one/Cargo.toml</span>\n[<span class="function">package</span>]\nname = <span class="string">"add-one"</span>\n\n<span class="comment">// Build all workspace members</span>\n<span class="comment">// $ cargo build --workspace</span>\n<span class="comment">// $ cargo test --workspace</span>', keyPoints: ["Workspaces share a single Cargo.lock and target/ directory", "Each member is a separate package with its own Cargo.toml", "Members can depend on each other via path dependencies", "cargo build --workspace builds all members", "The resolver field controls dependency resolution behavior"], commonMistakes: ["Forgetting to list a member in the workspace members array", "Using different versions of the same dependency in different members (workspace resolves to one)", "Not using --workspace flag when intending to build/test all members"], relatedConcepts: ["Cargo.toml", "Package", "Dependency", "Path Dependency", "Resolver"] } },

                { id: 82, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Documentation Comments", concept: "/// and //!", description: "/// documents the item after it. //! documents the enclosing item (module/crate). Generates HTML with cargo doc.", code: '/// Adds one to the given number.\n/// # Examples\n/// let five = add_one(4);\npub fn add_one(x: i32) -> i32 { x + 1 }', tags: ["doc comment", "///", "cargo doc", "documentation", "markdown"],
                  deepDive: { explanation: "Documentation comments in Rust use triple slashes (///) and support Markdown. They document the item following them. Inner doc comments (//!) document the enclosing item (module, crate, or file). cargo doc generates HTML documentation from these comments, similar to Rust's standard library docs. Doc comments can include code examples that are compiled and tested as doc tests. Special sections include # Examples, # Panics, # Errors, and # Safety. Well-documented code is crucial for crates published to crates.io.", extendedCode: '<span class="comment">/// Adds one to the given number.</span>\n<span class="comment">///</span>\n<span class="comment">/// # Examples</span>\n<span class="comment">///</span>\n<span class="comment">/// ```</span>\n<span class="comment">/// let five = add_one(4);</span>\n<span class="comment">///</span>\n<span class="comment">/// assert_eq!(five, 5);</span>\n<span class="comment">/// ```</span>\n<span class="comment">///</span>\n<span class="comment">/// # Panics</span>\n<span class="comment">///</span>\n<span class="comment">/// This function does not panic.</span>\n<span class="keyword">pub fn</span> <span class="function">add_one</span>(x: <span class="type">i32</span>) -> <span class="type">i32</span> {\n    x + <span class="string">1</span>\n}\n\n<span class="comment">//! This crate provides mathematical utilities.</span>\n<span class="comment">//!</span>\n<span class="comment">//! # Usage</span>\n<span class="comment">//! Add `math-utils` to your Cargo.toml.</span>', keyPoints: ["/// documents the following item; //! documents the enclosing item", "Supports Markdown formatting", "Code blocks in examples are run as doc tests", "cargo doc generates HTML documentation", "Special sections: Examples, Panics, Errors, Safety"], commonMistakes: ["Using // instead of /// for documentation (// is ignored by cargo doc)", "Not testing code examples (they can become stale)", "Documenting private items without --document-private-items flag"], relatedConcepts: ["cargo doc", "Doc Test", "Markdown", "Examples", "crates.io"] } },

                { id: 83, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Publishing Crates", concept: "crates.io", description: "Publish libraries to crates.io using cargo publish. Requires auth token and semantic versioning.", code: '$ cargo login <API_TOKEN>\n$ cargo publish', tags: ["crates.io", "publish", "cargo", "version", "registry"],
                  deepDive: { explanation: "crates.io is Rust's official package registry. Publishing a crate makes it available for others to use as a dependency. Before publishing, ensure your Cargo.toml has required metadata: name, version, description, license (or license-file), and authors. Versions must follow Semantic Versioning (SemVer). cargo login authenticates you with an API token from crates.io. cargo publish uploads your crate. Once published, versions cannot be deleted (only yanked, which prevents new dependencies but doesn't break existing ones). Documentation is crucial for adoption.", extendedCode: '<span class="comment">// Required in Cargo.toml for publishing</span>\n[<span class="function">package</span>]\nname = <span class="string">"my-crate"</span>\nversion = <span class="string">"1.0.0"</span>\ndescription = <span class="string">"A useful crate"</span>\nlicense = <span class="string">"MIT OR Apache-2.0"</span>\nrepository = <span class="string">"https://github.com/user/repo"</span>\n\n<span class="comment">// Publishing steps</span>\n<span class="comment">// 1. cargo test (ensure everything passes)</span>\n<span class="comment">// 2. cargo publish --dry-run (verify)</span>\n<span class="comment">// 3. cargo publish</span>\n\n<span class="comment">// Yanking a version (prevents new deps but doesn't break existing)</span>\n<span class="comment">// cargo yank --vers 1.0.0</span>', keyPoints: ["crates.io is the official Rust package registry", "Semantic Versioning is required (MAJOR.MINOR.PATCH)", "cargo login authenticates with an API token", "Published versions cannot be deleted, only yanked", "Good documentation and examples increase adoption"], commonMistakes: ["Publishing without tests or documentation", "Breaking SemVer (changing API in a minor/patch release)", "Accidentally publishing with local path dependencies"], relatedConcepts: ["Semantic Versioning", "cargo", "Registry", "Yank", "License"] } },

                { id: 84, chapter: "Ch. 14", section: "Cargo & Crates.io", title: "Profiles", concept: "dev & release", description: "Cargo has built-in profiles for development and release, controlling optimization levels and debug info.", code: '[profile.release]\nopt-level = 3\nlto = true', tags: ["profile", "release", "dev", "optimization", "Cargo.toml"],
                  deepDive: { explanation: "Cargo profiles control compiler settings for different build scenarios. The dev profile (used by cargo build) prioritizes fast compilation with debug info and minimal optimizations. The release profile (used by cargo build --release) enables full optimizations for performance. You can customize profiles in Cargo.toml: opt-level controls optimization (0-3, s, z), debug enables debug info, lto enables link-time optimization, and panic controls panic behavior (unwind or abort). Custom profiles can be defined for specific use cases (e.g., testing, benchmarking).", extendedCode: '<span class="comment">// Default profiles (can be customized)</span>\n[<span class="function">profile.dev</span>]\nopt-level = <span class="string">0</span>\ndebug = <span class="keyword">true</span>\n\n[<span class="function">profile.release</span>]\nopt-level = <span class="string">3</span>\ndebug = <span class="keyword">false</span>\nlto = <span class="keyword">true</span>\n\n<span class="comment">// Custom profile</span>\n[<span class="function">profile.bench</span>]\ninherits = <span class="string">"release"</span>\ndebug = <span class="keyword">true</span>\n\n<span class="comment">// Usage</span>\n<span class="comment">// cargo build --profile bench</span>', keyPoints: ["dev profile: fast compile, debug info, no optimization", "release profile: slow compile, full optimization, no debug info", "opt-level 3 is maximum speed; s/z optimize for size", "lto (Link Time Optimization) can improve performance but slows linking", "Custom profiles inherit from built-in profiles"], commonMistakes: ["Benchmarking debug builds (much slower than release)", "Not enabling lto in release when maximum performance is needed", "Confusing opt-level s (size) with z (aggressive size)"], relatedConcepts: ["Optimization", "cargo build", "LTO", "Debug Info", "Benchmark"] } },

                // Chapter 15: Smart Pointers
                { id: 85, chapter: "Ch. 15", section: "Smart Pointers", title: "Box<T>", concept: "Heap Allocation", description: "Box<T> allocates data on the heap and stores a pointer on the stack. Useful for recursive types or large data transfers.", code: 'let b = Box::new(5);\nprintln!("b = {}", b); // auto-dereferenced', tags: ["Box", "heap", "pointer", "recursive", "allocation"],
                  deepDive: { explanation: "Box<T> is the simplest smart pointer in Rust. It allocates data on the heap and stores a pointer to it on the stack. Box is useful when: (1) you have a type whose size is unknown at compile time (like recursive types), (2) you want to transfer ownership of a large amount of data without copying, or (3) you need a trait object (dyn Trait). Box implements Deref and Drop, so it can be used like a regular reference and automatically frees heap memory when it goes out of scope. Box has minimal overhead — just a single heap allocation.", extendedCode: '<span class="comment">// Recursive type requires Box</span>\n<span class="keyword">enum</span> <span class="type">List</span> {\n    <span class="type">Cons</span>(<span class="type">i32</span>, <span class="type">Box</span>&lt;<span class="type">List</span>&gt;),\n    <span class="type">Nil</span>,\n}\n\n<span class="keyword">let</span> list = <span class="type">List</span>::<span class="type">Cons</span>(<span class="string">1</span>, <span class="type">Box</span>::new(<span class="type">List</span>::<span class="type">Cons</span>(<span class="string">2</span>, <span class="type">Box</span>::new(<span class="type">List</span>::<span class="type">Nil</span>))));\n\n<span class="comment">// Large data on heap</span>\n<span class="keyword">let</span> large = <span class="type">Box</span>::new([<span class="string">0u8</span>; <span class="string">1_000_000</span>]);\n\n<span class="comment">// Trait object</span>\n<span class="keyword">let</span> drawable: <span class="type">Box</span>&lt;<span class="keyword">dyn</span> Draw&gt; = <span class="type">Box</span>::new(Circle::new());', keyPoints: ["Box<T> stores data on the heap with a stack pointer", "Required for recursive types (structs/enums containing themselves)", "Useful for large data transfers (moves just the pointer)", "Implements Deref (usable like a reference) and Drop (auto-cleanup)", "Minimal overhead: one heap allocation"], commonMistakes: ["Using Box when a regular value on the stack would suffice", "Creating deep recursive structures without Box (infinite size)", "Forgetting that Box is owned — moving it transfers ownership"], relatedConcepts: ["Deref", "Drop", "Heap", "Recursive Type", "Trait Object"] } },

                { id: 86, chapter: "Ch. 15", section: "Smart Pointers", title: "Deref Trait", concept: "Custom Dereference", description: "Implementing Deref allows smart pointers to be treated like references. Enables deref coercion.", code: 'impl<T> Deref for MyBox<T> {\n    type Target = T;\n    fn deref(&self) -> &T { &self.0 }\n}', tags: ["Deref", "dereference", "coercion", "smart pointer", "trait"],
                  deepDive: { explanation: "The Deref trait allows types to be dereferenced like references. When you implement Deref for a type, the * operator works on it, and deref coercion automatically converts references to the type into references to the target type. This is why Box<String> can be used where &str is expected: &Box<String> → &String → &str. DerefMut is the mutable version. Deref coercion is a convenience that makes smart pointers ergonomic. Without it, you'd need explicit dereferencing everywhere.", extendedCode: '<span class="keyword">use</span> std::ops::Deref;\n\n<span class="keyword">struct</span> <span class="type">MyBox</span>&lt;T&gt;(T);\n\n<span class="keyword">impl</span>&lt;T&gt; Deref <span class="keyword">for</span> <span class="type">MyBox</span>&lt;T&gt; {\n    <span class="keyword">type</span> <span class="type">Target</span> = T;\n    \n    <span class="keyword">fn</span> <span class="function">deref</span>(&<span class="keyword">self</span>) -> &<span class="keyword">Self</span>::Target {\n        &<span class="keyword">self</span>.<span class="string">0</span>\n    }\n}\n\n<span class="keyword">let</span> x = <span class="type">MyBox</span>::new(<span class="type">String</span>::from(<span class="string">"hello"</span>));\n<span class="comment">// Deref coercion: &MyBox<String> -> &String -> &str</span>\n<span class="function">greet</span>(&x);\n\n<span class="keyword">fn</span> <span class="function">greet</span>(name: &<span class="type">str</span>) {\n    <span class="macro">println!</span>(<span class="string">"Hello, {}!"</span>, name);\n}', keyPoints: ["Deref enables the * operator on custom types", "Deref coercion automatically converts &Type to &Target", "Makes smart pointers ergonomic and transparent", "DerefMut is the mutable version", "Coercion chains: &Box<String> → &String → &str"], commonMistakes: ["Implementing Deref when it's not semantically a pointer", "Confusing Deref with AsRef (AsRef is for cheap conversions, Deref is for smart pointers)", "Not implementing DerefMut when mutable access is needed"], relatedConcepts: ["DerefMut", "Coercion", "Smart Pointer", "AsRef", "Trait"] } },

                { id: 87, chapter: "Ch. 15", section: "Smart Pointers", title: "Drop Trait", concept: "Custom Cleanup", description: "Drop lets you customize what happens when a value goes out of scope. Used for resource cleanup.", code: 'impl Drop for CustomSmartPointer {\n    fn drop(&mut self) {\n        println!("Dropping!");\n    }\n}', tags: ["Drop", "destructor", "cleanup", "scope", "resource"],
                  deepDive: { explanation: "The Drop trait provides a destructor that runs when a value goes out of scope. It's used for resource cleanup: freeing heap memory (Box), releasing locks (MutexGuard), closing files, or any custom cleanup logic. You cannot call drop() explicitly (it's called automatically), but you can use std::mem::drop to force early dropping. Drop is called in reverse order of creation (last created, first dropped). If a value is moved, its Drop is not called at the original location — only when the new owner goes out of scope.", extendedCode: '<span class="keyword">struct</span> <span class="type">CustomSmartPointer</span> {\n    data: <span class="type">String</span>,\n}\n\n<span class="keyword">impl</span> Drop <span class="keyword">for</span> <span class="type">CustomSmartPointer</span> {\n    <span class="keyword">fn</span> <span class="function">drop</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) {\n        <span class="macro">println!</span>(<span class="string">"Dropping CustomSmartPointer with data `{}`!"</span>, <span class="keyword">self</span>.data);\n    }\n}\n\n<span class="keyword">let</span> c = <span class="type">CustomSmartPointer</span> {\n    data: <span class="type">String</span>::from(<span class="string">"my stuff"</span>),\n};\n<span class="macro">println!</span>(<span class="string">"CustomSmartPointer created."</span>);\n<span class="comment">// c.drop(); // ERROR: explicit destructor calls not allowed</span>\n<span class="keyword">drop</span>(c); <span class="comment">// std::mem::drop forces early drop</span>\n<span class="macro">println!</span>(<span class="string">"CustomSmartPointer dropped before the end of main."</span>);', keyPoints: ["Drop runs automatically when a value goes out of scope", "Used for resource cleanup (memory, locks, files)", "Called in reverse order of creation", "Cannot call drop() explicitly; use std::mem::drop for early cleanup", "Moving a value postpones its Drop to the new owner's scope"], commonMistakes: ["Trying to call .drop() explicitly (use std::mem::drop instead)", "Implementing Drop when RAII patterns would be simpler", "Relying on Drop order for program logic (order can be subtle)"], relatedConcepts: ["RAII", "Destructor", "Scope", "std::mem::drop", "Resource Management"] } },

                { id: 88, chapter: "Ch. 15", section: "Smart Pointers", title: "Rc<T>", concept: "Reference Counting", description: "Rc<T> enables multiple ownership via reference counting. Only for single-threaded scenarios.", code: 'use std::rc::Rc;\nlet data = Rc::new(5);\nlet data2 = Rc::clone(&data);', tags: ["Rc", "reference count", "multiple ownership", "clone", "single-threaded"],
                  deepDive: { explanation: "Rc<T> (Reference Counted) enables multiple ownership of immutable data on the heap. It keeps a count of references and only frees the data when the last reference is dropped. Rc::clone increments the reference count (it's a cheap operation, not a deep clone). Rc is only for single-threaded use — for multi-threaded scenarios, use Arc<T> (Atomic Reference Counted). Rc allows shared ownership but not mutation. To mutate shared data, combine Rc with RefCell (single-threaded) or Arc with Mutex (multi-threaded).", extendedCode: '<span class="keyword">use</span> std::rc::Rc;\n\n<span class="keyword">let</span> data = <span class="type">Rc</span>::new(<span class="type">String</span>::from(<span class="string">"shared"</span>));\n\n<span class="macro">println!</span>(<span class="string">"Reference count: {}"</span>, <span class="type">Rc</span>::strong_count(&data)); <span class="comment">// 1</span>\n\n<span class="keyword">let</span> data2 = <span class="type">Rc</span>::clone(&data);\n<span class="macro">println!</span>(<span class="string">"Reference count: {}"</span>, <span class="type">Rc</span>::strong_count(&data)); <span class="comment">// 2</span>\n\n<span class="comment">// Both point to the same data</span>\n<span class="macro">assert!</span>(<span class="type">Rc</span>::ptr_eq(&data, &data2));\n\n<span class="comment">// Rc with RefCell for interior mutability</span>\n<span class="keyword">use</span> std::cell::RefCell;\n<span class="keyword">let</span> shared = <span class="type">Rc</span>::new(RefCell::new(<span class="string">5</span>));\n*shared.borrow_mut() = <span class="string">10</span>;', keyPoints: ["Rc enables multiple ownership of immutable heap data", "Rc::clone increments reference count (cheap, not deep copy)", "Data is freed when the last Rc is dropped", "Single-threaded only; use Arc for multi-threaded code", "Combine with RefCell for mutable shared data (single-threaded)"], commonMistakes: ["Using Rc in multi-threaded code (use Arc instead)", "Confusing Rc::clone with deep clone (it's just incrementing a counter)", "Creating reference cycles with Rc (use Weak to break them)"], relatedConcepts: ["Arc", "RefCell", "Weak", "Reference Counting", "Clone"] } },

                { id: 89, chapter: "Ch. 15", section: "Smart Pointers", title: "RefCell<T>", concept: "Interior Mutability", description: "RefCell<T> enforces borrowing rules at runtime rather than compile time. Uses borrow() and borrow_mut().", code: 'use std::cell::RefCell;\nlet cell = RefCell::new(5);\n*cell.borrow_mut() += 1;', tags: ["RefCell", "interior mutability", "borrow", "runtime", "cell"],
                  deepDive: { explanation: "RefCell<T> provides interior mutability — the ability to mutate data even when there are immutable references to it. Unlike regular references where borrowing rules are checked at compile time, RefCell checks them at runtime. If you violate the rules (e.g., borrowing mutably while an immutable borrow exists), the program panics. RefCell is useful when you need mutation but the borrow checker can't prove safety (e.g., in recursive data structures or when implementing mock objects for testing). RefCell is single-threaded only; for multi-threaded code, use Mutex or RwLock.", extendedCode: '<span class="keyword">use</span> std::cell::RefCell;\n\n<span class="keyword">let</span> cell = RefCell::new(<span class="string">5</span>);\n\n<span class="comment">// Immutable borrow</span>\n<span class="keyword">let</span> borrowed = cell.borrow();\n<span class="macro">println!</span>(<span class="string">"{}"</span>, borrowed);\n\n<span class="comment">// Mutable borrow</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> borrowed_mut = cell.borrow_mut();\n*borrowed_mut += <span class="string">1</span>;\n\n<span class="comment">// This would PANIC at runtime:</span>\n<span class="comment">// let x = cell.borrow();</span>\n<span class="comment">// let y = cell.borrow_mut(); // already borrowed</span>\n\n<span class="comment">// Common pattern: Rc<RefCell<T>> for shared mutable state</span>\n<span class="keyword">use</span> std::rc::Rc;\n<span class="keyword">let</span> shared = <span class="type">Rc</span>::new(RefCell::new(<span class="type">Vec</span>::new()));\nshared.borrow_mut().push(<span class="string">1</span>);', keyPoints: ["RefCell provides interior mutability with runtime checks", "borrow() and borrow_mut() return Ref and RefMut smart pointers", "Violating borrowing rules causes a panic at runtime", "Single-threaded only; use Mutex/RwLock for threads", "Often combined with Rc for shared mutable state"], commonMistakes: ["Using RefCell when regular mutable references would work", "Creating runtime panics by violating borrowing rules", "Using RefCell in multi-threaded code (not Send/Sync)"], relatedConcepts: ["Interior Mutability", "borrow_mut", "Rc", "Mutex", "Cell"] } },

                { id: 90, chapter: "Ch. 15", section: "Smart Pointers", title: "Reference Cycles", concept: "Memory Leaks", description: "Rc + RefCell can create reference cycles causing memory leaks. Use Weak<T> to break cycles.", code: 'use std::rc::Weak;\nlet weak = Rc::downgrade(&rc); // Weak reference', tags: ["Weak", "reference cycle", "memory leak", "downgrade", "Rc"],
                  deepDive: { explanation: "Reference cycles occur when two or more Rc pointers refer to each other, preventing their reference counts from reaching zero. This causes a memory leak because the data is never freed. Weak<T> is a non-owning reference to data held by an Rc. It doesn't increment the reference count, so it doesn't prevent the data from being dropped. To create a Weak reference, use Rc::downgrade. To access the data, use upgrade() which returns Option<Rc<T>> (None if the data was dropped). Weak is commonly used in tree structures where parent nodes hold Weak references to children to avoid cycles.", extendedCode: '<span class="keyword">use</span> std::rc::{Rc, Weak};\n<span class="keyword">use</span> std::cell::RefCell;\n\n<span class="keyword">struct</span> <span class="type">Node</span> {\n    value: <span class="type">i32</span>,\n    parent: RefCell&lt;Weak&lt;<span class="type">Node</span>&gt;&gt;,\n    children: RefCell&lt;<span class="type">Vec</span>&lt;<span class="type">Rc</span>&lt;<span class="type">Node</span>&gt;&gt;&gt;,\n}\n\n<span class="keyword">let</span> leaf = <span class="type">Rc</span>::new(<span class="type">Node</span> {\n    value: <span class="string">3</span>,\n    parent: RefCell::new(Weak::new()),\n    children: RefCell::new(<span class="macro">vec!</span>[]),\n});\n\n<span class="keyword">let</span> branch = <span class="type">Rc</span>::new(<span class="type">Node</span> {\n    value: <span class="string">5</span>,\n    parent: RefCell::new(Weak::new()),\n    children: RefCell::new(<span class="macro">vec!</span>[<span class="type">Rc</span>::clone(&leaf)]),\n});\n\n*leaf.parent.borrow_mut() = <span class="type">Rc</span>::downgrade(&branch);\n\n<span class="comment">// Access through Weak</span>\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(parent) = leaf.parent.borrow().upgrade() {\n    <span class="macro">println!</span>(<span class="string">"Parent value: {}"</span>, parent.value);\n}', keyPoints: ["Rc cycles cause memory leaks (reference counts never reach zero)", "Weak<T> is a non-owning reference that doesn't prevent dropping", "Rc::downgrade creates a Weak reference", "Weak::upgrade returns Option<Rc<T>> (None if data dropped)", "Use Weak for parent pointers in tree/graph structures"], commonMistakes: ["Creating cycles with Rc without using Weak", "Assuming Weak references keep data alive (they don't)", "Not checking upgrade() result (returns Option)"], relatedConcepts: ["Rc", "Memory Leak", "downgrade", "upgrade", "Tree"] } },

                // Chapter 16: Fearless Concurrency
                { id: 91, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Threads", concept: "spawn & join", description: "Create threads with thread::spawn. Use join to wait for threads to finish and get their results.", code: 'let handle = thread::spawn(|| {\n    for i in 1..10 { println!("hi number {i}"); }\n});\nhandle.join().unwrap();', tags: ["thread", "spawn", "join", "concurrent", "parallel"],
                  deepDive: { explanation: "Rust provides threads through the std::thread module. thread::spawn creates a new OS thread and returns a JoinHandle. The closure passed to spawn runs in the new thread. join() blocks the current thread until the spawned thread finishes, returning a Result containing the closure's return value or a panic payload if the thread panicked. Threads in Rust are OS threads (1:1 model), not green threads. The move keyword is often used with closures to transfer ownership of data into the new thread.", extendedCode: '<span class="keyword">use</span> std::thread;\n\n<span class="keyword">let</span> handle = thread::spawn(|| {\n    <span class="keyword">for</span> i <span class="keyword">in</span> <span class="string">1</span>..<span class="string">10</span> {\n        <span class="macro">println!</span>(<span class="string">"hi number {} from the spawned thread!"</span>, i);\n    }\n});\n\n<span class="keyword">for</span> i <span class="keyword">in</span> <span class="string">1</span>..<span class="string">5</span> {\n    <span class="macro">println!</span>(<span class="string">"hi number {} from the main thread!"</span>, i);\n}\n\n<span class="comment">// Wait for spawned thread to finish</span>\nhandle.join().unwrap();\n\n<span class="comment">// Thread with return value</span>\n<span class="keyword">let</span> handle = thread::spawn(|| {\n    <span class="string">42</span>\n});\n<span class="keyword">let</span> result = handle.join().unwrap();\n<span class="macro">assert_eq!</span>(result, <span class="string">42</span>);', keyPoints: ["thread::spawn creates a new OS thread", "JoinHandle allows waiting for thread completion with join()", "move closures transfer ownership into threads", "Threads are OS threads (1:1 model), not green threads", "join() returns Result — unwrap to get the return value or panic"], commonMistakes: ["Not calling join() and having the main thread exit before spawned threads finish", "Not using move when the closure needs to outlive the current scope", "Assuming thread spawn order determines execution order"], relatedConcepts: ["spawn", "join", "move", "JoinHandle", "OS Thread"] } },

                { id: 92, chapter: "Ch. 16", section: "Fearless Concurrency", title: "move Closures", concept: "Transferring Ownership", description: "Use move before a closure to force it to take ownership of captured variables, useful for threads.", code: 'let v = vec![1, 2, 3];\nlet handle = thread::spawn(move || {\n    println!("Vector: {v:?}");\n});', tags: ["move", "closure", "thread", "ownership", "capture"],
                  deepDive: { explanation: "The move keyword before a closure forces it to take ownership of captured variables rather than borrowing them. This is essential for closures passed to thread::spawn because the new thread may outlive the current scope — borrowing would create dangling references. After a move closure captures a variable, the original variable is no longer valid in the outer scope (unless the type implements Copy). move is also useful for closures stored in structs or sent to other threads via channels.", extendedCode: '<span class="keyword">let</span> v = <span class="macro">vec!</span>[<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>];\n\n<span class="comment">// move takes ownership of v</span>\n<span class="keyword">let</span> handle = thread::spawn(<span class="keyword">move</span> || {\n    <span class="macro">println!</span>(<span class="string">"Vector: {:?}"</span>, v);\n});\n\n<span class="comment">// v is no longer valid here</span>\n<span class="comment">// println!("{:?}", v); // ERROR!</span>\n\nhandle.join().unwrap();\n\n<span class="comment">// move with Copy types</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;\n<span class="keyword">let</span> handle = thread::spawn(<span class="keyword">move</span> || {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, x);\n});\n<span class="macro">println!</span>(<span class="string">"{}"</span>, x); <span class="comment">// OK: i32 is Copy</span>', keyPoints: ["move forces ownership transfer into closures", "Required for thread::spawn to prevent dangling references", "After move, the original variable is invalid (unless Copy)", "Can be used with any closure, not just threads", "Useful for closures stored in structs or sent across channels"], commonMistakes: ["Forgetting move and getting lifetime errors in threads", "Using a variable after it was moved into a closure", "Assuming move always moves (Copy types are copied)"], relatedConcepts: ["Closure", "Ownership", "Thread", "Capture", "Copy"] } },

                { id: 93, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Message Passing", concept: "Channels", description: "mpsc (multiple producer, single consumer) channels transfer data between threads using send and recv.", code: 'let (tx, rx) = mpsc::channel();\ntx.send(val).unwrap();\nlet received = rx.recv().unwrap();', tags: ["channel", "mpsc", "send", "recv", "message"],
                  deepDive: { explanation: "Message passing is Rust's preferred concurrency pattern, inspired by Erlang's 'Do not communicate by sharing memory; instead, share memory by communicating.' The mpsc (multiple producer, single consumer) module provides channels for thread communication. A channel has a transmitter (tx) and receiver (rx). send() moves data into the channel; recv() blocks until a message arrives, returning Result. try_recv() doesn't block. Multiple transmitters can be created by cloning tx. Channels are type-safe — they only transmit one type of data.", extendedCode: '<span class="keyword">use</span> std::sync::mpsc;\n<span class="keyword">use</span> std::thread;\n\n<span class="keyword">let</span> (tx, rx) = mpsc::channel();\n\nthread::spawn(<span class="keyword">move</span> || {\n    <span class="keyword">let</span> val = <span class="type">String</span>::from(<span class="string">"hi"</span>);\n    tx.send(val).unwrap();\n    <span class="comment">// val is moved; no longer valid here</span>\n});\n\n<span class="keyword">let</span> received = rx.recv().unwrap();\n<span class="macro">println!</span>(<span class="string">"Got: {}"</span>, received);\n\n<span class="comment">// Multiple producers</span>\n<span class="keyword">let</span> tx2 = tx.clone();\nthread::spawn(<span class="keyword">move</span> || {\n    tx2.send(<span class="string">"from tx2"</span>).unwrap();\n});\n\n<span class="comment">// Iterating over receiver</span>\n<span class="keyword">for</span> received <span class="keyword">in</span> rx {\n    <span class="macro">println!</span>(<span class="string">"Got: {}"</span>, received);\n}', keyPoints: ["mpsc = multiple producer, single consumer", "send() moves data; recv() blocks until message arrives", "try_recv() doesn't block (returns Err if empty)", "Clone tx for multiple producers", "Channels are type-safe and thread-safe"], commonMistakes: ["Using the sent value after sending (it's moved)", "Blocking the main thread with recv() without a spawned thread", "Forgetting to clone tx for multiple producers (moved on first send)"], relatedConcepts: ["mpsc", "send", "recv", "Thread", "Message Passing"] } },

                { id: 94, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Mutex<T>", concept: "Mutual Exclusion", description: "Mutex provides interior mutability across threads. Must acquire lock before accessing data. Lock releases when guard drops.", code: 'let m = Mutex::new(5);\n{\n    let mut num = m.lock().unwrap();\n    *num = 6;\n} // lock released here', tags: ["Mutex", "lock", "thread-safe", "interior mutability", "guard"],
                  deepDive: { explanation: "Mutex<T> (mutual exclusion) ensures that only one thread can access data at a time. It provides interior mutability across threads — you can mutate data even when the Mutex itself is immutable. To access data, call lock() which blocks until the lock is available and returns a MutexGuard. The guard automatically releases the lock when it goes out of scope (RAII pattern). lock() returns a Result because the lock might be poisoned if another thread panicked while holding it. Mutex is typically wrapped in Arc to share between threads.", extendedCode: '<span class="keyword">use</span> std::sync::{Mutex, Arc};\n<span class="keyword">use</span> std::thread;\n\n<span class="keyword">let</span> counter = Arc::new(Mutex::new(<span class="string">0</span>));\n<span class="keyword">let</span> <span class="keyword">mut</span> handles = <span class="macro">vec!</span>[];\n\n<span class="keyword">for</span> _ <span class="keyword">in</span> <span class="string">0</span>..<span class="string">10</span> {\n    <span class="keyword">let</span> counter = Arc::clone(&counter);\n    <span class="keyword">let</span> handle = thread::spawn(<span class="keyword">move</span> || {\n        <span class="keyword">let</span> <span class="keyword">mut</span> num = counter.lock().unwrap();\n        *num += <span class="string">1</span>;\n    });\n    handles.push(handle);\n}\n\n<span class="keyword">for</span> handle <span class="keyword">in</span> handles {\n    handle.join().unwrap();\n}\n\n<span class="macro">println!</span>(<span class="string">"Result: {}"</span>, *counter.lock().unwrap());', keyPoints: ["Mutex ensures exclusive access to data across threads", "lock() returns a MutexGuard that releases on drop", "Mutex provides interior mutability (like RefCell but thread-safe)", "Combine with Arc to share between threads", "Poisoning: if a thread panics while holding the lock, subsequent lock() calls return Err"], commonMistakes: ["Deadlock: holding one lock while trying to acquire another", "Holding the lock longer than necessary (blocks other threads)", "Forgetting to wrap Mutex in Arc for multi-threaded sharing"], relatedConcepts: ["Arc", "Lock", "Poisoning", "Thread Safety", "RAII"] } },

                { id: 95, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Arc<T>", concept: "Atomic Reference Count", description: "Arc<T> is like Rc<T> but thread-safe. Use Arc with Mutex to share mutable state between threads.", code: 'let counter = Arc::new(Mutex::new(0));\nlet counter2 = Arc::clone(&counter);\nthread::spawn(move || {\n    let mut num = counter2.lock().unwrap();\n    *num += 1;\n});', tags: ["Arc", "atomic", "thread-safe", "Mutex", "share"],
                  deepDive: { explanation: "Arc<T> (Atomic Reference Counted) is the thread-safe counterpart to Rc<T>. It uses atomic operations to manage the reference count, making it safe to share between threads. Like Rc, Arc enables multiple owners of immutable data. To mutate shared data, wrap it in a Mutex or RwLock: Arc<Mutex<T>>. Arc::clone increments the atomic reference count. The overhead of atomic operations is minimal but slightly more expensive than Rc's non-atomic operations. Arc is essential for sharing heap-allocated data between threads in Rust.", extendedCode: '<span class="keyword">use</span> std::sync::{Arc, Mutex};\n<span class="keyword">use</span> std::thread;\n\n<span class="keyword">let</span> data = Arc::new(Mutex::new(<span class="type">Vec</span>::new()));\n\n<span class="keyword">let</span> <span class="keyword">mut</span> handles = <span class="macro">vec!</span>[];\n<span class="keyword">for</span> i <span class="keyword">in</span> <span class="string">0</span>..<span class="string">5</span> {\n    <span class="keyword">let</span> data = Arc::clone(&data);\n    <span class="keyword">let</span> handle = thread::spawn(<span class="keyword">move</span> || {\n        <span class="keyword">let</span> <span class="keyword">mut</span> vec = data.lock().unwrap();\n        vec.push(i);\n    });\n    handles.push(handle);\n}\n\n<span class="keyword">for</span> h <span class="keyword">in</span> handles { h.join().unwrap(); }\n\n<span class="keyword">let</span> result = data.lock().unwrap();\n<span class="macro">println!</span>(<span class="string">"{:?}"</span>, *result);', keyPoints: ["Arc is thread-safe Rc using atomic reference counting", "Use Arc::clone to create additional references", "Combine with Mutex or RwLock for mutable shared state", "Slightly more overhead than Rc due to atomic operations", "Essential for sharing heap data between threads"], commonMistakes: ["Using Rc instead of Arc in multi-threaded code (compile error)", "Trying to mutate Arc data without Mutex/RwLock", "Creating reference cycles with Arc (use Weak for tree parent pointers)"], relatedConcepts: ["Rc", "Mutex", "Atomic", "Thread", "Reference Counting"] } },

                { id: 96, chapter: "Ch. 16", section: "Fearless Concurrency", title: "Send & Sync Traits", concept: "Thread Safety Markers", description: "Send: safe to transfer ownership between threads. Sync: safe to share references between threads. Automatically implemented by compiler.", code: '// Automatically derived for types composed of\n// Send/Sync types. Unsafe to implement manually.', tags: ["Send", "Sync", "trait", "marker", "thread safety"],
                  deepDive: { explanation: "Send and Sync are marker traits that form the foundation of Rust's thread safety guarantees. Send means a type can be safely transferred (moved) to another thread. Sync means a type can be safely shared between threads via references (&T is Send). The compiler automatically implements these traits for types composed entirely of Send/Sync types. Most types are both Send and Sync. Types that are not Send include Rc (non-atomic ref count) and raw pointers. Types that are not Sync include Cell, RefCell, and Rc. Unsafe impl is required for manual implementation.", extendedCode: '<span class="comment">// Send: can move to another thread</span>\n<span class="keyword">fn</span> <span class="function">assert_send</span>&lt;T: Send&gt;() {}\nassert_send::&lt;<span class="type">String</span>&gt;();\nassert_send::&lt;<span class="type">Vec</span>&lt;<span class="type">i32</span>&gt;&gt;();\n\n<span class="comment">// Sync: can share &T between threads</span>\n<span class="keyword">fn</span> <span class="function">assert_sync</span>&lt;T: Sync&gt;() {}\nassert_sync::&lt;<span class="type">String</span>&gt;();\nassert_sync::&lt;<span class="type">i32</span>&gt;();\n\n<span class="comment">// Not Send: Rc (use Arc instead)</span>\n<span class="comment">// assert_send::&lt;Rc<i32>&gt;(); // ERROR</span>\n\n<span class="comment">// Not Sync: RefCell (use Mutex instead)</span>\n<span class="comment">// assert_sync::&lt;RefCell<i32>&gt;(); // ERROR</span>\n\n<span class="comment">// Arc<Mutex<T>> is both Send and Sync</span>\nassert_send::&lt;<span class="type">Arc</span>&lt;Mutex&lt;<span class="type">i32</span>&gt;&gt;&gt;();\nassert_sync::&lt;<span class="type">Arc</span>&lt;Mutex&lt;<span class="type">i32</span>&gt;&gt;&gt;();', keyPoints: ["Send: safe to move ownership to another thread", "Sync: safe to share immutable references between threads", "Automatically derived by compiler for composed types", "Rc is not Send; RefCell is not Sync", "Arc<Mutex<T>> is the standard pattern for shared mutable state"], commonMistakes: ["Manually implementing Send/Sync without understanding invariants (unsafe)", "Trying to share Rc between threads (use Arc)", "Assuming all types are Send/Sync (compiler will tell you)"], relatedConcepts: ["Marker Trait", "Thread Safety", "Arc", "Mutex", "Unsafe"] } },

                // Chapter 17: Async Programming
                { id: 97, chapter: "Ch. 17", section: "Async Programming", title: "async & await", concept: "Asynchronous Syntax", description: "async transforms a block/function into a Future. await pauses execution until the Future resolves, without blocking the thread.", code: 'async fn fetch_data() -> String { ... }\nlet data = fetch_data().await;', tags: ["async", "await", "Future", "non-blocking", "syntax"],
                  deepDive: { explanation: "The async keyword transforms a function or block into a state machine that implements the Future trait. An async function doesn't execute its body immediately — it returns a Future that must be awaited or polled to run. The .await keyword pauses the current async function until the Future completes, yielding control back to the runtime so other tasks can run. Unlike blocking calls, .await doesn't block the OS thread — it suspends the current task. async/.await is syntactic sugar that makes asynchronous code look like synchronous code while maintaining efficiency.", extendedCode: '<span class="keyword">async fn</span> <span class="function">fetch_data</span>() -> <span class="type">String</span> {\n    <span class="comment">// Simulate async work</span>\n    <span class="comment">// This returns a Future, not a String immediately</span>\n    <span class="string">"data"</span>.to_string()\n}\n\n<span class="keyword">async fn</span> <span class="function">process</span>() {\n    <span class="comment">// .await suspends this function, allowing other tasks to run</span>\n    <span class="keyword">let</span> data = fetch_data().await;\n    <span class="macro">println!</span>(<span class="string">"Got: {}"</span>, data);\n}\n\n<span class="comment">// async block</span>\n<span class="keyword">let</span> future = <span class="keyword">async</span> {\n    <span class="keyword">let</span> data = fetch_data().await;\n    data.len()\n};\n\n<span class="comment">// Futures are lazy — nothing happens until polled</span>\n<span class="comment">// Must run within an async runtime (Tokio, async-std)</span>', keyPoints: ["async fn returns a Future, not the actual result", ".await yields control without blocking the thread", "async code runs inside a runtime (Tokio, async-std)", "Futures are lazy — must be polled to execute", "async/.await is zero-cost abstraction (state machine)"], commonMistakes: ["Calling an async function without .await (returns Future, doesn't execute)", "Using .await outside async functions or blocks", "Blocking inside async code (use spawn_blocking for CPU-intensive work)"], relatedConcepts: ["Future", "Tokio", "Runtime", "Poll", "State Machine"] } },

                { id: 98, chapter: "Ch. 17", section: "Async Programming", title: "Futures", concept: "Lazy Computation", description: "Futures represent asynchronous computations. They are lazy — nothing happens until polled by an executor/runtime.", code: 'use std::future::Future;\nlet f = my_async_fn(); // Future created, not executed\nf.await; // Now it runs', tags: ["Future", "lazy", "poll", "executor", "runtime"],
                  deepDive: { explanation: "A Future represents an asynchronous computation that may not have completed yet. Futures are lazy — creating one doesn't start any work. They must be polled by an executor (runtime) to make progress. The Future trait has a single required method: poll(), which checks if the future has completed. When poll returns Poll::Pending, the future registers a waker to be called when it can make more progress. This cooperative multitasking model is extremely efficient — a single thread can manage thousands of futures. The async/await syntax is sugar for manually implementing Future state machines.", extendedCode: '<span class="keyword">use</span> std::future::Future;\n<span class="keyword">use</span> std::pin::Pin;\n<span class="keyword">use</span> std::task::{Context, Poll};\n\n<span class="comment">// Manual Future implementation</span>\n<span class="keyword">struct</span> <span class="type">MyFuture</span>;\n\n<span class="keyword">impl</span> Future <span class="keyword">for</span> <span class="type">MyFuture</span> {\n    <span class="keyword">type</span> <span class="type">Output</span> = <span class="type">i32</span>;\n    \n    <span class="keyword">fn</span> <span class="function">poll</span>(<span class="keyword">self</span>: Pin&lt;&<span class="keyword">mut</span> <span class="keyword">Self</span>&gt;, _cx: &<span class="keyword">mut</span> Context) -> Poll&lt;<span class="keyword">Self</span>::Output&gt; {\n        Poll::Ready(<span class="string">42</span>)\n    }\n}\n\n<span class="comment">// async/await generates a Future automatically</span>\n<span class="keyword">async fn</span> <span class="function">example</span>() -> <span class="type">i32</span> {\n    <span class="string">42</span>\n}\n\n<span class="comment">// The runtime polls futures</span>\n<span class="comment">// tokio::runtime::Runtime::new().unwrap().block_on(example());</span>', keyPoints: ["Futures are lazy — creation doesn't start execution", "Must be polled by an executor to make progress", "poll() returns Ready(T) or Pending", "Waker mechanism notifies executor when future can progress", "async/await is syntactic sugar for Future implementations"], commonMistakes: ["Expecting a Future to execute without an executor", "Blocking inside poll() (should return Pending and register waker)", "Creating futures without awaiting or spawning them"], relatedConcepts: ["Poll", "Waker", "Executor", "async", "Pin"] } },

                { id: 99, chapter: "Ch. 17", section: "Async Programming", title: "Pin", concept: "Memory Stability", description: "Pin ensures a Future isn't moved in memory after polling, which is required for self-referential async structs.", code: 'use std::pin::Pin;\nfn poll(self: Pin<&mut Self>, cx: &mut Context) -> Poll<T>', tags: ["Pin", "self-referential", "move", "memory", "stability"],
                  deepDive: { explanation: "Pin is a wrapper type that guarantees a value won't be moved in memory unless it implements Unpin. This is crucial for self-referential structs (like async state machines) where a struct contains pointers to its own fields. If the struct were moved, those pointers would become invalid (dangling). Pin<&mut T> ensures T stays at the same memory address. Most types implement Unpin and can be moved even when pinned. Async futures are typically !Unpin and must be pinned before polling. Box::pin and pin! macro are common ways to create pinned values.", extendedCode: '<span class="keyword">use</span> std::pin::Pin;\n\n<span class="comment">// Pin a future on the heap</span>\n<span class="keyword">let</span> future = <span class="type">Box</span>::pin(my_async_fn());\n\n<span class="comment">// Pin a future on the stack (unstable pin! macro)</span>\n<span class="comment">// let future = std::pin::pin!(my_async_fn());</span>\n\n<span class="comment">// Manual pinning</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> future = my_async_fn();\n<span class="keyword">let</span> pinned = Pin::new(&<span class="keyword">mut</span> future);\n\n<span class="comment">// Poll requires Pin&lt;&mut Self&gt;</span>\n<span class="comment">// This is why futures must be pinned before polling</span>\n\n<span class="comment">// Unpin types can be moved after pinning</span>\n<span class="keyword">let</span> x = <span class="type">Box</span>::pin(<span class="string">5</span>); <span class="comment">// i32 is Unpin</span>\n<span class="keyword">let</span> y = x; <span class="comment">// can move because i32 is Unpin</span>', keyPoints: ["Pin prevents memory movement for !Unpin types", "Required for self-referential structs (async state machines)", "Futures are typically !Unpin and must be pinned before polling", "Box::pin allocates on heap; pin! macro pins on stack", "Unpin types can be moved even when pinned"], commonMistakes: ["Trying to poll a future without pinning it first", "Assuming all types are !Unpin (most types are Unpin)", "Creating self-referential structs without Pin"], relatedConcepts: ["Unpin", "Future", "Poll", "Self-Referential", "Heap"] } },

                { id: 100, chapter: "Ch. 17", section: "Async Programming", title: "Tokio Runtime", concept: "Async Executor", description: "Tokio is the most popular async runtime for Rust. It provides the executor, timer, and I/O drivers needed to run async code.", code: '#[tokio::main]\nasync fn main() {\n    let listener = TcpListener::bind("127.0.0.1:8080").await.unwrap();\n}', tags: ["tokio", "runtime", "executor", "async main", "TcpListener"],
                  deepDive: { explanation: "Tokio is the de facto standard async runtime for Rust. It provides the executor (scheduler) that polls futures, timers (sleep, intervals), I/O drivers (TCP, UDP, files), and synchronization primitives (Mutex, RwLock, channels) designed for async code. The #[tokio::main] macro sets up the runtime and runs the async main function. Tokio uses a multi-threaded scheduler by default (work-stealing) but can be configured for single-threaded use. It's essential for network services, web servers, and any I/O-bound async application.", extendedCode: '<span class="comment">// [dependencies]</span>\n<span class="comment">// tokio = { version = "1", features = ["full"] }</span>\n\n<span class="keyword">use</span> tokio::net::TcpListener;\n\n<span class="keyword">#[tokio::main]</span>\n<span class="keyword">async fn</span> <span class="function">main</span>() -> <span class="type">Result</span>&lt;(), <span class="type">Box</span>&lt;<span class="keyword">dyn</span> std::error::Error&gt;&gt; {\n    <span class="keyword">let</span> listener = TcpListener::bind(<span class="string">"127.0.0.1:8080"</span>).await?;\n    \n    <span class="keyword">loop</span> {\n        <span class="keyword">let</span> (socket, _) = listener.accept().await?;\n        tokio::spawn(<span class="keyword">async move</span> {\n            <span class="comment">// handle connection</span>\n        });\n    }\n}\n\n<span class="comment">// Spawning tasks</span>\n<span class="keyword">let</span> handle = tokio::spawn(<span class="keyword">async</span> {\n    <span class="string">"hello from task"</span>\n});\n<span class="keyword">let</span> result = handle.await?;', keyPoints: ["Tokio is the standard async runtime for Rust", "#[tokio::main] sets up the runtime and runs async main", "Provides executor, timers, network I/O, and async synchronization", "tokio::spawn creates concurrent tasks", "Use spawn_blocking for CPU-intensive work inside async code"], commonMistakes: ["Blocking the async runtime with synchronous I/O or CPU work", "Not using tokio::main and trying to run async code directly", "Mixing std::sync::Mutex with async (use tokio::sync::Mutex)"], relatedConcepts: ["Async", "Runtime", "Executor", "TcpListener", "spawn"] } },

                // Chapter 18: OOP Features
                { id: 101, chapter: "Ch. 18", section: "OOP Features", title: "Encapsulation", concept: "Data Hiding", description: "Rust supports encapsulation via pub. Implementation details are hidden, exposing only a public API.", code: 'pub struct AveragedCollection {\n    list: Vec<i32>, // private\n    average: f64,   // private\n}', tags: ["encapsulation", "pub", "private", "API", "hiding"],
                  deepMive: { explanation: "Encapsulation is the principle of hiding implementation details and exposing only a controlled public API. Rust supports this through the pub keyword and module system. Fields and methods without pub are private to their module. This allows you to change internal implementation without affecting users of your code. The example shows a struct where the internal list and cached average are private, but public methods allow controlled access and automatically maintain the invariant that average is always correct.", extendedCode: '<span class="keyword">pub struct</span> <span class="type">AveragedCollection</span> {\n    list: <span class="type">Vec</span>&lt;<span class="type">i32</span>&gt;,\n    average: <span class="type">f64</span>,\n}\n\n<span class="keyword">impl</span> <span class="type">AveragedCollection</span> {\n    <span class="keyword">pub fn</span> <span class="function">new</span>() -> <span class="keyword">Self</span> {\n        <span class="keyword">Self</span> {\n            list: <span class="macro">vec!</span>[],\n            average: <span class="string">0.0</span>,\n        }\n    }\n    \n    <span class="keyword">pub fn</span> <span class="function">add</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>, value: <span class="type">i32</span>) {\n        <span class="keyword">self</span>.list.push(value);\n        <span class="keyword">self</span>.update_average();\n    }\n    \n    <span class="keyword">pub fn</span> <span class="function">average</span>(&<span class="keyword">self</span>) -> <span class="type">f64</span> {\n        <span class="keyword">self</span>.average\n    }\n    \n    <span class="keyword">fn</span> <span class="function">update_average</span>(&<span class="keyword">mut</span> <span class="keyword">self</span>) {\n        <span class="keyword">let</span> total: <span class="type">i32</span> = <span class="keyword">self</span>.list.iter().sum();\n        <span class="keyword">self</span>.average = total <span class="keyword">as</span> <span class="type">f64</span> / <span class="keyword">self</span>.list.len() <span class="keyword">as</span> <span class="type">f64</span>;\n    }\n}', keyPoints: ["Encapsulation hides implementation details via pub/private", "Private fields can only be accessed within the module", "Public methods provide controlled access and maintain invariants", "Rust's module system enforces encapsulation at compile time", "Changing private implementation doesn't break public API"], commonMistakes: ["Making all fields pub when methods should control access", "Breaking invariants by allowing direct mutation of internal state", "Not using encapsulation and exposing implementation details"], relatedConcepts: ["pub", "Module", "API", "Invariant", "Data Hiding"] } },

                { id: 102, chapter: "Ch. 18", section: "OOP Features", title: "Inheritance vs Composition", concept: "No Inheritance", description: "Rust doesn't have inheritance. Use composition (structs containing other structs) and traits for polymorphism.", code: '// Composition over inheritance\nstruct Engine { ... }\nstruct Car {\n    engine: Engine, // composed, not inherited\n}', tags: ["composition", "inheritance", "trait object", "polymorphism", "no inheritance"],
                  deepDive: { explanation: "Rust deliberately does not support implementation inheritance (a struct inheriting fields and methods from another). Instead, Rust favors composition and traits. Composition means a struct contains other structs (has-a relationship). Traits provide polymorphism through interfaces. This avoids the fragile base class problem and diamond inheritance issues common in OOP languages. When you need runtime polymorphism, use trait objects (dyn Trait). For static polymorphism, use generics with trait bounds. This design encourages smaller, focused types and explicit dependencies.", extendedCode: '<span class="comment">// Composition</span>\n<span class="keyword">struct</span> <span class="type">Engine</span> {\n    horsepower: <span class="type">u32</span>,\n}\n\n<span class="keyword">struct</span> <span class="type">Car</span> {\n    engine: <span class="type">Engine</span>, <span class="comment">// Car has an Engine</span>\n    model: <span class="type">String</span>,\n}\n\n<span class="comment">// Trait for polymorphism</span>\n<span class="keyword">trait</span> <span class="type">Drawable</span> {\n    <span class="keyword">fn</span> <span class="function">draw</span>(&<span class="keyword">self</span>);\n}\n\n<span class="keyword">struct</span> <span class="type">Circle</span>;\n<span class="keyword">struct</span> <span class="type">Square</span>;\n\n<span class="keyword">impl</span> <span class="type">Drawable</span> <span class="keyword">for</span> <span class="type">Circle</span> { <span class="keyword">fn</span> <span class="function">draw</span>(&<span class="keyword">self</span>) {} }\n<span class="keyword">impl</span> <span class="type">Drawable</span> <span class="keyword">for</span> <span class="type">Square</span> { <span class="keyword">fn</span> <span class="function">draw</span>(&<span class="keyword">self</span>) {} }\n\n<span class="comment">// Runtime polymorphism with trait objects</span>\n<span class="keyword">let</span> shapes: <span class="type">Vec</span>&lt;<span class="type">Box</span>&lt;<span class="keyword">dyn</span> <span class="type">Drawable</span>&gt;&gt; = <span class="macro">vec!</span>[\n    <span class="type">Box</span>::new(<span class="type">Circle</span>),\n    <span class="type">Box</span>::new(<span class=" type">Square</span>),\n];', keyPoints: ["Rust has no implementation inheritance", "Use composition (structs containing structs) for code reuse", "Use traits for polymorphism and shared behavior", "Trait objects provide runtime polymorphism", "Generics with trait bounds provide static polymorphism"], commonMistakes: ["Trying to model OOP inheritance hierarchies in Rust", "Using trait objects when generics would be simpler", "Deep composition chains that become hard to navigate"], relatedConcepts: ["Composition", "Trait", "Trait Object", "Polymorphism", "dyn"] } },

                { id: 103, chapter: "Ch. 18", section: "OOP Features", title: "Trait Objects", concept: "Dynamic Polymorphism", description: "Trait objects (dyn Trait) provide dynamic polymorphism similar to virtual methods in OOP languages.", code: 'pub trait Draw { fn draw(&self); }\npub struct Screen {\n    pub components: Vec<Box<dyn Draw>>,\n}', tags: ["dyn", "trait object", "polymorphism", "Screen", "Draw"],
                  deepDive: { explanation: "Trait objects (dyn Trait) provide dynamic polymorphism in Rust, allowing you to work with heterogeneous collections of types that implement the same trait. Unlike generics which use static dispatch (monomorphization), trait objects use dynamic dispatch via a vtable. This enables runtime polymorphism similar to virtual methods in C++ or interfaces in Java. Trait objects must be used behind a pointer (Box, &, Rc) because their size is unknown at compile time. They are object-safe only if the trait doesn't have methods that return Self or use generic type parameters.", extendedCode: '<span class="keyword">pub trait</span> <span class="type">Draw</span> {\n    <span class="keyword">fn</span> <span class="function">draw</span>(&<span class="keyword">self</span>);\n}\n\n<span class="keyword">pub struct</span> <span class="type">Screen</span> {\n    <span class="keyword">pub</span> components: <span class="type">Vec</span>&lt;<span class="type">Box</span>&lt;<span class="keyword">dyn</span> <span class="type">Draw</span>&gt;&gt;,\n}\n\n<span class="keyword">impl</span> <span class="type">Screen</span> {\n    <span class="keyword">pub fn</span> <span class="function">run</span>(&<span class="keyword">self</span>) {\n        <span class="keyword">for</span> component <span class="keyword">in</span> <span class="keyword">self</span>.components.iter() {\n            component.draw();\n        }\n    }\n}\n\n<span class="keyword">pub struct</span> <span class="type">Button</span>;\n<span class="keyword">impl</span> <span class="type">Draw</span> <span class="keyword">for</span> <span class="type">Button</span> {\n    <span class="keyword">fn</span> <span class="function">draw</span>(&<span class="keyword">self</span>) { <span class="comment">/* draw button */</span> }\n}', keyPoints: ["dyn Trait enables runtime polymorphism", "Uses dynamic dispatch (vtable) instead of static dispatch", "Must be behind a pointer: Box<dyn>, &dyn, Rc<dyn>", "Object-safe traits only (no Self or generics in methods)", "Useful for heterogeneous collections"], commonMistakes: ["Using dyn Trait without a pointer (unsized type error)", "Using trait objects when generics would be more efficient", "Implementing non-object-safe traits as trait objects"], relatedConcepts: ["Dynamic Dispatch", "Vtable", "Object Safety", "Polymorphism", "Box"] } },

                // Chapter 19: Patterns & Matching
                { id: 104, chapter: "Ch. 19", section: "Patterns & Matching", title: "Pattern Locations", concept: "Where Patterns Work", description: "Patterns appear in match arms, if let, while let, for loops, let statements, and function parameters.", code: 'let (x, y) = (1, 2); // destructuring\nif let Some(x) = opt { ... }', tags: ["pattern", "destructure", "match", "if let", "let"],
                  deepDive: { explanation: "Patterns are used throughout Rust to destructure and match against values. They appear in: match arms (the core pattern matching construct), if let and while let (conditional pattern matching), for loops (iterating and destructuring), let statements (binding and destructuring), function parameters (destructuring arguments), and closure parameters. Patterns can be irrefutable (match all possible values, like x in let x = 5) or refutable (might not match, like Some(x) on an Option). Refutable patterns can only be used in contexts that handle failure, like match or if let.", extendedCode: '<span class="comment">// let destructuring</span>\n<span class="keyword">let</span> (x, y, z) = (<span class="string">1</span>, <span class="string">2</span>, <span class="string">3</span>);\n\n<span class="comment">// Function parameter patterns</span>\n<span class="keyword">fn</span> <span class="function">print_coordinates</span>(&&(x, y): &&(<span class="type">i32</span>, <span class="type">i32</span>)) {\n    <span class="macro">println!</span>(<span class="string">"({}, {})"</span>, x, y);\n}\n\n<span class="comment">// for loop patterns</span>\n<span class="keyword">let</span> v = <span class="macro">vec!</span>[(<span class="string">1</span>, <span class="string">2</span>), (<span class="string">3</span>, <span class="string">4</span>)];\n<span class="keyword">for</span> (x, y) <span class="keyword">in</span> v {\n    <span class="macro">println!</span>(<span class="string">"{} {}"</span>, x, y);\n}\n\n<span class="comment">// if let pattern</span>\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(x) = opt {\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, x);\n}', keyPoints: ["Patterns appear in match, if let, while let, for, let, and fn params", "Irrefutable patterns match all values (let bindings)", "Refutable patterns might fail (match arms, if let)", "Patterns can destructure structs, enums, tuples, and arrays", "The _ pattern ignores values"], commonMistakes: ["Using refutable patterns in let bindings (compiler error)", "Not handling all cases in match (non-exhaustive)", "Complex nested patterns that reduce readability"], relatedConcepts: ["Destructuring", "Match", "if let", "Irrefutable", "Refutable"] } },

                { id: 105, chapter: "Ch. 19", section: "Patterns & Matching", title: "Refutability", concept: "Irrefutable Patterns", description: "Irrefutable patterns match all possible values (e.g., x in let x = 5). Refutable patterns might fail (e.g., Some(x) on None).", code: 'let x = 5; // irrefutable\nif let Some(x) = opt { ... } // refutable', tags: ["refutable", "irrefutable", "pattern", "let", "match"],
                  deepDive: { explanation: "A pattern is irrefutable if it matches all possible values of its type. For example, x in let x = 5 matches any i32. A pattern is refutable if it doesn't match all values — Some(x) doesn't match None, and Ok(v) doesn't match Err(e). Irrefutable patterns are required in let bindings and for loops because these constructs have no way to handle non-matching cases. Refutable patterns are allowed in match, if let, and while let because these provide fallback handling. Understanding refutability helps you choose the right construct for your use case.", extendedCode: '<span class="comment">// Irrefutable patterns</span>\n<span class="keyword">let</span> x = <span class="string">5</span>;              <span class="comment">// irrefutable</span>\n<span class="keyword">let</span> (x, y) = (<span class="string">1</span>, <span class="string">2</span>);    <span class="comment">// irrefutable</span>\n\n<span class="comment">// Refutable patterns</span>\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Some</span>(x) = opt {   <span class="comment">// refutable</span>\n    <span class="macro">println!</span>(<span class="string">"{}"</span>, x);\n}\n\n<span class="comment">// This is an error:</span>\n<span class="comment">// let Some(x) = opt; // ERROR: refutable pattern in local binding</span>\n\n<span class="comment">// Fix with match or if let</span>\n<span class="keyword">let</span> x = <span class="keyword">match</span> opt {\n    <span class="type">Some</span>(x) => x,\n    <span class="type">None</span> => <span class="string">0</span>,\n};', keyPoints: ["Irrefutable patterns match all values; refutable patterns might not", "let and for require irrefutable patterns", "match, if let, and while let handle refutable patterns", "Using _ makes a pattern irrefutable (catch-all)", "Compiler errors help identify refutable patterns in wrong contexts"], commonMistakes: ["Using refutable patterns in let (compiler error)", "Assuming a pattern is irrefutable when it's not", "Not handling all cases when using refutable patterns"], relatedConcepts: ["Pattern", "Match", "if let", "Option", "Binding"] } },

                { id: 106, chapter: "Ch. 19", section: "Patterns & Matching", title: "Pattern Syntax", concept: "Advanced Patterns", description: "Patterns can match literals, named variables, multiple patterns (|), ranges (..=), destructuring, and use @ bindings.", code: 'match num {\n    1 | 2 => println!("one or two"),\n    3..=9 => println!("three to nine"),\n    n @ 10..=20 => println!("matched {n}"),\n    _ => println!("other"),\n}', tags: ["pattern syntax", "|", "range", "@ binding", "destructure"],
                  deepDive: { explanation: "Rust's pattern syntax is rich and expressive. You can match literals (1, "hello"), named variables (which bind to values), multiple patterns with | (OR), ranges with ..= (inclusive), and destructure structs, enums, and tuples. The @ binding (match guard) binds a value to a name while also matching a pattern. _ ignores values. .. ignores remaining fields in structs. ref and mut can modify how bindings work. This expressive syntax makes match powerful for complex data handling.", extendedCode: '<span class="keyword">match</span> x {\n    <span class="string">1</span> | <span class="string">2</span> => <span class="macro">println!</span>(<span class="string">"one or two"</span>),           <span class="comment">// multiple patterns</span>\n    <span class="string">3</span>..=<span class="string">9</span> => <span class="macro">println!</span>(<span class="string">"three to nine"</span>),        <span class="comment">// range</span>\n    n @ <span class="string">10</span>..=<span class="string">20</span> => <span class="macro">println!</span>(<span class="string">"matched {}"</span>, n),   <span class="comment">// @ binding</span>\n    _ => <span class="macro">println!</span>(<span class="string">"other"</span>),                     <span class="comment">// ignore</span>\n}\n\n<span class="comment">// Destructuring with ..</span>\n<span class="keyword">let</span> p = <span class="type">Point</span> { x: <span class="string">0</span>, y: <span class="string">7</span> };\n<span class="keyword">let</span> <span class="type">Point</span> { x, .. } = p; <span class="comment">// only bind x</span>\n\n<span class="comment">// ref and mut in patterns</span>\n<span class="keyword">let</span> <span class="keyword">mut</span> v = <span class="string">5</span>;\n<span class="keyword">let</span> <span class="keyword">ref</span> r = v; <span class="comment">// r is &i32</span>', keyPoints: ["| matches multiple patterns (OR)", "..= is inclusive range matching", "@ binds a name to a matched value", "_ ignores a single value; .. ignores remaining fields", "Patterns can be nested and combined arbitrarily"], commonMistakes: ["Using | with overlapping bindings (e.g., x | y where both bind)", "Forgetting that ranges in patterns are inclusive (..=)", "Complex patterns that are hard to read and maintain"], relatedConcepts: ["Match", "Destructuring", "Binding", "Range", "Ignore"] } },

                { id: 107, chapter: "Ch. 19", section: "Patterns & Matching", title: "Destructuring", concept: "Breaking Apart Values", description: "Destructuring unpacks structs, enums, tuples, and nested patterns to bind inner values directly.", code: 'let Point { x, y } = point;\nlet Message::Write(text) = msg;\nlet ((a, b), Point { x, y }) = nested;', tags: ["destructure", "unpack", "struct", "enum", "nested"],
                  deepDive: { explanation: "Destructuring is the process of breaking apart a compound value into its constituent parts and binding them to variables. It works with structs (by field name), enums (by variant), tuples (by position), arrays, and nested combinations. Destructuring is idiomatic in Rust and makes code more readable by giving names to inner values. It can be used in let bindings, function parameters, match arms, and closures. You can destructure partially using .. to ignore remaining fields, or use _ to ignore specific fields.", extendedCode: '<span class="keyword">struct</span> <span class="type">Point</span> { x: <span class="type">i32</span>, y: <span class="type">i32</span> }\n\n<span class="keyword">let</span> p = <span class="type">Point</span> { x: <span class="string">0</span>, y: <span class="string">7</span> };\n<span class="keyword">let</span> <span class="type">Point</span> { x, y } = p;\n\n<span class="comment">// Destructuring enums</span>\n<span class="keyword">enum</span> <span class="type">Message</span> {\n    <span class="type">Quit</span>,\n    <span class="type">Move</span> { x: <span class="type">i32</span>, y: <span class="type">i32</span> },\n    <span class="type">Write</span>(<span class="type">String</span>),\n}\n\n<span class="keyword">let</span> msg = <span class="type">Message</span>::<span class="type">Move</span> { x: <span class="string">10</span>, y: <span class="string">20</span> };\n<span class="keyword">if</span> <span class="keyword">let</span> <span class="type">Message</span>::<span class="type">Move</span> { x, y } = msg {\n    <span class="macro">println!</span>(<span class="string">"Move to ({}, {})"</span>, x, y);\n}\n\n<span class="comment">// Nested destructuring</span>\n<span class="keyword">let</span> ((a, b), <span class="type">Point</span> { x, y }) = ((<span class="string">1</span>, <span class="string">2</span>), <span class="type">Point</span> { x: <span class="string">3</span>, y: <span class="string">4</span> });', keyPoints: ["Destructuring binds inner values to variables", "Works with structs, enums, tuples, arrays, and nested combinations", ".. ignores remaining fields in structs", "_ ignores specific fields or values", "Makes code more readable by naming components"], commonMistakes: ["Not handling all fields in exhaustive destructuring", "Forgetting that enum destructuring must match the variant", "Overly complex nested destructuring that reduces readability"], relatedConcepts: ["Pattern", "Match", "Struct", "Enum", "Binding"] } },

                { id: 108, chapter: "Ch. 19", section: "Patterns & Matching", title: "Match Guards", concept: "Conditional Arms", description: "Match guards add extra if conditions to match arms for more expressive pattern matching.", code: 'match num {\n    Some(x) if x < 5 => println!("less than five: {x}"),\n    Some(x) => println!("{x}"),\n    None => (),\n}', tags: ["guard", "if", "condition", "match arm", "extra check"],
                  deepDive: { explanation: "Match guards are additional if conditions specified after a pattern in a match arm. They allow more fine-grained matching than patterns alone. A match arm with a guard only matches if the pattern matches AND the guard condition is true. Guards can use variables bound by the pattern. However, guards have a limitation: they don't allow moving values out of the pattern (because the guard might fail). Match guards are useful for range checks, validating bound values, and complex conditions that can't be expressed purely with patterns.", extendedCode: '<span class="keyword">let</span> num = <span class="type">Some</span>(<span class="string">4</span>);\n\n<span class="keyword">match</span> num {\n    <span class="type">Some</span>(x) <span class="keyword">if</span> x &lt; <span class="string">5</span> => <span class="macro">println!</span>(<span class="string">"less than five: {}"</span>, x),\n    <span class="type">Some</span>(x) => <span class="macro">println!</span>(<span class="string">"{}"</span>, x),\n    <span class="type">None</span> => (),\n}\n\n<span class="comment">// Guard with multiple patterns</span>\n<span class="keyword">let</span> x = <span class="string">4</span>;\n<span class="keyword">let</span> y = <span class="keyword">false</span>;\n\n<span class="keyword">match</span> x {\n    <span class="string">4</span> | <span class="string">5</span> | <span class="string">6</span> <span class="keyword">if</span> y => <span class="macro">println!</span>(<span class="string">"yes"</span>),\n    _ => <span class="macro">println!</span>(<span class="string">"no"</span>),\n}\n<span class="comment">// Prints "no" because y is false</span>', keyPoints: ["Match guards add if conditions to match arms", "The arm matches only if both the pattern and guard are satisfied", "Can use variables bound by the pattern", "Cannot move values out of the pattern in a guard", "Useful for complex conditions beyond pattern matching"], commonMistakes: ["Trying to move values in a guard (use ref binding instead)", "Confusing guard precedence with pattern matching", "Overusing guards when separate match arms would be clearer"], relatedConcepts: ["Match", "Pattern", "Condition", "Binding", "Arm"] } },

                // Chapter 20: Advanced Features
                { id: 109, chapter: "Ch. 20", section: "Advanced Features", title: "Unsafe Rust", concept: "Unsafe Keyword", description: "unsafe allows five superpowers: dereference raw pointers, call unsafe functions, access/modify static mut, implement unsafe traits, access union fields.", code: 'unsafe {\n    let raw = &mut 5 as *mut i32;\n    *raw = 10;\n}', tags: ["unsafe", "raw pointer", "dereference", "superpower", "block"],
